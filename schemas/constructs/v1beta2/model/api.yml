openapi: 3.0.0
info:
  title: Model
  description: OpenAPI schema for Meshery model registration and management.
  version: v1beta2
  contact:
    name: Meshery Maintainers
    email: maintainers@meshery.io
    url: https://meshery.io
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

security:
  - jwt: []

tags:
  - name: Models
    description: Operations related to mesh models

paths:
  /api/meshmodels/register:
    post:
      x-internal: ["cloud", "meshery"]
      tags:
        - Models
      summary: Register mesh models
      operationId: registerMeshmodels
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/ImportRequest"
      responses:
        "201":
          description: Model registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "400":
          description: Invalid request format
        "401":
          $ref: "#/components/responses/401"
        "500":
          description: Internal server error

  /api/integrations/meshmodels/models:
    get:
      x-internal: ["cloud"]
      tags:
        - Models
      summary: Get mesh model models
      operationId: getMeshModelModels
      parameters:
        - name: page
          in: query
          required: false
          description: Current page number of the result set.
          schema:
            type: integer
            minimum: 0
        - name: pageSize
          in: query
          required: false
          description: Number of items per page.
          schema:
            type: integer
            minimum: 1
        - name: search
          in: query
          required: false
          description: Free-text search query applied to model names.
          schema:
            type: string
            maxLength: 255
        - name: order
          in: query
          required: false
          description: Sort order for the result set (e.g. "name asc").
          schema:
            type: string
            maxLength: 255
      responses:
        "200":
          description: Model and capabilities registry entries retrieved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeshModelModelsPage"
        "401":
          $ref: "#/components/responses/401"
        "500":
          description: Internal server error
components:
  responses:
    401:
      $ref: "../core/api.yml#/components/responses/401"

  securitySchemes:
    jwt:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Model:
      type: object
      description: "Registrant-defined data associated with the model. Properties pertain to the software being managed (e.g. Kubernetes v1.31)."
      required:
        - version
      properties:
        version:
          description: "Version of the model as defined by the registrant."
          $ref: "../core/api.yml#/components/schemas/SemverString"
          x-oapi-codegen-extra-tags:
            json: "version"
          x-order: 1

    ModelDefinition:
      $ref: "./model.yaml"

    RegistrantReference:
      "type": "object"
      required:
        - "kind"
      "properties":
        "kind":
          "type": "string"
          description: Kind of the registrant.
          maxLength: 255

    ModelReference:
      type: "object"
      "required":
        ["id", "name", "version", "displayName", "model", "registrant"]
      "properties":
        id:
          "$ref": "../core/api.yml#/components/schemas/Uuid"
        name:
          type: string
          description: The unique name for the model within the scope of a registrant.
          pattern: ^[a-z0-9-]+$
          examples:
            - cert-manager
        version:
          "$ref": "../core/api.yml#/components/schemas/SemverString"
          description: Version of the model definition.
        displayName:
          type: string
          description: Human-readable name for the model.
          minLength: 1
          maxLength: 100
          pattern: ^[a-zA-Z0-9 ]+$
          examples:
            - Cert Manager
        model:
          "$ref": "./api.yml#/components/schemas/Model"
        registrant:
          "x-go-type": "RegistrantReference"
          "$ref": "#/components/schemas/RegistrantReference"
          x-oapi-codegen-extra-tags:
            json: "registrant"

      "description": "Reference to the specific registered model to which the component belongs and from which model version, category, and other properties may be referenced. Learn more at https://docs.meshery.io/concepts/models"

    ImportRequest:
      type: object
      required:
        - importBody
        - uploadType
        - register
      properties:
        importBody:
          $ref: "#/components/schemas/ImportBody"
        uploadType:
          type: string
          title: "Upload method"
          x-enum-casing-exempt: true
          enum: ["file", "urlImport", "csv", "url"]
          enumDescriptions:
            [
              "Upload a model file (.tar, .tar.gz, .tgz) from your local system",
              "Import a model file using a direct URL to the source",
              "Upload separate CSV files for model definitions, components, and their relationships",
            ]
          description: "Choose the method you prefer to upload your model file. Select 'File Import' or 'CSV Import' if you have the file on your local system or 'URL Import' if you have the file hosted online."
        register:
          type: boolean
          nullable: false
          description: The register of the importrequest.

    ImportBody:
      oneOf:
        - title: File Import
          type: object
          required: [fileName, modelFile]
          properties:
            fileName:
              type: string
              description: "Name of the file being uploaded."
              maxLength: 255
            modelFile:
              type: string
              # NOTE: Stays `type: string` (no `format:`) pending a coordinated
              # multi-repo fix. The production client (meshery/ui) serializes
              # modelFile as a JSON array of byte integers via
              # getUnit8ArrayDecodedFile, not as a base64 string, so switching
              # to `format: byte` (which would make oapi-codegen emit *[]byte
              # and expect base64) would break File Import at runtime. Once
              # the client migrates to a canonical OpenAPI 3 encoding — either
              # base64 (`format: byte`) or binary-in-multipart — swap this
              # property over in lockstep with the meshery server.
              description: "Supported model file formats are: .tar, .tar.gz, and .tgz. See [Import Models Documentation](https://docs.meshery.io/guides/configuration-management/importing-models#import-models-using-meshery-ui) for details"

        - title: URL Import
          type: object
          required: [url]
          properties:
            url:
              type: string
              format: uri
              description: 'A direct URL to a single model file, for example: https://raw.github.com/your-model-file.tar. Supported model file formats are: .tar, .tar.gz, and .tgz. \n\nFor bulk import of your model use the GitHub connection or CSV files. See [Import Models Documentation](https://docs.meshery.io/guides/configuration-management/importing-models#import-models-using-meshery-ui) for details'

        - title: CSV Import
          type: object
          required: [modelCsv, componentCsv, relationshipCsv]
          properties:
            modelCsv:
              type: string
              format: binary
              description: Upload a CSV file containing model definitions
            componentCsv:
              type: string
              format: binary
              description: Upload a CSV file containing component definitions
            relationshipCsv:
              type: string
              format: binary
              description: Upload a CSV file containing relationship definitions

        - title: Model Create
          type: object
          required: [model, url]
          properties:
            url:
              type: string
              description: "URI to the source code or package of the model."
              format: uri
              oneOf:
                - title: "GitHub"
                  type: string
                  pattern: "^git://github\\.com/[\\w.-]+/[\\w.-]+(/[\\w.-]+/[\\w/-]+)?$"
                  description: "Git protocol URL for GitHub repository or specific resource path"
                  example: "git://github.com/cert-manager/cert-manager/master/deploy/crds"
                  x-metadata:
                    uiType: "url"
                    validationHint: "Enter a git protocol URL (e.g., git://github.com/owner/repo)"
                - title: "Artifact Hub"
                  type: string
                  pattern: "^https:\\/\\/artifacthub\\.io\\/packages\\/(search\\?ts_query_web=[\\w.-]+|[\\w.-]+\\/[\\w.-]+\\/[\\w.-]+)$"
                  description: "Artifact Hub package URL or search query URL with model name parameter"
                  example: "https://artifacthub.io/packages/search?ts_query_web={model-name}"
                  x-metadata:
                    uiType: "url"
                    validationHint: "Enter an Artifact Hub URL (e.g., https://artifacthub.io/packages/search?ts_query_web={meshery-operator})"

    MeshModelModelsPage:
      type: object
      description: Page of mesh models matching the list-endpoint query.
      properties:
        page:
          type: integer
          description: Current page number of the result set.
          minimum: 0
          x-oapi-codegen-extra-tags:
            json: "page,omitempty"
        pageSize:
          type: integer
          description: Number of items per page.
          minimum: 1
          x-oapi-codegen-extra-tags:
            json: "pageSize,omitempty"
        totalCount:
          type: integer
          description: Total number of items available.
          minimum: 0
          x-oapi-codegen-extra-tags:
            json: "totalCount,omitempty"
        models:
          type: array
          items:
            $ref: "#/components/schemas/ModelDefinition"
          description: The models matching the list-endpoint query.

    MesheryModelImportFormPayload:
      type: object
      description: >
        Flat canonical representation of the model import form that combines
        the UI-level uploadType discriminator with the union of fields from
        the ImportBody oneOf variants. This schema is the authoritative source
        for the canonical RJSF form schema at
        schemas/constructs/v1beta2/model/forms/import.json. The server
        receives an ImportRequest; this form schema captures the superset of
        user-facing fields so the form schema can be validated as a subset of
        this canonical type.
      required:
        - uploadType
      properties:
        uploadType:
          type: string
          title: "Upload method"
          x-enum-casing-exempt: true
          enum: ["file", "urlImport", "csv"]
          # Human-readable labels for the upload-type discriminator. RJSF
          # consumers (e.g. the meshery UI radio group) surface these instead
          # of the raw lowercase tokens.
          enumNames: ["File Import", "URL Import", "CSV Import"]
          description: "Choose the method you prefer. Select 'File Import' or 'CSV Import' if you have the file on your local system, or 'URL Import' if you have the file hosted online."
        fileName:
          type: string
          description: "Name of the model file being uploaded."
          maxLength: 255
        modelFile:
          type: string
          description: "Model file content. Supported formats: .tar, .tar.gz, .tgz."
        url:
          type: string
          format: uri
          description: "A direct URL to a single model file. Supported formats: .tar, .tar.gz, .tgz."
        modelCsv:
          type: string
          format: binary
          description: "CSV file containing model definitions."
        componentCsv:
          type: string
          format: binary
          description: "CSV file containing component definitions."
        relationshipCsv:
          type: string
          format: binary
          description: "CSV file containing relationship definitions."
