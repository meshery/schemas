$id: https://schemas.meshery.io/view.yaml
$schema: http://json-schema.org/draft-07/schema#
title: MesheryView
description: A saved view with filters and metadata that defines a customized perspective of Meshery resources. Learn more at https://docs.meshery.io/concepts/logical/views
additionalProperties: false
type: object
example:
  id: 00000000-0000-0000-0000-000000000000
  name: My Kubernetes View
  visibility: private
  filters: {}
  metadata: {}
  userId: 00000000-0000-0000-0000-000000000000
  createdAt: "0001-01-01T00:00:00Z"
  updatedAt: "0001-01-01T00:00:00Z"
  deletedAt: null
required:
  - id
  - name
  - visibility
  - userId
  - createdAt
  - updatedAt
properties:
  id:
    $ref: ../../v1alpha1/core/api.yml#/components/schemas/uuid
    description: Unique identifier for the view.
    x-order: 1
    x-go-name: ID
    x-oapi-codegen-extra-tags:
      db: id
      json: id
  name:
    type: string
    description: Display name of the view.
    maxLength: 255
    minLength: 1
    x-order: 2
    x-oapi-codegen-extra-tags:
      db: name
      json: name
  visibility:
    type: string
    description: Visibility level of the view.
    maxLength: 255
    x-order: 3
    x-go-type-skip-optional-pointer: true
    x-oapi-codegen-extra-tags:
      db: visibility
      json: visibility
  filters:
