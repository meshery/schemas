openapi: 3.0.0
info:
  title: Component
  description: OpenAPI schema for component definitions in Meshery.
  version: v1beta2
  contact:
    name: Meshery Maintainers
    email: maintainers@meshery.io
    url: https://meshery.io
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
paths: {}
components:
  schemas:
    ComponentDefinition:
      $ref: "./component.yaml"

    Component:
      description: "Data related to the third-party capability that a ComponentDefinition wraps; this payload is treated as a hermetically sealed, opaque object."
      type: object
      properties:
        version:
          type: string
          description: "Version of the component produced by the registrant. Example: APIVersion of a Kubernetes Pod."
          x-order: 1
          maxLength: 500
        kind:
          type: string
          description: "The unique identifier (name) assigned by the registrant to this component. Example: A Kubernetes Pod is of kind 'Pod'."
          x-order: 2
          maxLength: 255
        schema:
          type: string
          description: "JSON schema of the object as defined by the registrant."
          x-order: 3
          maxLength: 500
      required:
        - version
        - kind
        - schema

    ComponentGroupEntry:
      type: object
      description: "A grouping of components by a specific key (e.g., model name)."
      required:
        - key
        - count
      properties:
        key:
          type: string
          description: "The name of the group."
          maxLength: 500
        count:
          type: integer
          format: int32
          description: "The number of components in this group."
          minimum: 0

    ComponentSummary:
      type: object
      description: "Summary of components grouped by various criteria."
      required:
        - total
      additionalProperties: false
      properties:
        total:
          type: integer
          format: int64
          description: "Total number of components."
          minimum: 0
        byModel:
          type: array
          items:
            $ref: "#/components/schemas/ComponentGroupEntry"
          description: "Components grouped by model."
        byCategory:
          type: array
          items:
            $ref: "#/components/schemas/ComponentGroupEntry"
          description: "Components grouped by category."
        byRegistrant:
          type: array
          items:
            $ref: "#/components/schemas/ComponentGroupEntry"
          description: "Components grouped by registrant."

    ComponentSummaryFilter:
      type: object
      description: "Filter parameters for component summary."
      additionalProperties: false
      properties:
        modelName:
          type: string
          description: "Filter by model name."
          maxLength: 500
        categoryName:
          type: string
          description: "Filter by category name."
          maxLength: 500
        version:
          type: string
          description: "Filter by version."
          maxLength: 100
        status:
          type: string
          description: "Filter by status (e.g., enabled, disabled)."
          default: "enabled"
          maxLength: 50
        annotations:
          type: boolean
          description: "Filter by annotations."
        registrant:
          type: string
          description: "Filter by registrant name."
          maxLength: 500
        include:
          type: array
          items:
            type: string
            enum: ["byModel", "byCategory", "byRegistrant"]
          description: "Criteria for grouping the summary."
