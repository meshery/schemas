$id: https://schemas.meshery.io/user.yaml
$schema: http://json-schema.org/draft-07/schema#
type: object
description: Represents a user in Layer5 Cloud (Meshery)
additionalProperties: false
required:
  - id
  - userId
  - provider
  - email
  - firstName
  - lastName
  - status
  - acceptedTermsAt
  - firstLoginTime
  - lastLoginTime
  - createdAt
  - updatedAt
properties:
  id:
    $ref: "../core/api.yml#/components/schemas/Uuid"
    description: Unique identifier for the user
    x-go-name: ID
    x-oapi-codegen-extra-tags:
      db: "id"
      json: "id"
  userId:
    type: string
    maxLength: 200
    description: User's identifier (username or external ID)
    x-oapi-codegen-extra-tags:
      db: "user_id"
      json: "userId"
    x-id-format: external
  provider:
    type: string
    maxLength: 100
    description: "User's authentication provider (e.g., Layer5, Twitter, Facebook, GitHub)"
    example: Layer5
    x-oapi-codegen-extra-tags:
      db: "provider"
      json: "provider"
  email:
    type: string
    format: email
    maxLength: 300
    description: User's email address
    x-oapi-codegen-extra-tags:
      db: "email"
      json: "email"
  firstName:
    type: string
    maxLength: 200
    description: User's first name
    x-oapi-codegen-extra-tags:
      db: "first_name"
      json: "firstName"
  lastName:
    type: string
    maxLength: 300
    description: User's last name
    x-oapi-codegen-extra-tags:
      db: "last_name"
      json: "lastName"
  avatarUrl:
    type: string
    format: uri
    maxLength: 500
    description: URL to the user's avatar image
    x-oapi-codegen-extra-tags:
      db: "avatar_url"
      json: "avatarUrl"
  status:
    type: string
    maxLength: 100
    enum:
      - active
      - inactive
      - pending
      - anonymous
    description: User's account status
    x-oapi-codegen-extra-tags:
      db: "status"
      json: "status"
  bio:
    type: string
    maxLength: 1000
    default: ""
    description: User's biography or description
    x-oapi-codegen-extra-tags:
      db: "bio"
      json: "bio"
  country:
    type: object
    description: User's country information stored as JSONB
    additionalProperties: true
    x-go-type: "core.Map"
    x-go-type-import:
      path: github.com/meshery/schemas/models/core
      name: core
    x-go-type-skip-optional-pointer: true
    x-oapi-codegen-extra-tags:
      db: "country"
      json: "country"
  region:
    type: object
    description: User's region information stored as JSONB
    additionalProperties: true
    x-go-type: "core.Map"
    x-go-type-import:
      path: github.com/meshery/schemas/models/core
      name: core
    x-go-type-skip-optional-pointer: true
    x-oapi-codegen-extra-tags:
      db: "region"
      json: "region"
  preferences:
    $ref: "./api.yml#/components/schemas/Preference"
    x-go-type: "Preference"
    description: User's preferences stored as JSONB
    x-oapi-codegen-extra-tags:
      db: "preferences"
      json: "preferences"
  acceptedTermsAt:
    $ref: "../core/api.yml#/components/schemas/Time"
    description: Timestamp when the user accepted terms and conditions
    x-oapi-codegen-extra-tags:
      db: "accepted_terms_at"
      json: "acceptedTermsAt"
  firstLoginTime:
    $ref: "../core/api.yml#/components/schemas/Time"
    description: Timestamp of the user's first login
    x-oapi-codegen-extra-tags:
      db: "first_login_time"
      json: "firstLoginTime"
  lastLoginTime:
    $ref: "../core/api.yml#/components/schemas/Time"
    description: Timestamp of the user's most recent login
    x-oapi-codegen-extra-tags:
      db: "last_login_time"
      json: "lastLoginTime"
  createdAt:
    $ref: "../core/api.yml#/components/schemas/Time"
    description: Timestamp when the user record was created
    x-oapi-codegen-extra-tags:
      db: "created_at"
      json: "createdAt"
  updatedAt:
    $ref: "../core/api.yml#/components/schemas/Time"
    description: Timestamp when the user record was last updated
    x-oapi-codegen-extra-tags:
      db: "updated_at"
      json: "updatedAt"
  socials:
    type: array
    description: Various online profiles associated with the user's account
    x-go-type: "UserSocials"
    items:
      $ref: "./api.yml#/components/schemas/Social"
      x-go-type: "Social"
    x-oapi-codegen-extra-tags:
      db: "socials"
      json: "socials"
  deletedAt:
    type: string
    format: date-time
    nullable: true
    description: Timestamp when the user record was soft-deleted (null if not deleted)
    x-go-type: "core.NullTime"
    x-go-type-import:
      path: github.com/meshery/schemas/models/core
      name: core
    x-oapi-codegen-extra-tags:
      db: "deleted_at"
      json: "deletedAt"
