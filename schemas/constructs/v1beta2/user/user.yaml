type: object
description: Represents a user in Layer5 Cloud (Meshery)
required:
  - id
  - userId
  - provider
  - email
  - firstName
  - lastName
  - status
  - createdAt
  - updatedAt
  - lastLoginTime
  - deletedAt
properties:
  id:
    $ref: "../core/api.yml#/components/schemas/Uuid"
    description: Unique identifier for the user
    x-go-name: ID
    x-oapi-codegen-extra-tags:
      db: "id"
      json: "id"
  userId:
    type: string
    maxLength: 200
    description: User identifier (username or external ID)
    x-oapi-codegen-extra-tags:
      db: "user_id"
      json: "userId"
    x-id-format: external
  provider:
    type: string
    maxLength: 100
    description: "Authentication provider (e.g., Layer5 Cloud, Twitter, Facebook, Github)"
    example:
      - local
      - github
      - google
      - twitter
    x-oapi-codegen-extra-tags:
      db: "provider"
      json: "provider"
  email:
    type: string
    format: email
    maxLength: 300
    description: User's email address
    x-oapi-codegen-extra-tags:
      db: "email"
      json: "email"
  firstName:
    type: string
    maxLength: 200
    description: User's first name
    x-oapi-codegen-extra-tags:
      db: "first_name"
      json: "firstName"
  lastName:
    type: string
    maxLength: 300
    description: User's last name
    x-oapi-codegen-extra-tags:
      db: "last_name"
      json: "lastName"
  avatarUrl:
    type: string
    format: uri
    maxLength: 500
    description: URL to user's avatar image
    x-oapi-codegen-extra-tags:
      db: "avatar_url"
      json: "avatarUrl"
  status:
    type: string
    maxLength: 100
    enum:
      - active
      - inactive
      - pending
      - anonymous
    description: User account status
    x-oapi-codegen-extra-tags:
      db: "status"
      json: "status"
  bio:
    type: string
    maxLength: 1000
    default: ""
    description: User's biography or description
    x-oapi-codegen-extra-tags:
      db: "bio"
      json: "bio"
  country:
    type: object
    description: User's country information stored as JSONB
    additionalProperties: true
    x-go-type: "core.Map"
    x-go-type-skip-optional-pointer: true
    x-oapi-codegen-extra-tags:
      db: "country"
      json: "country"
  region:
    type: object
    description: User's region information stored as JSONB
    additionalProperties: true
    x-go-type: "core.Map"
    x-go-type-skip-optional-pointer: true
    x-oapi-codegen-extra-tags:
      db: "region"
      json: "region"
  preferences:
    $ref: "./api.yml#/components/schemas/Preference"
    x-go-type: "Preference"
    description: User preferences stored as JSONB
    x-oapi-codegen-extra-tags:
      db: "preferences"
      json: "preferences"
  acceptedTermsAt:
    $ref: "../core/api.yml#/components/schemas/Time"
    description: Timestamp when user accepted terms and conditions
    x-oapi-codegen-extra-tags:
      db: "accepted_terms_at"
      json: "acceptedTermsAt"
  firstLoginTime:
    $ref: "../core/api.yml#/components/schemas/Time"
    description: Timestamp of user's first login
    x-oapi-codegen-extra-tags:
      db: "first_login_time"
      json: "firstLoginTime"
  lastLoginTime:
    $ref: "../core/api.yml#/components/schemas/Time"
    description: Timestamp of user's most recent login
    x-oapi-codegen-extra-tags:
      db: "last_login_time"
      json: "lastLoginTime"
  createdAt:
    $ref: "../core/api.yml#/components/schemas/Time"
    description: Timestamp when the user record was created
    x-oapi-codegen-extra-tags:
      db: "created_at"
      json: "createdAt"
  updatedAt:
    $ref: "../core/api.yml#/components/schemas/Time"
    description: Timestamp when the user record was last updated
    x-oapi-codegen-extra-tags:
      db: "updated_at"
      json: "updatedAt"
  socials:
    type: array
    description: Various online profiles associated with the user account
    # use a custom type to represent a slice of Social structs , the default is []Social which
    # cant be used with sql drivers as we cant add methods to that type
    x-go-type: "UserSocials"
    items:
      $ref: "./api.yml#/components/schemas/Social"
      x-go-type: "Social"
    x-oapi-codegen-extra-tags:
      db: "socials"
      json: "socials"
  deletedAt:
    type: string
    format: date-time
    nullable: true
    description: Timestamp when the user record was soft-deleted (null if not deleted)
    x-go-type: "core.NullTime"
    x-oapi-codegen-extra-tags:
      db: "deleted_at"
      json: "deletedAt"
  roleNames:
    type: array
    items:
      type: string
      enum:
        - admin
        - meshmap
        - curator
        - team admin
        - workspace admin
        - workspace manager
        - organization admin
        - user
    description: List of global roles assigned to the user
    example: ["admin", "meshmap"]
    x-oapi-codegen-extra-tags:
      db: "role_names"
      json: "roleNames"
  teams:
    type: object
    description: Teams the user belongs to with role information
    x-oapi-codegen-extra-tags:
      db: "teams"
      json: "teams"
    properties:
      teamsWithRoles:
        type: array
        description: Team memberships for the user with their assigned roles.
        items:
          type: object
        x-oapi-codegen-extra-tags:
          db: "teams_with_roles"
          json: "teamsWithRoles"
      totalCount:
        type: integer
        description: Total number of team memberships returned for the user.
        minimum: 0
        x-oapi-codegen-extra-tags:
          db: "total_count"
          json: "totalCount"
  organizations:
    type: object
    description: Organizations the user belongs to with role information
    x-oapi-codegen-extra-tags:
      db: "organizations"
      json: "organizations"
    properties:
      organizationsWithRoles:
        type: array
        description: Organization memberships for the user with their assigned roles.
        items:
          type: object
        x-oapi-codegen-extra-tags:
          db: "organizations_with_roles"
          json: "organizationsWithRoles"
      totalCount:
        type: integer
        description: Total number of organization memberships returned for the user.
        minimum: 0
        x-oapi-codegen-extra-tags:
          db: "total_count"
          json: "totalCount"
additionalProperties: false
