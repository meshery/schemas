openapi: 3.0.3
info:
  title: User
  description: OpenAPI schema for user management in Meshery Cloud.
  version: v1beta2
  contact:
    name: Meshery Maintainers
    email: maintainers@meshery.io
    url: https://meshery.io
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

security:
  - jwt: []

tags:
  - name: users
    description: Operations related to users

paths:
  /api/identity/orgs/{orgId}/users:
    get:
      x-internal: ["cloud"]
      tags:
        - users
      operationId: getUsersForOrg
      summary: Get organization users
      description: Returns organization users, optionally filtered by team membership.
      parameters:
        - $ref: "#/components/parameters/orgId"
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/order"
        - $ref: "#/components/parameters/filter"
        - $ref: "#/components/parameters/teamId"
      responses:
        "200":
          description: Paginated list of organization users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsersPageForAdmin"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/identity/orgs/{orgId}/users/search:
    get:
      x-internal: ["cloud"]
      tags:
        - users
      operationId: searchOrganizationUsers
      summary: Search organization users
      description: Returns restricted user records visible to authenticated organization identity-management flows.
      parameters:
        - $ref: "#/components/parameters/orgId"
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/order"
        - $ref: "#/components/parameters/filter"
      responses:
        "200":
          description: Paginated list of searchable organization users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchableUsersPage"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/identity/orgs/{orgId}/users/{userId}:
    post:
      x-internal: ["cloud"]
      tags:
        - users
      operationId: addUserToOrg
      summary: Add user to organization
      description: Adds a user to an organization.
      parameters:
        - $ref: "#/components/parameters/orgId"
        - $ref: "#/components/parameters/userId"
      responses:
        "201":
          description: User added to organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserOrganizationMapping"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          description: User cannot be added to organization
          content:
            text/plain:
              schema:
                type: string
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"
    delete:
      x-internal: ["cloud"]
      tags:
        - users
      operationId: deleteUserFromOrg
      summary: Remove user from organization
      description: Removes a user from an organization.
      parameters:
        - $ref: "#/components/parameters/orgId"
        - $ref: "#/components/parameters/userId"
      responses:
        "204":
          description: User removed from organization
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/identity/orgs/{orgId}/users/bulk:
    post:
      x-internal: ["cloud"]
      tags:
        - users
      operationId: bulkDeleteOrganizationUsers
      summary: Bulk delete organization users
      description: Deletes multiple users from an organization.
      parameters:
        - $ref: "#/components/parameters/orgId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkUserDeletePayload"
      responses:
        "200":
          description: Bulk user deletion result
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/identity/orgs/{orgId}/users/online:
    get:
      x-internal: ["cloud"]
      tags:
        - users
      operationId: getRecentlyOnlineUsersForOrg
      summary: Get recently online organization users
      description: Returns recently online users for an organization.
      parameters:
        - $ref: "#/components/parameters/orgId"
      responses:
        "200":
          description: Recently online organization users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/identity/users/profile/{id}:
    get:
      x-internal: ["cloud", "meshery"]
      tags:
        - users
      operationId: getUserProfileById
      summary: Get user profile by ID
      description: Returns the public user profile for the requested ID.
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: User profile for the requested ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPublicProfile"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/identity/users/profile:
    get:
      x-internal: ["cloud", "meshery"]
      tags:
        - users
      operationId: getUser
      summary: Get current user profile
      description: Returns the authenticated user profile.
      responses:
        "200":
          description: Current user profile and role context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"
    put:
      x-internal: ["cloud"]
      tags:
        - users
      operationId: updateProfile
      summary: Update current user profile
      description: Updates a user profile.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserPayload"
      responses:
        "200":
          description: User profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/identity/users/profile/details:
    get:
      x-internal: ["cloud"]
      tags:
        - users
      operationId: getProfileOverview
      summary: Get profile details
      description: Returns account profile details for the authenticated user.
      responses:
        "200":
          description: User profile details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileDetails"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /api/identity/users/profile/provider:
    get:
      x-internal: ["cloud"]
      tags:
        - users
      operationId: getUserProvider
      summary: Get user provider
      description: Returns provider information for the authenticated user.
      responses:
        "200":
          description: User provider information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProvider"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /api/identity/users/{userId}:
    get:
      x-internal: ["cloud"]
      tags:
        - users
      operationId: getUserById
      summary: Get user by ID
      description: Returns a user profile by ID.
      parameters:
        - $ref: "#/components/parameters/userId"
      responses:
        "200":
          description: User profile for the requested ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"
    delete:
      x-internal: ["cloud"]
      tags:
        - users
      operationId: deleteUserById
      summary: Delete user by ID
      description: Deletes a user account by ID.
      parameters:
        - $ref: "#/components/parameters/userId"
      responses:
        "204":
          description: User deleted
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/identity/user:
    delete:
      x-internal: ["cloud"]
      tags:
        - users
      operationId: deleteOwnAccount
      summary: Delete own account
      description: Deletes the authenticated user's account.
      responses:
        "204":
          description: User account deleted
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /api/identity/users/online:
    get:
      x-internal: ["cloud"]
      tags:
        - users
      operationId: getRecentlyOnlineUsers
      summary: Get recently online users
      description: Returns recently online users.
      responses:
        "200":
          description: Recently online users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /api/identity/users/preferences:
    get:
      x-internal: ["meshery"]
      tags:
        - users
      operationId: getUserPreferences
      summary: Get user preferences
      description: Returns preferences for the authenticated user.
      responses:
        "200":
          description: User preferences response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Preference"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"
    put:
      x-internal: ["cloud", "meshery"]
      tags:
        - users
      operationId: updateUserPreferences
      summary: Update user preferences
      description: Updates preferences for the authenticated user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PreferencePayload"
      responses:
        "200":
          description: User preferences updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Preference"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /api/identity/users/notifications/preferences:
    get:
      x-internal: ["cloud"]
      security: []
      tags:
        - users
      operationId: getAvailableNotificationPreferences
      summary: Get notification preferences
      description: Returns available notification preferences.
      responses:
        "200":
          description: Available notification preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvailableNotificationPreferences"
        "500":
          $ref: "#/components/responses/500"
    put:
      x-internal: ["cloud"]
      tags:
        - users
      operationId: updateNotificationPreferences
      summary: Update notification preferences
      description: Updates notification preferences for the authenticated user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationPreferencePayload"
      responses:
        "200":
          description: Notification preferences updated
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /api/identity/users/notify/comment:
    post:
      x-internal: ["cloud"]
      tags:
        - users
      operationId: handleNotifyMentionUsers
      summary: Notify mentioned users
      description: Sends comment mention notifications to users.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MentionNotificationPayload"
      responses:
        "200":
          description: Mention notifications processed
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /api/identity/users/notify/feedback:
    post:
      x-internal: ["cloud"]
      tags:
        - users
      operationId: handleFeedbackFormSubmission
      summary: Submit user feedback
      description: Sends feedback submitted by the authenticated user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserFeedbackPayload"
      responses:
        "200":
          description: Feedback submitted
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /api/identity/users/password:
    post:
      x-internal: ["cloud"]
      tags:
        - users
      operationId: updateUsersPassword
      summary: Update user password
      description: Updates the authenticated user's password.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordUpdatePayload"
      responses:
        "200":
          description: User password updated
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /api/identity/users/account:
    get:
      x-internal: ["cloud"]
      tags:
        - users
      operationId: getUserAccount
      summary: Link user account
      description: Starts an account-linking flow for the authenticated user.
      parameters:
        - name: oidc
          in: query
          required: false
          description: Optional account-linking provider hint.
          schema:
            type: string
            maxLength: 100
      responses:
        "200":
          description: Account-linking page
          content:
            text/html:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /api/identity/users/search:
    get:
      x-internal: ["cloud"]
      tags:
        - users
      operationId: searchUsers
      summary: Search users
      description: Returns public user records visible to authenticated identity-management flows.
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
        - $ref: "#/components/parameters/orgIdQuery"
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/order"
        - $ref: "#/components/parameters/filter"
      responses:
        "200":
          description: Paginated list of searchable users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchableUsersPage"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /api/identity/users:
    get:
      x-internal: ["cloud", "meshery"]
      tags:
        - users
      operationId: getUsers
      summary: Get users
      description: Returns user records visible to the authenticated caller.
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/order"
        - $ref: "#/components/parameters/filter"
      responses:
        "200":
          description: Paginated list of users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicUsersPage"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

components:
  responses:
    400:
      $ref: "../core/api.yml#/components/responses/400"
    401:
      $ref: "../core/api.yml#/components/responses/401"
    404:
      $ref: "../core/api.yml#/components/responses/404"
    500:
      $ref: "../core/api.yml#/components/responses/500"

  parameters:
    id:
      name: id
      in: path
      required: true
      description: User ID
      schema:
        $ref: "../core/api.yml#/components/schemas/Uuid"
    orgId:
      name: orgId
      in: path
      required: true
      description: Organization ID
      schema:
        $ref: "../core/api.yml#/components/schemas/Uuid"
    orgIdQuery:
      name: orgId
      in: query
      description: Organization ID to scope the request.
      required: false
      schema:
        $ref: "../core/api.yml#/components/schemas/Uuid"
    userId:
      name: userId
      in: path
      required: true
      description: User ID
      schema:
        $ref: "../core/api.yml#/components/schemas/Uuid"
    page:
      name: page
      in: query
      description: Get responses by page
      schema:
        type: string
    pageSize:
      name: pageSize
      in: query
      description: Get responses by page size
      schema:
        type: string
    search:
      $ref: "../core/api.yml#/components/parameters/search"
    order:
      $ref: "../core/api.yml#/components/parameters/order"
    filter:
      $ref: "../core/api.yml#/components/parameters/filter"
    teamId:
      name: teamId
      in: query
      required: false
      description: Optional team filter when listing organization users
      schema:
        $ref: "../core/api.yml#/components/schemas/Uuid"

  securitySchemes:
    jwt:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      $ref: "./user.yaml"

    UserProfile:
      type: object
      additionalProperties: false
      description: Authenticated user profile with role, team, organization, and linked account context.
      required:
        - roleNames
        - linkedAccounts
      properties:
        user:
          $ref: "#/components/schemas/User"
          description: Base user record.
        roleNames:
          type: array
          description: Names of roles assigned to the user.
          items:
            type: string
            maxLength: 100
        teams:
          $ref: "#/components/schemas/TeamsWithCount"
          description: Teams the user belongs to with their assigned role information.
        organizations:
          $ref: "#/components/schemas/OrganizationsWithCount"
          description: Organizations the user belongs to with their assigned role information.
        linkedAccounts:
          type: array
          description: Linked social account providers for the current user.
          items:
            type: string
            maxLength: 100

    UserPublicProfile:
      type: object
      additionalProperties: false
      description: Public user profile fields safe to return without authentication.
      required:
        - id
        - userId
        - firstName
        - lastName
        - status
      properties:
        id:
          $ref: "../core/api.yml#/components/schemas/Uuid"
          description: Unique identifier for the user.
        userId:
          type: string
          maxLength: 200
          description: User's public identifier.
          x-id-format: external
        firstName:
          type: string
          maxLength: 200
          description: User's first name.
        lastName:
          type: string
          maxLength: 300
          description: User's last name.
        avatarUrl:
          type: string
          format: uri
          maxLength: 500
          description: URL to the user's avatar image.
        bio:
          type: string
          maxLength: 1000
          description: User's biography or description.
        status:
          type: string
          maxLength: 100
          enum:
            - active
            - inactive
            - pending
            - anonymous
          description: User's account status.
        socials:
          type: array
          description: Public online profiles associated with the user's account.
          items:
            $ref: "#/components/schemas/Social"

    TeamsWithCount:
      type: object
      additionalProperties: false
      description: Team memberships with the total membership count.
      required:
        - teamsWithRoles
        - totalCount
      properties:
        teamsWithRoles:
          type: array
          description: Team memberships with the user's assigned roles.
          items:
            $ref: "#/components/schemas/TeamWithUserRoles"
        totalCount:
          type: integer
          description: Total number of team memberships returned for the user.
          minimum: 0

    OrganizationsWithCount:
      type: object
      additionalProperties: false
      description: Organization memberships with the total membership count.
      required:
        - organizationsWithRoles
        - totalCount
      properties:
        organizationsWithRoles:
          type: array
          description: Organization memberships with the user's assigned roles.
          items:
            $ref: "#/components/schemas/OrganizationWithUserRoles"
        totalCount:
          type: integer
          description: Total number of organization memberships returned for the user.
          minimum: 0

    TeamWithUserRoles:
      type: object
      description: Team membership record with role information.
      additionalProperties: false
      required:
        - id
        - name
        - description
        - owner
        - metadata
        - createdAt
        - updatedAt
        - deletedAt
        - roleNames
      properties:
        id:
          $ref: "../core/api.yml#/components/schemas/Uuid"
          description: Unique identifier for the team.
          x-go-name: ID
          x-oapi-codegen-extra-tags:
            db: id
        name:
          type: string
          description: Team name.
          maxLength: 255
          x-oapi-codegen-extra-tags:
            db: name
        description:
          type: string
          description: Team description.
          maxLength: 1024
          x-oapi-codegen-extra-tags:
            db: description
        owner:
          $ref: "../core/api.yml#/components/schemas/Uuid"
          description: User ID of the team owner.
          x-oapi-codegen-extra-tags:
            db: owner
        metadata:
          type: object
          description: Team metadata stored with the membership row.
          additionalProperties: true
          x-go-type: "core.Map"
          x-go-type-import:
            path: github.com/meshery/schemas/models/core
            name: core
          x-go-type-skip-optional-pointer: true
          x-oapi-codegen-extra-tags:
            db: metadata
        createdAt:
          $ref: "../core/api.yml#/components/schemas/Time"
          description: Timestamp when the team was created.
          x-oapi-codegen-extra-tags:
            db: created_at
            json: createdAt
        updatedAt:
          $ref: "../core/api.yml#/components/schemas/Time"
          description: Timestamp when the team was last updated.
          x-oapi-codegen-extra-tags:
            db: updated_at
            json: updatedAt
        deletedAt:
          $ref: "../core/api.yml#/components/schemas/NullTime"
          description: Timestamp when the team was soft-deleted, if applicable.
          x-oapi-codegen-extra-tags:
            db: deleted_at
            json: deletedAt
        roleNames:
          type: array
          description: Names of roles assigned to the user in this team.
          items:
            type: string
            maxLength: 100
          x-go-type: pq.StringArray
          x-go-type-import:
            path: github.com/lib/pq
            name: pq
          x-oapi-codegen-extra-tags:
            db: role_names

    OrganizationWithUserRoles:
      type: object
      description: Organization membership record with role information.
      additionalProperties: false
      required:
        - id
        - name
        - description
        - country
        - region
        - owner
        - metadata
        - createdAt
        - updatedAt
        - deletedAt
        - roleNames
      properties:
        id:
          $ref: "../core/api.yml#/components/schemas/Uuid"
          description: Unique identifier for the organization.
          x-go-name: ID
          x-oapi-codegen-extra-tags:
            db: id
        name:
          type: string
          description: Organization name.
          maxLength: 255
          x-oapi-codegen-extra-tags:
            db: name
        description:
          type: string
          description: Organization description.
          maxLength: 1024
          x-oapi-codegen-extra-tags:
            db: description
        country:
          type: string
          description: Organization country.
          maxLength: 200
