openapi: 3.0.3
info:
  title: User
  description: OpenAPI schema for user management in Meshery Cloud.
  version: v1beta2
  contact:
    name: Meshery Maintainers
    email: maintainers@meshery.io
    url: https://meshery.io
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

security:
  - jwt: []

tags:
  - name: users
    description: Operations related to users

paths:
  /api/identity/orgs/{orgId}/users:
    get:
      x-internal: ["cloud", "meshery"]
      tags:
        - users
      operationId: getUsersForOrg
      summary: Get organization users
      description: Returns organization users, optionally filtered by team membership.
      parameters:
        - $ref: "#/components/parameters/orgId"
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/order"
        - $ref: "#/components/parameters/filter"
        - $ref: "#/components/parameters/teamId"
      responses:
        "200":
          description: Paginated list of organization users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsersPageForAdmin"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/users:
    get:
      x-internal: ["cloud", "meshery"]
      tags:
        - users
      operationId: getUsers
      summary: Get public users
      description: Returns publicly viewable user records.
      security: []
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/order"
        - $ref: "#/components/parameters/filter"
      responses:
        "200":
          description: Paginated list of public users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsersPageForNonAdmin"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /api/identity/users/profile/{id}:
    get:
      x-internal: ["cloud", "meshery"]
      tags:
        - users
      operationId: getUserProfileById
      summary: Get user profile by ID
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: User profile for the requested ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/identity/users/profile:
    get:
      x-internal: ["cloud", "meshery"]
      tags:
        - users
      operationId: getUser
      summary: Get current user profile
      responses:
        "200":
          description: Current user profile and role context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /api/identity/users/profile/details:
    get:
      x-internal: ["cloud"]
      tags:
        - users
      operationId: getUserProfileOverview
      summary: Get profile overview counts for the current user
      description: >-
        Returns the aggregate counts shown on the caller's profile overview:
        the number of Kubernetes contexts and the number of designs owned by
        the caller.
      responses:
        "200":
          description: Profile overview counts for the caller
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileOverview"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /api/identity/users/{userId}/profile/activity:
    get:
      x-internal: ["cloud"]
      tags:
        - users
      operationId: getUserRecentActivities
      summary: Get recent activity for a user's public profile
      description: >-
        Returns the recent-activity feed shown on a user's public profile.
        Accessible without authentication; sensitive event categories are
        filtered out and email addresses are redacted unless the caller is a
        provider admin or is viewing their own profile. Pagination beyond the
        first page requires provider-admin privileges.
      security: []
      parameters:
        - $ref: "#/components/parameters/userId"
        - name: page
          in: query
          description: Zero-based page index of the activity feed.
          schema:
            type: integer
            minimum: 0
        - name: pageSize
          in: query
          description: Number of activity entries per page.
          schema:
            type: integer
            minimum: 1
        - name: pagesize
          in: query
          deprecated: true
          description: >-
            Deprecated lowercase alias of pageSize, kept while existing clients
            migrate to the canonical camelCase parameter.
          schema:
            type: integer
            minimum: 1
        - $ref: "#/components/parameters/order"
        - $ref: "#/components/parameters/filter"
      responses:
        "200":
          description: Recent-activity page for the requested user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecentActivityPage"
        "400":
          $ref: "#/components/responses/400"
        "500":
          $ref: "#/components/responses/500"

  /api/identity/users/notify/comment:
    post:
      x-internal: ["cloud"]
      tags:
        - users
      operationId: notifyMentionUsers
      summary: Notify users mentioned in a design comment
      description: >-
        Sends email notifications to the users mentioned in a design comment,
        to the comment thread participants, and to the design owner, and
        records a user event for the comment.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MentionNotificationPayload"
      responses:
        "200":
          description: Mention notifications dispatched
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /api/identity/users/anonymous:
    post:
      x-internal: ["cloud"]
      tags:
        - users
      operationId: createAnonymousUserSession
      summary: Create an anonymous user and issue a session token
      description: >-
        Mints a synthetic anonymous user account, registers the calling Meshery
        instance as a connection, and returns an access token together with the
        capability document for the anonymous session. Authenticated with the
        shared anonymous-results publishing token rather than a user JWT.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "../../v1beta3/connection/api.yml#/components/schemas/ConnectionPayload"
      responses:
        "200":
          description: Anonymous session issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnonymousFlowResponse"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /api/identity/users/self/account-deletion-eligibility:
    get:
      x-internal: ["cloud"]
      tags:
        - users
      operationId: getAccountDeletionEligibility
      summary: Get account deletion eligibility
      description: >-
        Pre-check evaluated before an account self-deletion is confirmed.
        Reports whether deleting the caller's account would also require or
        permit hard-deleting their organization, whether that organization is
        the shared Layer5 provider organization or carries an active paid
        subscription, how many of its resources are also shared into other
        surviving organizations, and the per-resource blast radius of the
        deletion.
      parameters:
        - name: organizationId
          in: query
          required: false
          description: >-
            Organization to evaluate for deletion alongside the account. When
            omitted, the caller's currently selected organization is evaluated.
          schema:
            $ref: "../core/api.yml#/components/schemas/Uuid"
      responses:
        "200":
          description: Account deletion eligibility for the caller
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountDeletionEligibility"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/identity/users/{userId}/emails:
    get:
      x-internal: ["cloud", "meshery"]
      tags:
        - users
      operationId: getUserEmailAddresses
      summary: Get email addresses for a user
      description: >-
        Returns all email addresses associated with a user account: the
        single live primary address (mirrored in users.email) and any
        secondary addresses accumulated from account consolidation or
        explicit addition.
      parameters:
        - $ref: "#/components/parameters/userId"
      responses:
        "200":
          description: Email addresses associated with the requested user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserEmailAddress"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/identity/users/self:
    delete:
      x-internal: ["cloud"]
      tags:
        - users
      operationId: deleteUserAccount
      summary: Delete the caller's own account
      description: >-
        Soft-deletes the caller's Layer5 Cloud user record and hard-deletes the
        backing identity. When deleteOrganization is true, the caller's
        organization is hard-deleted in the same operation, subject to
        server-side re-validation: the organization must not be the shared
        Layer5 provider organization, must not have an active paid subscription,
        and organizationNameConfirmation must match the stored organization
        name. When the organization shares resources into other surviving
        organizations, confirmSharedResourceDestruction must also be true.
        Inputs are passed as query parameters because DELETE request bodies are
        unreliable across the extension proxy and intermediate HTTP clients.
      parameters:
        - name: deleteOrganization
          in: query
          required: false
          description: >-
            When true, hard-delete the caller's organization along with the
            account. Defaults to false (delete only the account).
          schema:
            type: boolean
        - name: organizationId
          in: query
          required: false
          description: >-
            Identifier of the organization to hard-delete. Required by the
            server when deleteOrganization is true.
          schema:
            $ref: "../core/api.yml#/components/schemas/Uuid"
        - name: organizationNameConfirmation
          in: query
          required: false
          description: >-
            User-typed organization name. The server re-validates this against
            the stored organization name when deleteOrganization is true and
            rejects the request on mismatch.
          schema:
            type: string
        - name: confirmSharedResourceDestruction
          in: query
          required: false
          description: >-
            Explicit acknowledgement that resources shared into other surviving
            organizations will be destroyed. Required by the server when the
            organization's crossTenantSharedResourceCount is greater than zero.
          schema:
            type: boolean
      responses:
        "204":
          description: Account (and organization, when requested) deleted
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "409":
          $ref: "#/components/responses/AccountDeletionConflict"
        "500":
          $ref: "#/components/responses/500"
components:
  responses:
    400:
      $ref: "../core/api.yml#/components/responses/400"
    401:
      $ref: "../core/api.yml#/components/responses/401"
    404:
      $ref: "../core/api.yml#/components/responses/404"
    409:
      $ref: "../core/api.yml#/components/responses/409"
    500:
      $ref: "../core/api.yml#/components/responses/500"
    AccountDeletionConflict:
      description: >-
        Deletion preconditions were not met. Returned when the target
        organization is the shared Layer5 provider organization, has an active
        paid subscription, the caller is not its sole active member, the typed
        organizationNameConfirmation did not match, or destruction of shared
        resources was required but not confirmed.
      content:
        text/plain:
          schema:
            type: string

  parameters:
    id:
      name: id
      in: path
      required: true
      description: User ID
      schema:
        $ref: "../core/api.yml#/components/schemas/Uuid"
    orgId:
      name: orgId
      in: path
      required: true
      description: Organization ID
      schema:
        type: string
        format: uuid
    userId:
      name: userId
      in: path
      required: true
      description: ID of the user
      schema:
        $ref: "../core/api.yml#/components/schemas/Uuid"
    page:
      name: page
      in: query
      description: Get responses by page
      schema:
        type: integer
    pageSize:
      name: pageSize
      in: query
      description: Get responses by page size
      schema:
        type: integer
    search:
      $ref: "../core/api.yml#/components/parameters/search"
    order:
      $ref: "../core/api.yml#/components/parameters/order"
    filter:
      $ref: "../core/api.yml#/components/parameters/filter"
    teamId:
      name: teamId
      in: query
      required: false
      description: Optional team filter when listing organization users
      schema:
        type: string
        format: uuid

  securitySchemes:
    jwt:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      description: Represents a user
      required:
        - id
        - userId
        - provider
        - email
        - firstName
        - lastName
        - status
        - createdAt
        - updatedAt
        - lastLoginTime
        - deletedAt
      properties:
        id:
          $ref: "../core/api.yml#/components/schemas/Uuid"
          description: Unique identifier for the user
          x-go-name: ID
          x-oapi-codegen-extra-tags:
            db: "id"
            json: "id"
        userId:
          type: string
          maxLength: 200
          deprecated: true
          description: >-
            Legacy IdP-derived identifier. Removed in v1beta3; resolve users
            by id or email.
          x-oapi-codegen-extra-tags:
            db: "user_id"
            json: "userId"
          x-id-format: external
        provider:
          type: string
          maxLength: 100
          description: "Authentication provider (e.g., Google, Github)"
          example:
            - local
            - github
            - google
            - twitter
          x-oapi-codegen-extra-tags:
            db: "provider"
            json: "provider"
        email:
          type: string
          format: email
          maxLength: 300
          description: User's email address
          x-oapi-codegen-extra-tags:
            db: "email"
            json: "email"
        firstName:
          type: string
          maxLength: 200
          description: User's first name
          x-oapi-codegen-extra-tags:
            db: "first_name"
            json: "firstName"
        lastName:
          type: string
          maxLength: 300
          description: User's last name
          x-oapi-codegen-extra-tags:
            db: "last_name"
            json: "lastName"
        avatarUrl:
          type: string
          format: uri
          maxLength: 500
          description: URL to user's avatar image
          x-oapi-codegen-extra-tags:
            db: "avatar_url"
            json: "avatarUrl"
        status:
          type: string
          maxLength: 100
          enum:
            - active
            - inactive
            - pending
            - anonymous
          description: User account status
          x-oapi-codegen-extra-tags:
            db: "status"
            json: "status"
        bio:
          type: string
          maxLength: 1000
          default: ""
          description: User's biography or description
          x-oapi-codegen-extra-tags:
            db: "bio"
            json: "bio"
        country:
          type: object
          description: User's country information stored as JSONB
          additionalProperties: true
          x-go-type: "core.Map"
          x-go-type-skip-optional-pointer: true
          x-oapi-codegen-extra-tags:
            db: "country"
            json: "country"
        region:
          type: object
          description: User's region information stored as JSONB
          additionalProperties: true
          x-go-type: "core.Map"
          x-go-type-skip-optional-pointer: true
          x-oapi-codegen-extra-tags:
            db: "region"
            json: "region"
        preferences:
          $ref: "#/components/schemas/Preference"
          x-go-type: "Preference"
          description: User preferences stored as JSONB
          x-oapi-codegen-extra-tags:
            db: "preferences"
            json: "preferences"
        acceptedTermsAt:
          $ref: "../core/api.yml#/components/schemas/Time"
          description: Timestamp when user accepted terms and conditions
          x-oapi-codegen-extra-tags:
            db: "accepted_terms_at"
            json: "acceptedTermsAt"
        firstLoginTime:
          $ref: "../core/api.yml#/components/schemas/Time"
          description: Timestamp of user's first login
          x-oapi-codegen-extra-tags:
            db: "first_login_time"
            json: "firstLoginTime"
        lastLoginTime:
          $ref: "../core/api.yml#/components/schemas/Time"
          description: Timestamp of user's most recent login
          x-oapi-codegen-extra-tags:
            db: "last_login_time"
            json: "lastLoginTime"
        createdAt:
          $ref: "../core/api.yml#/components/schemas/Time"
          description: Timestamp when the user record was created
          x-oapi-codegen-extra-tags:
            db: "created_at"
            json: "createdAt"
        updatedAt:
          $ref: "../core/api.yml#/components/schemas/Time"
          description: Timestamp when the user record was last updated
          x-oapi-codegen-extra-tags:
            db: "updated_at"
            json: "updatedAt"
        socials:
          type: array
          description: Various online profiles associated with the user account
          # use a custom type to represent a slice of Social structs , the default is []Social which
          # cant be used with sql drivers as we cant add methods to that type
          x-go-type: "UserSocials"
          items:
            $ref: "#/components/schemas/Social"
            x-go-type: "Social"
          x-oapi-codegen-extra-tags:
            db: "socials"
            json: "socials"
        deletedAt:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the user record was soft-deleted (null if not deleted)
          x-go-type: "core.NullTime"
          x-oapi-codegen-extra-tags:
            db: "deleted_at"
            json: "deletedAt"
        roleNames:
          type: array
          x-go-type: pq.StringArray
          x-go-type-import:
            path: github.com/lib/pq
          x-go-type-skip-optional-pointer: true
          items:
            type: string
          description: >-
            Names of the global roles assigned to the user. Free-form,
            user-generated values sourced from the roles table (role_name is a
            varchar, not a fixed enumeration); the seeded system roles such as
            "admin", "organization admin" and "user" are a subset, not the whole
            set.
          example: ["organization admin", "user"]
          x-oapi-codegen-extra-tags:
            db: "role_names"
            json: "roleNames"
        teams:
          type: object
          description: Teams the user belongs to with role information
          x-oapi-codegen-extra-tags:
            db: "teams"
            json: "teams"
          properties:
            teamsWithRoles:
              type: array
              description: Team memberships for the user with their assigned roles.
              items:
                $ref: "#/components/schemas/TeamWithRoles"
              x-oapi-codegen-extra-tags:
                db: "teams_with_roles"
                json: "teamsWithRoles"
            totalCount:
              type: integer
              description: Total number of team memberships returned for the user.
              minimum: 0
              x-oapi-codegen-extra-tags:
                db: "total_count"
                json: "totalCount"
        organizations:
          type: object
          description: Organizations the user belongs to with role information
          x-oapi-codegen-extra-tags:
            db: "organizations"
            json: "organizations"
          properties:
            organizationsWithRoles:
              type: array
              description: Organization memberships for the user with their assigned roles.
              items:
                $ref: "#/components/schemas/OrganizationWithRoles"
              x-oapi-codegen-extra-tags:
                db: "organizations_with_roles"
                json: "organizationsWithRoles"
            totalCount:
              type: integer
              description: Total number of organization memberships returned for the user.
              minimum: 0
              x-oapi-codegen-extra-tags:
                db: "total_count"
                json: "totalCount"
      additionalProperties: false

    UserEmailAddress:
      type: object
      additionalProperties: false
      description: >-
        One email address associated with a user account. A user has exactly
        one primary address (mirrored in users.email) and any number of
        secondary addresses accumulated from account consolidation or
        explicit addition. Uniqueness across live addresses is enforced
        case-insensitively.
      required:
        - id
        - userId
        - email
        - verified
        - isPrimary
        - source
        - createdAt
        - updatedAt
      properties:
        id:
          $ref: "../core/api.yml#/components/schemas/Uuid"
          description: Unique identifier for this email-address record
          x-go-name: ID
          x-oapi-codegen-extra-tags:
            db: "id"
            json: "id"
        userId:
          $ref: "../core/api.yml#/components/schemas/Uuid"
          description: The user (users.id) this address belongs to
          x-go-name: UserID
          x-oapi-codegen-extra-tags:
            db: "owner"
            json: "userId"
        email:
          type: string
          format: email
          maxLength: 300
          description: The email address
          x-oapi-codegen-extra-tags:
            db: "email"
            json: "email"
        verified:
          type: boolean
          default: false
          description: Whether the address was verified (per Kratos verifiable addresses) at record time
          x-oapi-codegen-extra-tags:
            db: "verified"
            json: "verified"
        isPrimary:
          type: boolean
          default: false
          description: Exactly one live primary address per user; mirrors users.email
          x-oapi-codegen-extra-tags:
            db: "is_primary"
            json: "isPrimary"
        source:
          type: string
          enum: [signup, consolidation, backfill, manual]
          description: How this address became associated with the account
          x-oapi-codegen-extra-tags:
            db: "source"
            json: "source"
        createdAt:
          $ref: "../core/api.yml#/components/schemas/Time"
          x-oapi-codegen-extra-tags:
            db: "created_at"
            json: "createdAt"
        updatedAt:
          $ref: "../core/api.yml#/components/schemas/Time"
          x-oapi-codegen-extra-tags:
            db: "updated_at"
            json: "updatedAt"
        deletedAt:
          $ref: "../core/api.yml#/components/schemas/NullTime"
          x-oapi-codegen-extra-tags:
            db: "deleted_at"
            json: "deletedAt"

    OrganizationWithRoles:
      type: object
      additionalProperties: false
      description: >-
        An organization the user is a member of, together with the names of
        the roles assigned to that user within the organization. Returned as
        an item of User.organizations.organizationsWithRoles. The role names
        are dynamic, user-generated values (no fixed enumeration).
      required:
        - id
        - name
        - roleNames
      properties:
        id:
          $ref: "../core/api.yml#/components/schemas/Uuid"
          description: Unique identifier of the organization.
          x-go-name: ID
          x-order: 1
          x-oapi-codegen-extra-tags:
            db: "id"
            json: "id,omitempty"
        name:
          type: string
          description: Name of the organization.
          x-order: 2
          x-oapi-codegen-extra-tags:
            db: "name"
            json: "name,omitempty"
        description:
          type: string
          description: Human readable description of the organization.
          x-order: 3
          x-oapi-codegen-extra-tags:
            db: "description"
            json: "description,omitempty"
        country:
          type: string
          description: Country associated with the organization.
          x-order: 4
          x-oapi-codegen-extra-tags:
            db: "country"
            json: "country,omitempty"
        region:
          type: string
          description: Region associated with the organization.
          x-order: 5
          x-oapi-codegen-extra-tags:
            db: "region"
            json: "region,omitempty"
        owner:
          $ref: "../core/api.yml#/components/schemas/Uuid"
          description: Identifier of the organization owner.
          x-order: 6
          x-oapi-codegen-extra-tags:
            db: "owner"
            json: "owner,omitempty"
        createdAt:
          $ref: "../core/api.yml#/components/schemas/Time"
          description: Timestamp when the organization was created.
          x-order: 7
          x-oapi-codegen-extra-tags:
            db: "created_at"
            json: "createdAt,omitempty"
        updatedAt:
          $ref: "../core/api.yml#/components/schemas/Time"
          description: Timestamp when the organization was last updated.
          x-order: 8
          x-oapi-codegen-extra-tags:
            db: "updated_at"
            json: "updatedAt,omitempty"
        deletedAt:
          type: string
          format: date-time
          nullable: true
