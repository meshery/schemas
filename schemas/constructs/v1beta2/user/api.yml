openapi: 3.0.3
info:
  title: User
  description: OpenAPI schema for user management in Meshery Cloud.
  version: v1beta2
  contact:
    name: Meshery Maintainers
    email: maintainers@meshery.io
    url: https://meshery.io
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

security:
  - jwt: []

tags:
  - name: users
    description: Operations related to users

paths:
  /api/identity/orgs/{orgId}/users:
    get:
      x-internal: ["cloud", "meshery"]
      tags:
        - users
      operationId: getUsersForOrg
      summary: Get organization users
      description: Returns organization users, optionally filtered by team membership.
      parameters:
        - $ref: "#/components/parameters/orgId"
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/order"
        - $ref: "#/components/parameters/filter"
        - $ref: "#/components/parameters/teamId"
      responses:
        "200":
          description: Paginated list of organization users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsersPageForAdmin"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/identity/orgs/{orgId}/users/{userId}:
    post:
      x-internal: ["cloud"]
      tags:
        - users
      operationId: addUserToOrganization
      summary: Add user to organization
      description: Adds a user to an organization.
      parameters:
        - $ref: "#/components/parameters/orgId"
        - $ref: "#/components/parameters/userId"
      responses:
        "201":
          description: User added to organization
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"
    delete:
      x-internal: ["cloud"]
      tags:
        - users
      operationId: removeUserFromOrganization
      summary: Remove user from organization
      description: Removes a user from an organization.
      parameters:
        - $ref: "#/components/parameters/orgId"
        - $ref: "#/components/parameters/userId"
      responses:
        "204":
          description: User removed from organization
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/identity/orgs/{orgId}/users/bulk:
    post:
      x-internal: ["cloud"]
      tags:
        - users
      operationId: bulkDeleteOrganizationUsers
      summary: Bulk delete organization users
      description: Deletes multiple users from an organization.
      parameters:
        - $ref: "#/components/parameters/orgId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkUserDeletePayload"
      responses:
        "200":
          description: Bulk user deletion result
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /api/identity/orgs/{orgId}/users/online:
    get:
      x-internal: ["cloud"]
      tags:
        - users
      operationId: getRecentlyOnlineUsersForOrg
      summary: Get recently online organization users
      description: Returns recently online users for an organization.
      parameters:
        - $ref: "#/components/parameters/orgId"
      responses:
        "200":
          description: Recently online organization users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /api/users:
    get:
      x-internal: ["cloud", "meshery"]
      tags:
        - users
      operationId: getUsers
      summary: Get public users
      description: Returns publicly viewable user records.
      security: []
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/order"
        - $ref: "#/components/parameters/filter"
      responses:
        "200":
          description: Paginated list of public users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsersPageForNonAdmin"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /api/identity/users/profile/{id}:
    get:
      x-internal: ["cloud", "meshery"]
      tags:
        - users
      operationId: getUserProfileById
      summary: Get user profile by ID
      description: Returns a user profile by ID.
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: User profile for the requested ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/identity/users/profile:
    get:
      x-internal: ["cloud", "meshery"]
      tags:
        - users
      operationId: getUser
      summary: Get current user profile
      description: Returns the authenticated user profile.
      responses:
        "200":
          description: Current user profile and role context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"
    put:
      x-internal: ["cloud"]
      tags:
        - users
      operationId: updateProfile
      summary: Update current user profile
      description: Updates a user profile.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserPayload"
      responses:
        "200":
          description: User profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/identity/users/profile/details:
    get:
      x-internal: ["cloud"]
      tags:
        - users
      operationId: getProfileOverview
      summary: Get profile details
      description: Returns account profile details for the authenticated user.
      responses:
        "200":
          description: User profile details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileDetails"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /api/identity/users/profile/provider:
    get:
      x-internal: ["cloud"]
      tags:
        - users
      operationId: getUserProvider
      summary: Get user provider
      description: Returns provider information for the authenticated user.
      responses:
        "200":
          description: User provider information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProvider"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /api/identity/users/{userId}:
    get:
      x-internal: ["cloud"]
      tags:
        - users
      operationId: getUserById
      summary: Get user by ID
      description: Returns a user profile by ID.
      parameters:
        - $ref: "#/components/parameters/userId"
      responses:
        "200":
          description: User profile for the requested ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"
    delete:
      x-internal: ["cloud"]
      tags:
        - users
      operationId: deleteUserById
      summary: Delete user by ID
      description: Deletes a user account by ID.
      parameters:
        - $ref: "#/components/parameters/userId"
      responses:
        "204":
          description: User deleted
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/identity/users/self:
    delete:
      x-internal: ["cloud"]
      tags:
        - users
      operationId: deleteOwnAccount
      summary: Delete own account
      description: Deletes the authenticated user's account.
      responses:
        "204":
          description: User account deleted
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /api/identity/users/online:
    get:
      x-internal: ["cloud"]
      tags:
        - users
      operationId: getRecentlyOnlineUsers
      summary: Get recently online users
      description: Returns recently online users.
      responses:
        "200":
          description: Recently online users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /api/identity/users/preferences:
    put:
      x-internal: ["cloud"]
      tags:
        - users
      operationId: updateUserPreference
      summary: Update user preferences
      description: Updates preferences for the authenticated user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PreferencePayload"
      responses:
        "200":
          description: User preferences updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Preference"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /api/identity/users/notifications/preferences:
    get:
      x-internal: ["cloud"]
      tags:
        - users
      operationId: getAvailableNotificationPreferences
      summary: Get notification preferences
      description: Returns available notification preferences.
      responses:
        "200":
          description: Available notification preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvailableNotificationPreferences"
        "500":
          $ref: "#/components/responses/500"
    put:
      x-internal: ["cloud"]
      tags:
        - users
      operationId: updateNotificationPreferences
      summary: Update notification preferences
      description: Updates notification preferences for the authenticated user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationPreferencePayload"
      responses:
        "200":
          description: Notification preferences updated
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /api/identity/users/notify/comment:
    post:
      x-internal: ["cloud"]
      tags:
        - users
      operationId: handleNotifyMentionUsers
      summary: Notify mentioned users
      description: Sends comment mention notifications to users.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MentionNotificationPayload"
      responses:
        "200":
          description: Mention notifications processed
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /api/identity/users/notify/feedback:
    post:
      x-internal: ["cloud"]
      tags:
        - users
      operationId: handleFeedbackFormSubmission
      summary: Submit user feedback
      description: Sends feedback submitted by the authenticated user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserFeedbackPayload"
      responses:
        "200":
          description: Feedback submitted
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /api/identity/users/password:
    post:
      x-internal: ["cloud"]
      tags:
        - users
      operationId: updateUsersPassword
      summary: Update user password
      description: Updates the authenticated user's password.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordUpdatePayload"
      responses:
        "200":
          description: User password updated
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /api/identity/users/account:
    get:
      x-internal: ["cloud"]
      tags:
        - users
      operationId: getUserAccount
      summary: Link user account
      description: Starts an account-linking flow for the authenticated user.
      parameters:
        - name: oidc
          in: query
          required: false
          description: Optional account-linking provider hint.
          schema:
            type: string
            maxLength: 100
      responses:
        "302":
          description: Account-linking flow redirect
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /api/identity/users/anonymous:
    post:
      x-internal: ["cloud"]
      tags:
        - users
      operationId: handleAnonymousUserIdentity
      summary: Create anonymous user identity
      description: Creates an anonymous user identity and returns an access token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnonymousUserPayload"
      responses:
        "200":
          description: Anonymous user identity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnonymousFlowResponse"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /api/user:
    get:
      x-internal: ["meshery"]
      tags:
        - users
      operationId: getCurrentUser
      summary: Get current user (legacy alias)
      description: Returns the authenticated user profile.
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /api/user/profile/{id}:
    get:
      x-internal: ["meshery"]
      tags:
        - users
      operationId: getUserByIdLegacy
      summary: Get user by ID (legacy alias)
      description: Returns a user profile by ID.
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: User profile for the requested ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/identity/users:
    get:
      x-internal: ["meshery"]
      tags:
        - users
      operationId: listUsers
      summary: List users
      description: Lists users visible to the authenticated caller.
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/order"
        - $ref: "#/components/parameters/filter"
      responses:
        "200":
          description: Paginated list of users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsersPageForNonAdmin"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"
    post:
      x-internal: ["cloud"]
      tags:
        - users
      operationId: createUser
      summary: Create user
      description: Creates a user record.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserPayload"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /api/user/prefs:
    get:
      x-internal: ["meshery"]
      tags:
        - users
      operationId: getUserPreferences
      summary: Get user preferences
      description: Returns user preferences for the authenticated user.
      responses:
        "200":
          description: User preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Preference"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"
    post:
      x-internal: ["meshery"]
      tags:
        - users
      operationId: updateUserPreferences
      summary: Update user preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PreferencePayload"
      responses:
        "200":
          description: Updated user preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Preference"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

components:
  responses:
    400:
      $ref: "../core/api.yml#/components/responses/400"
    401:
      $ref: "../core/api.yml#/components/responses/401"
    404:
      $ref: "../core/api.yml#/components/responses/404"
    500:
      $ref: "../core/api.yml#/components/responses/500"

  parameters:
    id:
      name: id
      in: path
      required: true
      description: User ID
      schema:
        $ref: "../core/api.yml#/components/schemas/Uuid"
    orgId:
      name: orgId
      in: path
      required: true
      description: Organization ID
      schema:
        type: string
        format: uuid
    userId:
      name: userId
      in: path
      required: true
      description: User ID
      schema:
        type: string
        format: uuid
    page:
      name: page
      in: query
      description: Get responses by page
      schema:
        type: string
    pageSize:
      name: pageSize
      in: query
      description: Get responses by page size
      schema:
        type: string
    search:
      $ref: "../core/api.yml#/components/parameters/search"
    order:
      $ref: "../core/api.yml#/components/parameters/order"
    filter:
      $ref: "../core/api.yml#/components/parameters/filter"
    teamId:
      name: teamId
      in: query
      required: false
      description: Optional team filter when listing organization users
      schema:
        type: string
        format: uuid

  securitySchemes:
    jwt:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      description: Represents a user in Layer5 Cloud (Meshery)
      required:
        - id
        - userId
        - provider
        - email
        - firstName
        - lastName
        - status
        - createdAt
        - updatedAt
        - lastLoginTime
        - deletedAt
      properties:
        id:
          $ref: "../core/api.yml#/components/schemas/Uuid"
          description: Unique identifier for the user
          x-go-name: ID
          x-oapi-codegen-extra-tags:
            db: "id"
            json: "id"
        userId:
          type: string
          maxLength: 200
          description: User identifier (username or external ID)
          x-oapi-codegen-extra-tags:
            db: "user_id"
            json: "userId"
          x-id-format: external
        provider:
          type: string
          maxLength: 100
          description: "Authentication provider (e.g., Layer5 Cloud, Twitter, Facebook, Github)"
          example:
            - local
            - github
            - google
            - twitter
          x-oapi-codegen-extra-tags:
            db: "provider"
            json: "provider"
        email:
          type: string
          format: email
          maxLength: 300
          description: User's email address
          x-oapi-codegen-extra-tags:
            db: "email"
            json: "email"
        firstName:
          type: string
          maxLength: 200
          description: User's first name
          x-oapi-codegen-extra-tags:
            db: "first_name"
            json: "firstName"
        lastName:
          type: string
          maxLength: 300
          description: User's last name
          x-oapi-codegen-extra-tags:
            db: "last_name"
            json: "lastName"
        avatarUrl:
          type: string
          format: uri
          maxLength: 500
          description: URL to user's avatar image
          x-oapi-codegen-extra-tags:
            db: "avatar_url"
            json: "avatarUrl"
        status:
          type: string
          maxLength: 100
          enum:
            - active
            - inactive
            - pending
            - anonymous
          description: User account status
          x-oapi-codegen-extra-tags:
            db: "status"
            json: "status"
        bio:
          type: string
          maxLength: 1000
          default: ""
          description: User's biography or description
          x-oapi-codegen-extra-tags:
            db: "bio"
            json: "bio"
        country:
          type: object
          description: User's country information stored as JSONB
          additionalProperties: true
          x-go-type: "core.Map"
          x-go-type-skip-optional-pointer: true
          x-oapi-codegen-extra-tags:
            db: "country"
            json: "country"
        region:
          type: object
          description: User's region information stored as JSONB
          additionalProperties: true
          x-go-type: "core.Map"
          x-go-type-skip-optional-pointer: true
          x-oapi-codegen-extra-tags:
            db: "region"
            json: "region"
        preferences:
          $ref: "#/components/schemas/Preference"
          x-go-type: "Preference"
          description: User preferences stored as JSONB
          x-oapi-codegen-extra-tags:
            db: "preferences"
            json: "preferences"
        acceptedTermsAt:
          $ref: "../core/api.yml#/components/schemas/Time"
          description: Timestamp when user accepted terms and conditions
          x-oapi-codegen-extra-tags:
            db: "accepted_terms_at"
            json: "acceptedTermsAt"
        firstLoginTime:
          $ref: "../core/api.yml#/components/schemas/Time"
          description: Timestamp of user's first login
          x-oapi-codegen-extra-tags:
            db: "first_login_time"
            json: "firstLoginTime"
        lastLoginTime:
          $ref: "../core/api.yml#/components/schemas/Time"
          description: Timestamp of user's most recent login
          x-oapi-codegen-extra-tags:
            db: "last_login_time"
            json: "lastLoginTime"
        createdAt:
          $ref: "../core/api.yml#/components/schemas/Time"
          description: Timestamp when the user record was created
          x-oapi-codegen-extra-tags:
            db: "created_at"
            json: "createdAt"
        updatedAt:
          $ref: "../core/api.yml#/components/schemas/Time"
          description: Timestamp when the user record was last updated
          x-oapi-codegen-extra-tags:
            db: "updated_at"
            json: "updatedAt"
        socials:
          type: array
          description: Various online profiles associated with the user account
          # use a custom type to represent a slice of Social structs , the default is []Social which
          # cant be used with sql drivers as we cant add methods to that type
          x-go-type: "UserSocials"
          items:
            $ref: "#/components/schemas/Social"
