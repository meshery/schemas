$id: https://schemas.meshery.io/connection.yaml
$schema: http://json-schema.org/draft-07/schema#
description: Meshery Connections are managed and unmanaged resources that either through discovery or manual entry are tracked by Meshery. Learn more at https://docs.meshery.io/concepts/logical/connections
additionalProperties: false
type: object
required:
  - id
  - schemaVersion
  - name
  - type
  - sub_type
  - kind
  - status
properties:
  id:
    $ref: ../core/api.yml#/components/schemas/Uuid
    description: Connection ID
    x-order: 1
    x-go-name: ID
    x-oapi-codegen-extra-tags:
      db: id
      yaml: id
  name:
    x-oapi-codegen-extra-tags:
      db: name
      yaml: name
    x-order: 2
    type: string
    description: Connection Name
    minLength: 1
    maxLength: 255
  credential_id:
    x-go-name: CredentialID
    x-oapi-codegen-extra-tags:
      db: credential_id
      yaml: credential_id
    x-order: 3
    $ref: ../core/api.yml#/components/schemas/Uuid
    description: Associated Credential ID
  type:
    x-oapi-codegen-extra-tags:
      db: type
      yaml: type
    x-order: 4
    type: string
    description: Connection Type (platform, telemetry, collaboration)
    maxLength: 255
  sub_type:
    x-oapi-codegen-extra-tags:
      db: sub_type
      yaml: sub_type
    x-order: 5
    type: string
    description: Connection Subtype (cloud, identity, metrics, chat, git, orchestration)
    maxLength: 255
  kind:
    x-oapi-codegen-extra-tags:
      db: kind
      yaml: kind
    x-order: 6
    type: string
    description: Connection Kind (meshery, kubernetes, prometheus, grafana, gke, aws, azure, slack, github)
    maxLength: 255
  metadata:
    x-oapi-codegen-extra-tags:
      db: metadata
      yaml: metadata
    x-order: 7
    x-go-type: core.Map
    x-go-type-import:
      path: github.com/meshery/schemas/models/core
    x-go-type-skip-optional-pointer: true
    type: object
    description: Additional connection metadata
  status:
    x-oapi-codegen-extra-tags:
      db: status
      yaml: status
    x-order: 8
    description: Connection Status
    type: string
    enum:
      - discovered
      - registered
      - connected
      - ignored
      - maintenance
      - disconnected
      - deleted
      - not found
  user_id:
    x-go-name: UserID
    x-oapi-codegen-extra-tags:
      db: user_id
      yaml: user_id
    x-order: 9
    $ref: ../core/api.yml#/components/schemas/Uuid
    description: User ID who owns this connection
  created_at:
    $ref: ../core/api.yml#/components/schemas/Time
    x-oapi-codegen-extra-tags:
      db: created_at
      yaml: created_at
    x-order: 10
  updated_at:
    $ref: ../core/api.yml#/components/schemas/Time
    x-oapi-codegen-extra-tags:
      db: updated_at
      yaml: updated_at
    x-order: 11
  deleted_at:
    $ref: ../core/api.yml#/components/schemas/NullTime
    x-oapi-codegen-extra-tags:
      db: deleted_at
      yaml: deleted_at
    x-order: 12
  environments:
    type: array
    description: Associated environments for this connection
    items:
      x-go-type: "*environmentv1beta1.Environment"
      x-go-type-import:
        path: github.com/meshery/schemas/models/v1beta1/environment
        name: environmentv1beta1
      $ref: ../../v1beta1/environment/api.yml#/components/schemas/Environment
    x-oapi-codegen-extra-tags:
      db: "-"
      yaml: environments
      gorm: "-"
    x-go-type-skip-optional-pointer: true
    x-order: 13
  schemaVersion:
    description: Specifies the version of the schema used for the definition.
    $ref: ../core/api.yml#/components/schemas/VersionString
    x-order: 14
    x-oapi-codegen-extra-tags:
      yaml: schemaVersion
      db: "-"
      gorm: "-"
    default: connections.meshery.io/v1beta2
