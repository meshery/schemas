openapi: 3.0.0
info:
  title: Badge
  description: OpenAPI schema for managing badges.
  version: v1beta2
  x-annotation: ["cloud"]
  contact:
    name: Meshery Maintainers
    email: maintainers@meshery.io
    url: https://meshery.io
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

security:
  - jwt: []

tags:
  - name: Badge
    description: Operations related to user and organization badges.

paths:
  /api/organizations/badges/{badgeId}:
    delete:
      x-internal: ["cloud"]
      x-annotation: ["cloud"]
      operationId: deleteBadgeById
      tags:
        - Badge
      summary: Delete a badge by its ID
      parameters:
        - $ref: "#/components/parameters/badgeId"
      responses:
        "204":
          description: Badge deleted
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

    get:
      x-internal: ["cloud"]
      x-annotation: ["cloud"]
      operationId: getBadgeById
      tags:
        - Badge
      summary: Get a badge by its ID
      parameters:
        - $ref: "#/components/parameters/badgeId"
      responses:
        "200":
          description: Badge response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Badge"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/organizations/badges:
    post:
      x-internal: ["cloud"]
      x-annotation: ["cloud"]
      operationId: createOrUpdateBadge
      tags:
        - Badge
      summary: Create a new badge or update an existing badge
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BadgePayload"
        required: true
      responses:
        "200":
          description: Badge upserted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Badge"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /api/identity/badges:
    get:
      x-internal: ["cloud"]
      x-annotation: ["cloud"]
      operationId: getAvailableBadges
      tags:
        - Badge
      summary: Get available badges
      parameters:
        - $ref: "#/components/parameters/orgIdQuery"
      responses:
        "200":
          description: Available badges
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadgesPage"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /api/identity/users/badges:
    put:
      x-internal: ["cloud"]
      x-annotation: ["cloud"]
      operationId: assignBadges
      tags:
        - Badge
      summary: Assign badges to a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BadgeAssignmentPayload"
      responses:
        "200":
          description: Badge assignment result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

components:
  responses:
    400:
      $ref: "../../v1alpha1/core/api.yml#/components/responses/400"
    401:
      $ref: "../../v1alpha1/core/api.yml#/components/responses/401"
    404:
      $ref: "../../v1alpha1/core/api.yml#/components/responses/404"
    500:
      $ref: "../../v1alpha1/core/api.yml#/components/responses/500"

  parameters:
    badgeId:
      name: badgeId
      in: path
      description: Badge ID
      required: true
      schema:
        $ref: ../../v1alpha1/core/api.yml#/components/schemas/uuid
    orgIdQuery:
      name: orgId
      in: query
      description: Organization ID to scope the badge listing to.
      required: false
      schema:
        type: string
        format: uuid

  securitySchemes:
    jwt:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    BadgePayload:
      type: object
      description: Payload for creating or updating a badge.
      required:
        - label
        - name
        - orgId
        - description
        - imageUrl
      properties:
        id:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/uuid"
          x-go-name: ID
          description: Existing badge ID for updates; omit on create.
          x-oapi-codegen-extra-tags:
            db: "id"
            json: "id,omitempty"
        orgId:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/uuid"
          description: The ID of the organization in which this badge is available.
          x-go-name: OrgID
          x-oapi-codegen-extra-tags:
            db: "org_id"
            json: "orgId"
        label:
          type: string
          description: Unique identifier for the badge, typically slug-style (auto generated).
          example: Kubernetes-Expert
          x-oapi-codegen-extra-tags:
            db: "label"
            json: "label"
          maxLength: 500
        name:
          type: string
          description: Concise descriptor for the badge or certificate.
          example: Kubernetes Expert
          x-oapi-codegen-extra-tags:
            db: "name"
            json: "name"
          minLength: 1
          maxLength: 255
        description:
          type: string
          description: A description of the milestone achieved, often including criteria for receiving this recognition.
          example: Awarded for mastering Kubernetes concepts and practices.
          x-oapi-codegen-extra-tags:
            db: "description"
            json: "description"
          maxLength: 5000
        imageUrl:
          type: string
          format: uri
          description: URL to the badge image.
          example: https://raw.githubusercontent.com/layer5io/layer5-academy/refs/heads/master/static/11111111-1111-1111-1111-111111111111/images/meshery-logo-light.webp
          maxLength: 2048
          x-oapi-codegen-extra-tags:
            db: "image_url"
            json: "imageUrl"

    Badge:
      type: object
      additionalProperties: false
      description: Badge entity — a named recognition issued within an organization.
      required:
        - id
        - label
        - name
        - orgId
        - description
        - imageUrl
        - createdAt
        - updatedAt
        - deletedAt
      properties:
        id:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/uuid"
          description: Unique identifier for the badge.
          x-go-name: ID
          x-oapi-codegen-extra-tags:
            db: "id"
            json: "id"
        orgId:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/uuid"
          description: The ID of the organization in which this badge is available.
          x-go-name: OrgID
          x-oapi-codegen-extra-tags:
            db: "org_id"
            json: "orgId"
        label:
          type: string
          description: Unique identifier for the badge, typically slug-style (auto generated).
          example: Kubernetes-Expert
          x-oapi-codegen-extra-tags:
            db: "label"
            json: "label"
          maxLength: 500
        name:
          type: string
          description: Concise descriptor for the badge or certificate.
          example: Kubernetes Expert
          x-oapi-codegen-extra-tags:
            db: "name"
            json: "name"
          minLength: 1
          maxLength: 255
        description:
          type: string
          description: A description of the milestone achieved, often including criteria for receiving this recognition.
          example: Awarded for mastering Kubernetes concepts and practices.
          x-oapi-codegen-extra-tags:
            db: "description"
            json: "description"
          maxLength: 5000
        imageUrl:
          type: string
          format: uri
          description: URL to the badge image.
          example: https://raw.githubusercontent.com/layer5io/layer5-academy/refs/heads/master/static/11111111-1111-1111-1111-111111111111/images/meshery-logo-light.webp
          maxLength: 2048
          x-oapi-codegen-extra-tags:
            db: "image_url"
            json: "imageUrl"
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the badge was created.
          x-go-type: time.Time
          x-go-type-skip-optional-pointer: true
          x-oapi-codegen-extra-tags:
            db: "created_at"
            json: "createdAt"
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the badge was last updated.
          x-go-type: time.Time
          x-go-type-skip-optional-pointer: true
          x-oapi-codegen-extra-tags:
            db: "updated_at"
            json: "updatedAt"
        deletedAt:
          type: string
          format: date-time
          description: Timestamp when the badge was soft-deleted, if applicable.
          x-go-type: core.NullTime
          x-go-type-import:
            path: github.com/meshery/schemas/models/core
            name: core
          x-oapi-codegen-extra-tags:
            db: "deleted_at"
            json: "deletedAt"

    BadgesPage:
      type: object
      description: Map of badges available in an organization, keyed by badge label.
      properties:
        badges:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/Badge"
          description: Available badges, keyed by badge label.

    BadgeAssignmentPayload:
      type: object
      description: Payload for assigning a set of badges to a user.
      required:
        - badges
        - userId
      properties:
        badges:
          type: array
          items:
            type: string
            description: Badge label (see Badge.label) to assign.
          description: Labels of the badges being assigned to the user.
        userId:
          type: string
          description: ID of the user to receive the badges.
          maxLength: 500
          format: uuid
          x-go-name: UserID
          x-oapi-codegen-extra-tags:
            json: "userId"
        notify:
          type: boolean
          description: When true, send a notification to the user about the new badge assignment.
