type: object
additionalProperties: false
properties:
  publishedVersion:
    description: Tracks the specific content version that has been made available in the Catalog.
    type: string
  class:
    $ref: core/api.yml#/components/schemas/CatalogClass
  compatibility:
    $ref: core/api.yml#/components/schemas/CatalogCompatibility
  pattern_caveats:
    type: string
    title: Caveats and Considerations
    description: Specific stipulations to consider and known behaviors to be aware of when using this design.
  pattern_info:
    type: string
    title: Description
    minLength: 1
    description: Purpose of the design along with its intended and unintended uses.
  type:
    $ref: core/api.yml#/components/schemas/CatalogType
  snapshotURL:
    $ref: core/api.yml#/components/schemas/CatalogSnapshotUrls
required:
  - compatibility
  - pattern_caveats
  - pattern_info
  - type
