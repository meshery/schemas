openapi: 3.0.0
info:
  title: System API
  description: OpenAPI schema for Meshery server operational endpoints.
  version: v1beta1
  contact:
    name: Meshery Maintainers
    email: maintainers@meshery.io
    url: https://meshery.io
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

security:
  - jwt: []

tags:
  - name: System
    description: Operational endpoints for Meshery Server.

paths:
  /api/system/database:
    get:
      x-internal: ["meshery"]
      tags:
        - System
      summary: Get a summary of the Meshery server's database
      description: Returns a paginated summary of Meshery database tables and row counts.
      operationId: getSystemDatabase
      parameters:
        - name: page
          in: query
          description: Zero-based page index for the table list.
          required: false
          schema:
            type: integer
            minimum: 0
        - name: pageSize
          in: query
          description: Number of tables to include per page.
          required: false
          schema:
            type: integer
            minimum: 1
        - name: search
          in: query
          description: Substring filter applied to table names.
          required: false
          schema:
            type: string
            maxLength: 255
        - name: sort
          in: query
          description: Column to order the table list by.
          required: false
          schema:
            type: string
            enum:
              - name
        - name: order
          in: query
          description: Sort direction for the `sort` column.
          required: false
          schema:
            type: string
            enum:
              - asc
              - desc
      responses:
        "200":
          description: Database summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemDatabaseSummary"
        "401":
          $ref: "#/components/responses/401"
        "500":
          description: Internal server error

  /api/system/database/reset:
    delete:
      x-internal: ["meshery"]
      tags:
        - System
      summary: Reset the Meshery server's database
      description: Resets the Meshery server database. This is a destructive operation.
      operationId: resetSystemDatabase
      responses:
        "200":
          description: Database reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemMessageResponse"
        "401":
          $ref: "#/components/responses/401"
        "500":
          description: Internal server error during reset (archive, drop, migrate, or reseed).

  /api/system/version:
    get:
      x-internal: ["cloud", "meshery"]
      tags:
        - System
      summary: Get the running Meshery server's version metadata
      description: Returns version metadata for the running Meshery service.
      operationId: getSystemVersion
      security: []
      responses:
        "200":
          description: Server version metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemVersion"
        "500":
          description: Encoding error while serializing the version payload.

  /api/system/email/test:
    post:
      x-internal: ["cloud"]
      tags:
        - System
      summary: Send a test email
      description: >-
        Sends a test email through the configured SMTP provider to verify the
        email configuration. Restricted to provider administrators.
      operationId: sendTestEmail
      requestBody:
        description: Recipient and optional subject for the test email.
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailTestRequest"
      responses:
        "200":
          description: Test email sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailTestResponse"
        "400":
          description: Invalid request payload or malformed recipient email address.
        "401":
          $ref: "#/components/responses/401"
        "500":
          description: Email configuration validation failed or the send attempt errored.

  /api/system/sync:
    get:
      x-internal: ["meshery"]
      tags:
        - System
      summary: Get initial session bootstrap data
      description: Returns session bootstrap data for the authenticated user.
      operationId: getSystemSync
      responses:
        "200":
          description: Session sync payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemSessionSync"
        "401":
          $ref: "#/components/responses/401"
        "500":
          description: Marshal error while serializing the session sync payload.

  /api/system/controllers/operator/status:
    get:
      x-internal: ["meshery"]
      tags:
        - System
      summary: Get the Meshery Operator status for a connection
      description: >-
        Returns the current status of the Meshery Operator controller for the
        given kubernetes connection. Replaces the getOperatorStatus GraphQL
        query.
      operationId: getOperatorControllerStatus
      parameters:
        - name: connectionId
          in: query
          description: The kubernetes connection ID whose operator status is requested.
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Operator controller status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ControllerStatus"
        "401":
          $ref: "#/components/responses/401"
        "500":
          description: Internal server error while resolving controller status.

  /api/system/controllers/meshsync/status:
    get:
      x-internal: ["meshery"]
      tags:
        - System
      summary: Get the MeshSync controller status for a connection
      description: >-
        Returns the current status of the MeshSync controller for the given
        kubernetes connection. Replaces the getMeshsyncStatus GraphQL query.
      operationId: getMeshsyncControllerStatus
      parameters:
        - name: connectionId
          in: query
          description: The kubernetes connection ID whose MeshSync status is requested.
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: MeshSync controller status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ControllerInfo"
        "401":
          $ref: "#/components/responses/401"
        "500":
          description: Internal server error while resolving controller status.

  /api/system/controllers/broker/status:
    get:
      x-internal: ["meshery"]
      tags:
        - System
      summary: Get the Meshery Broker (NATS) controller status for a connection
      description: >-
        Returns the current status of the Meshery Broker (NATS) controller for
        the given kubernetes connection. Replaces the getNatsStatus GraphQL
        query.
      operationId: getBrokerControllerStatus
      parameters:
        - name: connectionId
          in: query
          description: The kubernetes connection ID whose broker status is requested.
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Broker controller status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ControllerInfo"
        "401":
          $ref: "#/components/responses/401"
        "500":
          description: Internal server error while resolving controller status.

  /api/system/controllers/status/subscribe:
    get:
      x-internal: ["meshery"]
      tags:
        - System
      summary: Stream Meshery controller status over Server-Sent Events
      description: >-
        Server-Sent Events (SSE) stream of controller status (operator,
        MeshSync, broker) for the requested kubernetes connections. Replaces the
        subscribeMesheryControllersStatus GraphQL subscription. The server emits
        the full status array as an unnamed SSE event (`data: <json>` followed
        by a blank line) on subscribe and again whenever any controller's status
        changes; a comment keepalive is sent periodically. Consume with a native
        EventSource, not a buffered JSON client.
      operationId: subscribeControllersStatus
      parameters:
        - name: connectionIds
          in: query
          description: >-
            Kubernetes connection IDs to watch. Repeatable
            (connectionIds=<id>&connectionIds=<id>).
          required: false
          schema:
            type: array
            items:
              type: string
              format: uuid
      responses:
        "200":
          description: An open text/event-stream of controller status snapshots.
          content:
            text/event-stream:
              schema:
                type: string
                description: >-
                  SSE frames. Each `data:` line is a JSON array of
                  ControllerStatus items.
        "401":
          $ref: "#/components/responses/401"

components:
  responses:
    401:
      $ref: "../../v1alpha1/core/api.yml#/components/responses/401"

  securitySchemes:
    jwt:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    EmailTestRequest:
      type: object
      description: Request body for sending a test email through the configured SMTP provider.
      additionalProperties: false
      required:
        - to
      properties:
        to:
          type: string
          description: Recipient email address for the test message.
          format: email
          maxLength: 320
        subject:
          type: string
          description: Subject line for the test message. A default subject is used when omitted.
          maxLength: 998
          x-oapi-codegen-extra-tags:
            json: "subject,omitempty"

    EmailTestResponse:
      type: object
      description: Result of a test email send attempt.
      additionalProperties: false
      required:
        - status
        - message
        - timestamp
        - sentTo
      properties:
        status:
          type: string
          description: Outcome status of the send attempt (e.g. `success`).
          maxLength: 64
        message:
          type: string
          description: Human-readable result message.
          maxLength: 1024
        timestamp:
          type: string
          description: Unix-epoch seconds, as a decimal string, when the test email was sent.
          pattern: "^[0-9]+$"
          maxLength: 20
        sentTo:
          type: string
          description: Recipient address the test email was sent to.
          format: email
          maxLength: 320

    SystemMessageResponse:
      type: object
      description: Status message response.
      additionalProperties: false
      required:
        - message
      properties:
        message:
          type: string
          description: Human-readable status message.
          minLength: 1
          maxLength: 1024

    ControllerStatus:
      type: object
      description: >-
        Status of a single Meshery controller (operator, MeshSync, or broker)
        for a kubernetes connection. Element type of the controller-status SSE
        stream and the operator status response.
      additionalProperties: false
      required:
        - connectionId
        - controller
        - status
        - version
      properties:
        connectionId:
          type: string
          description: The kubernetes connection ID this status belongs to.
          maxLength: 255
        controller:
          type: string
          description: The controller this status describes.
          enum:
            - OPERATOR
            - MESHSYNC
            - BROKER
        status:
          type: string
          description: >-
            Current controller status (e.g. DEPLOYED, NOTDEPLOYED, RUNNING,
            CONNECTED, UNKOWN).
          maxLength: 255
        version:
          type: string
          description: Deployed controller version, when known.
          maxLength: 255

    ControllerInfo:
      type: object
      description: >-
        Detailed status of a named Meshery controller (MeshSync or Broker) for a
        kubernetes connection.
      additionalProperties: false
      required:
        - name
        - version
        - status
        - connectionId
      properties:
        name:
          type: string
          description: Controller name (e.g. MeshSync, MesheryBroker).
          maxLength: 255
        version:
          type: string
          description: Deployed controller version, when known.
          maxLength: 255
        status:
          type: string
          description: >-
            Current controller status. May be composed, e.g. "Connected
            <endpoint>".
          maxLength: 1024
        connectionId:
          type: string
          description: The kubernetes connection ID this status belongs to.
          maxLength: 255

    SystemDatabaseTable:
      type: object
      description: Database table summary.
      additionalProperties: false
      required:
        - name
        - type
        - count
      properties:
        name:
          type: string
          description: Name of the table.
          maxLength: 255
        type:
          type: string
          description: SQLite object type (e.g. `table`).
          maxLength: 64
        count:
          type: integer
          description: Number of rows currently in the table.
          format: int64
          minimum: 0

    SystemDatabaseSummary:
      type: object
      description: Paginated summary of the Meshery server's embedded database.
      additionalProperties: false
      required:
        - page
        - pageSize
        - totalTables
        - recordCount
        - tables
      properties:
        page:
          type: integer
          description: Zero-based page index of the returned table slice.
          minimum: 0
        pageSize:
          type: integer
          description: Number of tables included in this page.
          minimum: 1
        totalTables:
          type: integer
          description: Total number of tables in the database matching the search filter.
          minimum: 0
        recordCount:
          type: integer
          description: Aggregate row count across the tables returned in this page.
          minimum: 0
        tables:
          type: array
          description: Tables included in this page, with per-table row counts.
          items:
            $ref: "#/components/schemas/SystemDatabaseTable"

    SystemVersion:
      type: object
      description: Version metadata for a running Meshery service.
      additionalProperties: false
      properties:
        version:
          type: string
          description: Meshery Cloud deployment version.
          maxLength: 128
        build:
          type: string
          description: Build identifier (typically the git tag of the running binary).
          maxLength: 128
        latest:
          type: string
          description: Latest available Meshery release tag fetched from GitHub.
          maxLength: 128
        outdated:
          type: boolean
          description: True when the running build is older than the latest available release.
        commitsha:
          type: string
          description: Git commit SHA of the running service. The wire field is `commitsha`.
          maxLength: 64
        releaseChannel:
          type: string
          description: Release channel of the running binary (e.g. `stable`, `edge`).
          maxLength: 64

    SystemSessionSyncK8sContext:
      type: object
      description: Kubernetes context tracked by Meshery.
      additionalProperties: false
      properties:
        id:
          type: string
          description: Stable identifier for the Kubernetes context.
          x-id-format: external
          minLength: 32
          maxLength: 32
          pattern: "^[0-9a-f]{32}$"
        name:
          type: string
          description: Human-readable name of the Kubernetes context.
          maxLength: 255
        clusterConfigured:
          type: boolean
          description: True when Meshery has a usable kubeconfig for this context.
        server:
          type: string
          description: API server URL for the Kubernetes context.
          maxLength: 2048
        clusterId:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/uuid"
          description: Kubernetes server ID associated with this context.
        createdAt:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/created_at"
          description: When the context was first registered with Meshery.
        updatedAt:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/updated_at"
          description: When the context was last updated.

    SystemSessionSync:
      type: object
      description: Session bootstrap payload for the authenticated user.
      additionalProperties: true
      properties:
        k8sConfig:
          type: array
          description: Kubernetes contexts currently tracked by the Meshery server.
          items:
            $ref: "#/components/schemas/SystemSessionSyncK8sContext"
