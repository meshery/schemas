          type: string
          x-go-name: Duration
      type: object
      x-go-package: github.com/meshery/meshery/server/models
    Map:
      additionalProperties: {}
      description: |-
        It implements native SQL driver interfaces and hence can
        be used for SQL json or jsonb types as a drop in replacement
        of golang native maps
      title: Map type is an alias for map[string]interface{}
      type: object
      x-go-package: github.com/meshery/meshery/server/internal/sql
    Panel:
      properties:
        alert:
          $ref: '#/components/schemas/Alert'
        aliasColors:
