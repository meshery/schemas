          type: object
      type: object
      x-go-package: github.com/meshery/meshery/server/models # Correction: I didn't see the full definition in view, but assuming standard properties. Wait, I saw it in view_file earlier.
    LoadTestPreferences:
      description: LoadTestPreferences represents the load test preferences
      properties:
        c:
          format: int64
          type: integer
          x-go-name: ConcurrentRequests
        gen:
          type: string
          x-go-name: LoadGenerator
        qps:
          format: int64
          type: integer
          x-go-name: QueriesPerSecond
