    #     page:
    #       type: integer
    #     totalCount:
    #       type: integer
    #     pageSize:
    #       type: integer
    #     users:
    #       type: array
    #       items:
    #         $ref: "#/components/schemas/User"
    #   required: [page, totalCount, pageSize, users]
