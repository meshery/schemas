openapi: 3.0.3
info:
  title: User Schema
  version: 1.0.0
paths:
  /api/user/login:
    get:
      description: Redirects user for auth or issues session
      operationId: idGetUserLogin
      responses:
        "200":
          description: ""
      summary: Handlers GET request for User login
      tags:
        - UserAPI
  /api/user/logout:
    get:
      description: Redirects user for auth or issues session
      operationId: idGetUserLogout
      responses:
        "200":
          description: ""
      summary: Handlers GET request for User logout
      tags:
        - UserAPI

  /api/identity/users:
    get:
      summary: Handles GET for all Users
      description: |-
        # Users can be further filtered through query parameters

        ```?order={field}``` orders on the passed field
        ```?page={page-number}``` Default page number is 0
        ```?pagesize={pagesize}``` Default pagesize is 20
        ```?search={username|email|first_name|last_name}``` If search is non empty then a greedy search is performed
        ```?filter={condition}```
      operationId: idGetAllUsersHandler
      tags:
        - UserAPI
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            format: int64
        - name: pageSize
          in: query
          schema:
            type: integer
            format: int64
        - name: search
          in: query
          schema:
            type: string
        - name: order
          in: query
          schema:
            type: string
        - name: filter
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPage' # Placeholder, will verify if this schema exists or needs creation.

  /api/user/performance/profiles:
    get:
      description: |
        Returns the list of all the performance profiles saved by the current user
        ```?order={field}``` orders on the passed field
        ```?page={page-number}``` Default page number is 0
        ```?pagesize={pagesize}``` Default pagesize is 10
        ```?search={profilename}``` If search is non empty then a greedy search is performed
      operationId: idGetPerformanceProfiles
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PerformanceProfilesAPIResponse'
      summary: Handle GET requests for performance profiles
      tags:
        - UserAPI
    post:
      description: Save performance profile using the current provider's persistence mechanism
      operationId: idSavePerformanceProfile
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PerformanceProfileParameters'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PerformanceProfile'
      summary: Handle POST requests for saving performance profile
      tags:
        - UserAPI
  /api/user/performance/profiles/{id}:
    delete:
      description: Deletes a performance profile with the given id
      operationId: idDeletePerformanceProfile
      parameters:
        - description: id for a specific
          in: path
          name: id
          required: true
          schema:
            format: uuid
            type: string
            x-go-name: ID
      responses:
        "200":
          description: ""
      summary: Handle SEQ requests for performance profiles
      tags:
        - UserAPI
    get:
      description: Returns the performance profile with the given id
      operationId: idGetPerformanceProfile
      parameters:
        - description: id for a specific
          in: path
          name: id
          required: true
          schema:
            format: uuid
            type: string
            x-go-name: ID
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PerformanceProfile'
      summary: Handle GET requests for performance profiles
      tags:
        - UserAPI
  /api/user/performance/profiles/{id}/results:
    get:
      description: Returns the results for the performance profile with the given id
      operationId: idGetPerformanceProfileResults
      parameters:
        - description: id for a specific
          in: path
          name: id
          required: true
          schema:
            format: uuid
            type: string
            x-go-name: ID
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PerformanceResultsAPIResponse'
      summary: Handle GET requests for performance profile results
      tags:
        - UserAPI
  /api/user/performance/profiles/{id}/run:
    get:
      description: Runs the performance profile with the given id
      operationId: idRunPerformanceProfile
      parameters:
        - description: id for a specific
          in: path
          name: id
          required: true
          schema:
            format: uuid
            type: string
            x-go-name: ID
      responses:
        "200":
          description: ""
      summary: Handle GET requests for running performance profile
      tags:
        - UserAPI
  /api/user/performance/profiles/results:
    get:
      description: Returns the results for the performance profile with the given id
      operationId: idGetAllPerformanceResults
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PerformanceResultsAPIResponse'
      summary: Handle GET requests for performance profile results
      tags:
        - UserAPI
  /api/user/prefs:
    get:
      description: Returns the user preferences
      operationId: idGetUserTestPrefs
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Preference'
      summary: Handlers GET request for User preferences
      tags:
        - UserAPI
    post:
      description: Updates the user preferences
      operationId: idPostUserTestPrefs
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Preference'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Preference'
      summary: Handlers POST request for User preferences
      tags:
        - UserAPI
  /api/user/prefs/perf:
    delete:
      description: Deletes the user performance test preferences
      operationId: idDeleteUserTestPreference
      parameters:
        - description: uuid
          in: query
          name: name
          schema:
            format: uuid
            type: string
            x-go-name: UUID
      responses:
        "200":
          description: ""
      summary: Handlers DELETE request for User performance test preferences
      tags:
        - UserAPI
    get:
      description: Returns the user performance test preferences
      operationId: idGetUserTestPreference
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Preference'
      summary: Handlers GET request for User performance test preferences
      tags:
        - UserAPI
    post:
      description: Updates the user performance test preferences
      operationId: idPostUserTestPreference
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PerformanceTestConfig'
      responses:
        "200":
          description: ""
      summary: Handlers POST request for User performance test preferences
      tags:
        - UserAPI
  /api/user/profile/{id}:
    get:
      description: Returns the user profile with the given id
      operationId: idGetUserProfile
      parameters:
        - description: id for a specific
          in: path
          name: id
          required: true
          schema:
            format: uuid
            type: string
            x-go-name: ID
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
      summary: Handlers GET request for User profile
      tags:
        - UserAPI
  /api/user/schedules:
    get:
      description: |
        Returns the list of all the schedules saved by the current user
        ```?order={field}``` orders on the passed field
        ```?page={page-number}``` Default page number is 0
        ```?pagesize={pagesize}``` Default pagesize is 10
      operationId: idGetSchedules
      parameters:
        - in: query
          name: order
          schema:
            type: string
        - in: query
          name: page
          schema:
            format: uint64
            type: integer
        - in: query
          name: pagesize
          schema:
            format: uint64
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchedulesAPIResponse'
      summary: Handle GET requests for schedules
      tags:
        - UserAPI
    post:
      description: Save schedule using the current provider's persistence mechanism
      operationId: idSaveSchedule
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Schedule'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Schedule'
      summary: Handle POST requests for saving schedule
      tags:
        - UserAPI
  /api/user/schedules/{id}:
    delete:
      description: Deletes a schedule with the given id
      operationId: idDeleteSchedule
      parameters:
        - description: id for a specific
          in: path
          name: id
          required: true
          schema:
            format: uuid
            type: string
            x-go-name: ID
      responses:
        "200":
          description: ""
      summary: Handle DELETE requests for schedules
      tags:
        - UserAPI
    get:
      description: Returns the schedule with the given id
      operationId: idGetSchedule
      parameters:
        - description: id for a specific
          in: path
          name: id
          required: true
          schema:
            format: uuid
            type: string
            x-go-name: ID
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Schedule'
      summary: Handle GET requests for schedules
      tags:
        - UserAPI
  /api/user/token:
    get:
      description: Returns the user token
      operationId: idGetUserToken
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Token"
      summary: Handlers GET request for User token
      tags:
        - UserAPI
    post:
      description: Generates a new user token
      operationId: idPostUserToken
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Token"
      summary: Handlers POST request for User token
      tags:
        - UserAPI
