        page_size:
          type: integer
          format: uint64
          x-go-name: PageSize
        total_count:
          type: integer
          format: uint64
          x-go-name: TotalCount
        users:
          type: array
          items:
            $ref: "#/components/schemas/User"
          x-go-name: Users
