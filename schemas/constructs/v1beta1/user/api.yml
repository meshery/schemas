      type: object
      x-go-package: github.com/meshery/meshery/server/models
    GrafanaBoard:
      description: GrafanaBoard represents a Grafana board
      properties:
        org_id:
          format: uint64
          type: integer
          x-go-name: OrgID
        panels:
          items:
            $ref: '#/components/schemas/Panel'
          type: array
          x-go-name: Panels
        slug:
          type: string
          x-go-name: Slug
        template_vars:
          items:
            $ref: '#/components/schemas/GrafanaTemplateVars'
          type: array
          x-go-name: TemplateVars
        timezone:
          type: string
          x-go-name: Timezone
        title:
          type: string
          x-go-name: Title
        uid:
          type: string
          x-go-name: UID
        uri:
          type: string
          x-go-name: URI
      type: object
      x-go-package: github.com/meshery/meshery/server/models
    GrafanaTemplateVars:
      description: GrafanaTemplateVars represents template variables in a bboard
      properties:
        datasource:
          $ref: '#/components/schemas/GrafanaDataSource'
        hide:
          format: uint8
          type: integer
          x-go-name: Hide
        name:
          type: string
          x-go-name: Name
        query:
          type: string
          x-go-name: Query
