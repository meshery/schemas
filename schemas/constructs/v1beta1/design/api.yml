openapi: 3.0.0
info:
  title: Design
  description: OpenAPI schema for managing Meshery designs and infrastructure patterns.
  x-deprecated: true
  x-superseded-by: v1beta2
  version: v1beta1
  contact:
    name: Meshery Maintainers
    email: maintainers@meshery.io
    url: https://meshery.io
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

security:
  - jwt: []
tags:
  - name: designs
    description: Operations related to designs and infrastructure patterns
paths:
  /api/content/patterns:
    get:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Get designs
      operationId: getPatterns
      description: Returns a paginated list of infrastructure designs accessible to the user.
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pagesize"
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/order"
        - name: visibility
          in: query
          description: Filter by visibility (public, private, published)
          schema:
            type: string
        - name: userId
          in: query
          required: false
          description: UUID of User. Pass userId for fetching public and published designs.
          schema:
            type: string
        - name: orgId
          in: query
          required: false
          description: User's organization ID.
          schema:
            type: string
        - name: metrics
          in: query
          required: false
          schema:
            type: boolean
        - name: workspaceid
          in: query
          required: false
          schema:
            type: string
        - name: populate
          in: query
          required: false
          schema:
            type: boolean
        - name: shared
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: Designs response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MesheryPatternPage"
              examples:
                default:
                  $ref: '#/components/examples/MesheryPatternPageExample'
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"
    post:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Save design
      operationId: upsertPattern
      description: Creates or updates an infrastructure design.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MesheryPatternRequestBody"
      responses:
        "200":
          description: Design saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MesheryPattern"
              examples:
                default:
                  $ref: '#/components/examples/MesheryPatternExample'
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /api/content/patterns/delete:
    post:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Bulk delete designs
      operationId: deletePatterns
      description: Deletes multiple designs by ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MesheryPatternDeleteRequestBody"
      responses:
        "200":
          description: Designs deleted
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /api/content/patterns/resource:
    get:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Get pattern resources
      operationId: getPatternResources
      description: Returns pattern resource definitions.
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pagesize"
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/order"
      responses:
        "200":
          description: Pattern resources response
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"
    post:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Save pattern resource
      operationId: upsertPatternResource
      description: Creates or updates a pattern resource definition.
      responses:
        "200":
          description: Pattern resource saved
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /api/content/patterns/resource/{id}:
    get:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Get pattern resource by ID
      operationId: getPatternResource
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Pattern resource response
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"
    delete:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Delete pattern resource
      operationId: deletePatternResource
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "204":
          description: Pattern resource deleted
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/content/patterns/{id}:
    get:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Get design by ID
      operationId: getPattern
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Design response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MesheryPattern"
              examples:
                default:
                  $ref: '#/components/examples/MesheryPatternExample'
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"
    delete:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Delete design by ID
      operationId: deletePattern
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "204":
          description: Design deleted
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/content/patterns/clone/{id}:
    post:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Clone design
      operationId: clonePattern
      description: Creates a copy of an existing design.
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Design cloned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MesheryPattern"
              examples:
                default:
                  $ref: '#/components/examples/MesheryPatternExample'
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/content/patterns/download/{id}:
    get:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Download design file
      operationId: getDesignPatternFile
      description: Downloads the raw design file for the specified design.
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Design file content
          content:
            application/yaml:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/content/patterns/upload/{id}:
    post:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Upload design source content
      operationId: upsertPatternSourceContent
      description: Uploads or replaces the source content for a design.
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/MesheryPatternImportRequestBody"
      responses:
        "200":
          description: Design source content uploaded
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/pattern/import:
    post:
      tags:
        - designs
      summary: Import Design
      operationId: importDesign
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/MesheryPatternImportRequestBody"
      responses:
        "200":
          description: Successful Import
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: ''
        "400":
          description: Invalid request format
        "401":
          $ref: "#/components/responses/401"
        "500":
          description: Internal server error

  /api/catalog/content/{type}:
    get:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Get catalog content
      operationId: getCatalogContent
      security: []
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pagesize"
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/order"
        - name: type
          in: query
          required: false
          schema:
            type: string
        - name: technology
          in: query
          required: false
          schema:
            type: string
        - name: metrics
          in: query
          required: false
          schema:
            type: boolean
        - name: class
          in: query
          required: false
          schema:
            type: string
        - name: userid
          in: query
          required: false
          schema:
            type: string
        - name: orgId
          in: query
          required: false
          schema:
            type: string
        - name: workspaceid
          in: query
          required: false
          schema:
            type: string
        - name: teamId
          in: query
          required: false
          schema:
            type: string
        - name: populate
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: Catalog content page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogContentPage"
              examples:
                default:
                  $ref: '#/components/examples/CatalogContentPageExample'
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"
    post:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Publish catalog content
      operationId: publishCatalogContent
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
      requestBody:
        $ref: "#/components/requestBodies/catalogContentPayload"
      responses:
        "200":
          description: Catalog request result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogRequest"
              examples:
                default:
                  $ref: '#/components/examples/CatalogRequestExample'
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "409":
          description: Conflict
        "500":
          $ref: "#/components/responses/500"
  /api/catalog/content/{type}/unpublish:
    post:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Unpublish catalog content
      operationId: unPublishCatalogContent
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
      requestBody:
        $ref: "#/components/requestBodies/catalogContentPayload"
      responses:
        "200":
          description: Catalog request result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogRequest"
              examples:
                default:
                  $ref: '#/components/examples/CatalogRequestExample'
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "409":
          description: Conflict
        "500":
          $ref: "#/components/responses/500"

  /api/catalog/content/classes:
    get:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Get catalog content classes
      operationId: getCatalogContentClasses
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pagesize"
      responses:
        "200":
          description: Catalog content classes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CatalogContentClass"
              example:
                - class: ''
                  description: ''
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /api/catalog/requests/approve:
    post:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Approve a catalog request
      operationId: approveCatalogRequest
      requestBody:
        $ref: "#/components/requestBodies/catalogContentPayload"
      responses:
        "201":
          description: Request approved
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              example: {}
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "409":
          description: Conflict
        "500":
          $ref: "#/components/responses/500"

  /api/catalog/requests/deny:
    post:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Deny a catalog request
      operationId: denyCatalogRequest
      requestBody:
        $ref: "#/components/requestBodies/catalogContentPayload"
      responses:
        "201":
          description: Request denied
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              example: {}
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "409":
          description: Conflict
        "500":
          $ref: "#/components/responses/500"

  /api/content/filters/{id}:
    get:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Get filter by ID
      operationId: getFilter
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Filter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MesheryFilter"
              examples:
                default:
                  $ref: '#/components/examples/MesheryFilterExample'
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/content/filters/clone/{id}:
    post:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Clone filter
      operationId: cloneFilter
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Cloned filter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MesheryFilter"
              examples:
                default:
                  $ref: '#/components/examples/MesheryFilterExample'
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/resource/{resourceType}/share/{resourceId}:
    post:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Share a resource
      operationId: handleResourceShare
      parameters:
        - name: resourceType
          in: path
          required: true
          schema:
            type: string
        - name: resourceId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        $ref: "#/components/requestBodies/resourceSharePayload"
      responses:
        "200":
          description: Resource access mapping
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResourceAccessMapping"
              examples:
                default:
                  $ref: '#/components/examples/ResourceAccessMappingExample'
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/resource/{resourceType}/share/{resourceId}/{actorType}:
    get:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Get resource access actors by type
      operationId: getResourceAccessActorsByType
      parameters:
        - name: resourceType
          in: path
          required: true
          schema:
            type: string
        - name: resourceId
          in: path
          required: true
          schema:
            type: string
        - name: actorType
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Resource access actors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResourceAccessActorsResponse"
              examples:
                default:
                  $ref: '#/components/examples/ResourceAccessActorsResponseExample'
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/catalog/requests:
    get:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Get catalog requests
      operationId: getCatalogRequest
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pagesize"
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/order"
        - name: filter
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Catalog requests page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogRequestsPage"
              examples:
                default:
                  $ref: '#/components/examples/CatalogRequestsPageExample'
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"
components:
  securitySchemes:
    jwt:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    400:
      $ref: "../core/api.yml#/components/responses/400"
    401:
      $ref: "../core/api.yml#/components/responses/401"
    404:
      $ref: "../core/api.yml#/components/responses/404"
    500:
      $ref: "../core/api.yml#/components/responses/500"

  parameters:
    id:
      name: id
      in: path
      description: Design (Pattern) ID
      required: true
      schema:
        $ref: "../core/api.yml#/components/schemas/uuid"
    page:
      $ref: "../core/api.yml#/components/parameters/page"
    pagesize:
      $ref: "../core/api.yml#/components/parameters/pagesize"
    search:
      $ref: "../core/api.yml#/components/parameters/search"
    order:
      $ref: "../core/api.yml#/components/parameters/order"

  schemas:
    DeletePatternModel:
      type: object
      properties:
        id:
          $ref: "../core/api.yml#/components/schemas/Id"
        name:
          $ref: "../core/api.yml#/components/schemas/Text"

    PatternFile:
      $ref: "./design.yaml"

    MesheryPattern:
      type: object
      properties:
        catalogData:
          $ref: "../catalog/api.yml#/components/schemas/CatalogData"
          x-go-type: catalogv1beta1.CatalogData
          x-go-type-import:
            path: github.com/meshery/schemas/models/v1beta1/catalog
            name: catalogv1beta1

        created_at:
          $ref: "../core/api.yml#/components/schemas/Time"
        user_id:
          $ref: "../core/api.yml#/components/schemas/Id"
        location:
          $ref: "../core/api.yml#/components/schemas/MapObject"
        name:
          $ref: "../core/api.yml#/components/schemas/Text"
        patternFile:
          $ref: "#/components/schemas/PatternFile"
          x-go-type: PatternFile

        updated_at:
          $ref: "../core/api.yml#/components/schemas/Time"
        id:
          $ref: "../core/api.yml#/components/schemas/Id"
        visibility:
          $ref: "../core/api.yml#/components/schemas/Text"

    MesheryPatternPage:
      type: object
      properties:
        page:
          type: integer
        page_size:
          type: integer
        patterns:
          type: array
          items:
            $ref: "#/components/schemas/MesheryPattern"
            x-go-type: MesheryPattern

        resultType:
          type: string
        total_count:
          type: integer

    MesheryPatternDeleteRequestBody:
      type: object
      properties:
        patterns:
          type: array
          items:
            $ref: "#/components/schemas/DeletePatternModel"
            x-go-type: DeletePatternModel

    MesheryPatternRequestBody:
      type: object
      properties:
        path:
          $ref: "../core/api.yml#/components/schemas/Text"
        patternData:
          $ref: "#/components/schemas/MesheryPattern"
          x-go-type: MesheryPattern
        save:
          type: boolean
        url:
          $ref: "../core/api.yml#/components/schemas/Endpoint"
        name:
          type: string

    MesheryPatternImportRequestBody:
      type: object
      description: "Choose the method you prefer to upload your  design file. Select 'File Upload' if you have the file on your local system, or 'URL Import' if you have the file hosted online."
      enum:
        - file
        - url
      properties:
        file:
          type: string
          format: file
          description: "Supported formats: Kubernetes Manifests, Helm Charts, Docker Compose, and Meshery Designs. See [Import Designs Documentation](https://docs.meshery.io/guides/configuration-management/importing-designs#import-designs-using-meshery-ui) for details"
        fileName:
          type: string
          description: "The name of the pattern file being imported."
        name:
          type: string
          default: "Untitled Design"
          description: "Provide a name for your design file. This name will help you identify the file more easily. You can also change the name of your design after importing it."
        url:
          type: string
          format: uri
          description: "Provide the URL of the file you want to import. This should be a direct URL to a single file, for example: https://raw.github.com/your-design-file.yaml. Also, ensure that design is in a supported format: Kubernetes Manifest, Helm Chart, Docker Compose, or Meshery Design. See [Import Designs Documentation](https://docs.meshery.io/guides/configuration-management/importing-designs#import-designs-using-meshery-ui) for details"

    DesignPreferences:
      type: object
      description: Design-level preferences
      x-order: 7
      properties:
        layers:
          type: object
          description: Map of available layers, where keys are layer names.
      required:
        - layers

    CatalogContentItem:
      type: object
      additionalProperties: true

    CatalogContentPage:
      type: object
      properties:
        page:
          type: integer
        page_size:
          type: integer
        total_count:
          type: integer
        patterns:
          type: array
          items:
            $ref: "#/components/schemas/MesheryPattern"
        filters:
          type: array
          items:
            $ref: "#/components/schemas/MesheryFilter"
        modelsCount:
          type: array
          items:
            type: object
            additionalProperties: true
        categoryCount:
          type: array
          items:
            type: object
            additionalProperties: true

    CatalogRequest:
      type: object
      additionalProperties: true

    CatalogRequestsPage:
      type: object
      properties:
        page:
          type: integer
        page_size:
          type: integer
        total_count:
          type: integer
        catalogRequests:
          type: array
          items:
            $ref: "#/components/schemas/CatalogRequest"

    CatalogContentClass:
      type: object
      properties:
        class:
          type: string
        description:
          type: string
      additionalProperties: true

