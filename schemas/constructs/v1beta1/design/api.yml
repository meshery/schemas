openapi: 3.0.0
info:
  title: design
  version: 1.0.0
paths:
  /api/pattern/import:
    post:
      summary: Import Design
      operationId: ImportDesign
      tags:
        - PatternsAPI
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/MesheryPatternImportRequestBody"
      responses:
        "200":
          description: Successful Import
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "400":
          description: Invalid request format
        "500":
          description: Internal server error

  /api/pattern:
    get:
      summary: Handle GET request for patterns
      description: Returns a list of patterns
      operationId: idGetPatterns
      tags:
        - PatternsAPI
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: pagesize
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
        - name: order
          in: query
          schema:
            type: string
        - name: visibility
          in: query
          schema:
             type: array
             items:
               type: string
        - name: updated_after
          in: query
          schema:
            type: string
        - name: metrics
          in: query
          schema:
            type: boolean
        - name: populate
          in: query
          schema:
            type: array
            items:
              type: string
      responses:
        "200":
          description: Successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MesheryPatternPage"
        "500":
          description: Internal Server Error

    post:
      summary: Handle POST request for patterns
      description: Create a new pattern
      operationId: idPostPattern
      tags:
        - PatternsAPI
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MesheryPatternRequestBody"
      responses:
        "200":
          description: Successful
          content:
             application/json:
               schema:
                 $ref: "#/components/schemas/MesheryPattern"
        "500":
           description: Internal Server Error

  /api/pattern/{id}:
    get:
      summary: Handle GET request for pattern with ID
      description: Returns the pattern with the given ID
      operationId: idGetPatternByID
      tags:
        - PatternsAPI
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
           description: Successful
           content:
             application/json:
               schema:
                 $ref: "#/components/schemas/MesheryPattern"
        "404":
           description: Pattern not found
        "500":
           description: Internal Server Error

    delete:
      summary: Handle DELETE request for pattern with ID
      description: Delete the pattern with the given ID
      operationId: idDeletePatternByID
      tags:
        - PatternsAPI
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Successful
        "404":
          description: Pattern not found
        "500":
          description: Internal Server Error

  /api/pattern/deploy:
    post:
      summary: Handle POST request for Pattern Deploy
      description: Deploy an attached pattern file
      operationId: idPostDeployPattern
      tags:
        - PatternsAPI
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MesheryPattern"
      responses:
        "200":
          description: Successful
    delete:
      summary: Handle DELETE request for Pattern Deploy
      description: Delete a deployed pattern file
      operationId: idDeleteDeployPattern
      tags:
        - PatternsAPI
      requestBody:
        content:
           application/json:
             schema:
               $ref: "#/components/schemas/MesheryPattern"
      responses:
        "200":
          description: Successful

  /api/pattern/clone/{id}:
    post:
      summary: Handle POST request for Pattern Clone
      description: Clone a pattern
      operationId: idPostPatternClone
      tags:
        - PatternsAPI
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Successful

  /api/pattern/catalog:
    get:
      summary: Handle GET request for catalog patterns
      description: Returns a list of catalog patterns
      operationId: idGetCatalogPatterns
      tags:
        - PatternsAPI
      responses:
        "200":
          description: Successful

  /api/pattern/catalog/publish:
    post:
      summary: Handle POST request for catalog publish
      description: Publish a pattern to the catalog
      operationId: idPostCatalogPublish
      tags:
        - PatternsAPI
      requestBody:
         content:
           application/json:
             schema:
               type: object
      responses:
        "200":
          description: Successful

  /api/pattern/catalog/unpublish:
    delete:
      summary: Handle DELETE request for catalog unpublish
      description: Unpublish a pattern from the catalog
      operationId: idDeleteCatalogUnpublish
      tags:
        - PatternsAPI
      requestBody:
         content:
           application/json:
             schema:
               type: object
      responses:
        "200":
          description: Successful

  /api/pattern/download/{id}:
    get:
      summary: Handle GET request for pattern download
      description: Download a pattern
      operationId: idGetPatternDownload
      tags:
        - PatternsAPI
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Successful
          content:
             application/octet-stream:
               schema:
                 type: string
                 format: binary

  /api/pattern/download/{id}/{sourcetype}:
    get:
      summary: Handle GET request for pattern download with source type
      description: Download a pattern with source type
      operationId: idGetPatternDownloadSourceType
      tags:
        - PatternsAPI
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: sourcetype
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
           description: Successful

  /api/pattern/types:
    get:
       summary: Handle GET request for pattern types
       description: Returns pattern types
       operationId: idGetPatternTypes
       tags:
         - PatternsAPI
       responses:
         "200":
           description: Successful

  /api/patterns:
    get:
      summary: Handle GET request for multiple patterns
      description: Returns a list of patterns (alias for /api/pattern)
      operationId: idGetPatternsAlias
      tags:
        - PatternsAPI
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: pagesize
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
        - name: order
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Successful
          content:
             application/json:
               schema:
                 $ref: "#/components/schemas/MesheryPatternPage"

components:
  schemas:
    DeletePatternModel:
      type: object
      properties:
        id:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/Id"
        name:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/Text"

    PatternFile:
      $ref: "./design.yaml"

    MesheryPattern:
      type: object
      properties:
        catalog_data:
          $ref: "../../v1alpha2/catalog/api.yml#/components/schemas/CatalogData"
          x-go-type: catalog.CatalogData
          x-go-type-import:
            path: github.com/meshery/schemas/models/v1alpha2/catalog

        created_at:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/Time"
        user_id:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/Id"
        location:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/MapObject"
        name:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/Text"
        pattern_file:
          $ref: "#/components/schemas/PatternFile"
          x-go-type: PatternFile

        updated_at:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/Time"
        id:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/Id"
        visibility:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/Text"

    MesheryPatternPage:
      type: object
      properties:
        page:
          type: integer
        page_size:
          type: integer
        patterns:
          type: array
          items:
            $ref: "#/components/schemas/MesheryPattern"
            x-go-type: MesheryPattern

        resultType:
          type: string
        total_count:
          type: integer

    MesheryPatternDeleteRequestBody:
      type: object
      properties:
        patterns:
          type: array
          items:
            $ref: "#/components/schemas/DeletePatternModel"
            x-go-type: DeletePatternModel

    MesheryPatternRequestBody:
      type: object
      properties:
        path:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/Text"
        pattern_data:
          $ref: "#/components/schemas/MesheryPattern"
          x-go-type: MesheryPattern
        save:
          type: boolean
        url:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/Endpoint"
        name:
          type: string

    MesheryPatternImportRequestBody:
      type: object
      description: "Choose the method you prefer to upload your  design file. Select 'File Upload' if you have the file on your local system, or 'URL Import' if you have the file hosted online."
      enum:
        - file
        - url
      properties:
        file:
          type: string
          format: file
          description: "Supported formats: Kubernetes Manifests, Helm Charts, Docker Compose, and Meshery Designs. See [Import Designs Documentation](https://docs.meshery.io/guides/configuration-management/importing-designs#import-designs-using-meshery-ui) for details"
        file_name:
          type: string
          description: "The name of the pattern file being imported."
        name:
          type: string
          default: "Untitled Design"
          description: "Provide a name for your design file. This name will help you identify the file more easily. You can also change the name of your design after importing it."
        url:
          type: string
          format: uri
          description: "Provide the URL of the file you want to import. This should be a direct URL to a single file, for example: https://raw.github.com/your-design-file.yaml. Also, ensure that design is in a supported format: Kubernetes Manifest, Helm Chart, Docker Compose, or Meshery Design. See [Import Designs Documentation](https://docs.meshery.io/guides/configuration-management/importing-designs#import-designs-using-meshery-ui) for details"

    DesignPreferences:
      type: object
      description: Design-level preferences
      x-order: 7
      properties:
        layers:
          type: object
          description: Map of available layers, where keys are layer names.
      required:
        - layers
