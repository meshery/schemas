  /api/meshmodel/components/register:
    post:
      summary: Handle POST request for registering meshmodel components
      description: Register meshmodel components
      operationId: idPostMeshModelComponentsRegister
      tags:
        - component
      responses:
        "200":
          description: Successful
        "500":
          $ref: "#/components/responses/500"

components:
  parameters:
    page:
      name: page
      in: query
      description: Page number
      schema:
        type: integer
    pagesize:
      name: pagesize
      in: query
      description: Page size
      schema:
        type: string # Handler often treats as string due to "all" support
    search:
      name: search
      in: query
      description: Search term
      schema:
        type: string
    order:
      name: order
      in: query
      description: Order field
      schema:
        type: string
    sort:
      name: sort
      in: query
      description: Sort direction (asc/desc)
      schema:
        type: string
    trim:
      name: trim
      in: query
      description: Trim output
      schema:
        type: boolean
    version:
      name: version
      in: query
      description: Version filter
      schema:
        type: string
    apiVersion:
      name: apiVersion
      in: query
      description: API Version filter
      schema:
        type: string
    model:
      name: model
      in: query
      description: Model name filter
      schema:
        type: string
    annotations:
      name: annotations
      in: query
      description: Filter by annotations (true/false)
      schema:
        type: string
  responses:
    "500":
      description: Internal Server Error

  schemas:
    ComponentDefinition:
      $ref: "./component.yaml"

    Component:
      description: "data related to the third party capability that Component Defintion wraps , this is herematicaly sealed an"
      type: object
      properties:
        version:
          type: string
          description: "Version of the component produced by the registrant. Example: APIVersion of a Kubernetes Pod."
          x-order: 1
        kind:
          type: string
          description: "The unique identifier (name) assigned by the registrant to this component. Example: A Kubernetes Pod is of kind 'Pod'."
          x-order: 2
        schema:
          type: string
          description: "JSON schema of the object as defined by the registrant."
          x-order: 3
      required:
        - version
        - kind
        - schema
