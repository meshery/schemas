openapi: 3.0.0
info:
  title: Academy API
  description: OpenAPI schema for Meshery Academy content and curriculum management.
  x-deprecated: true
  x-superseded-by: v1beta2
  version: v1beta1
  contact:
    name: Meshery Maintainers
    email: maintainers@meshery.io
    url: https://meshery.io
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

security:
  - jwt: []

paths:
  /api/academy/Curricula/registered:
    get:
      x-internal: ["cloud"]
      tags:
        - Academy
      operationId: getMyAcademyCurricula
      summary: Get academy content
      description: Returns a list of academy content registered by the user with optional filtering.
      parameters:
        - name: contentType
          in: query
          description: Filter content by content types
          required: false
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
        - name: orgId
          in: query
          description: Filter content by organization IDs
          required: false
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string

      responses:
        "200":
          description: A list of content with total count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcademyCurriculaListResponse"
        "400":
          description: Invalid request parameters
        "401":
          $ref: "#/components/responses/401"
        "500":
          description: Server error

  /api/academy/curricula:
    post:
      x-internal: ["cloud"]
      tags:
        - Academy
      operationId: createAcademyCurricula
      summary: Create a new academy curricula
      description: Creates a new academy curricula with the provided details.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAcademyCurriculaRequest"
      responses:
        "201":
          description: created the curricula
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcademyCurricula"
        "400":
          description: Invalid request parameters
        "401":
          $ref: "#/components/responses/401"
        "500":
          description: Server error

  /api/academy/Curricula:
    get:
      x-internal: ["cloud"]
      tags:
        - Academy
      operationId: getAcademyCurricula
      summary: Get academy content
      description: Returns a list of academy content with optional filtering.
      parameters:
        - name: contentType
          in: query
          description: Filter content by content types
          required: false
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
        - name: visibility
          in: query
          description: Filter content by visibility (public/private)
          required: false
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string

        - name: level
          in: query
          description: Filter content by difficulty level
          required: false
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string

        - name: orgId
          in: query
          description: Filter content by organization IDs
          required: false
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string

        - name: category
          in: query
          description: Filter content by categories
          required: false
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string

        - name: status
          in: query
          description: Filter by registration status
          required: false
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string

        - name: search
          in: query
          description: Search content by title
          required: false
          schema:
            type: string
        - name: sort
          in: query
          description: Sort results by a specific field (e.g., title, createdAt)
          required: false
          schema:
            type: string
        - name: order
          in: query
          description: Order of sorting (asc or desc)
          required: false
          schema:
            type: string
            enum: [asc, desc]
        - name: pagesize
          in: query
          description: Number of results per page
          required: false
          schema:
            type: integer
        - name: page
          in: query
          description: Page number
          required: false
          schema:
            type: integer

      responses:
        "200":
          description: A list of content with total count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcademyCurriculaWithMetricsListResponse"
        "400":
          description: Invalid request parameters
        "401":
          $ref: "#/components/responses/401"
        "500":
          description: Server error

  /api/academy/{type}/{orgId}/{slug}:
    get:
      x-internal:
        - cloud
      summary: Get a single learning path
      description: Returns a learning path identified by type, orgId, and slug.
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
        - name: orgId
          in: path
          required: true
          schema:
            type: string
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: A single academy content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcademyCurricula"
        "400":
          description: Invalid request parameters
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          description: Server error

  /api/academy/register:
    post:
      x-internal: ["cloud"]
      tags:
        - Academy
      summary: Register a user to academy content
      operationId: registerToAcademyContent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterToAcademyContentRequest"

      responses:
        "201":
          description: registered content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcademyRegistration"
        "400":
          description: Invalid request parameters
        "401":
          $ref: "#/components/responses/401"
        "500":
          description: Server error

  /api/academy/curricula/registrations/{id}/withdraw:
    post:
      x-internal: ["cloud"]
      tags:
        - Academy
      summary: Withdraw a user from academy content
      operationId: withdrawFromAcademyContent
      parameters:
        - $ref: "#/components/parameters/id"

      responses:
        "200":
          description: registered content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcademyRegistration"
        "400":
          description: Invalid request parameters
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          description: Server error

  /api/academy/curricula/{id}:
    put:
      x-internal: ["cloud"]
      tags:
        - Academy
      operationId: updateAcademyCurriculaById
      summary: Update an existing academy curricula by ID
      description: Updates the details of an existing academy curricula identified by its ID.
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAcademyCurriculaRequest"
      responses:
        "200":
          description: updated the curricula
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SingleAcademyCurriculaResponse"
        "400":
          description: Invalid request parameters
        "401":
          $ref: "#/components/responses/401"
        "404":
          description: Curricula not found
        "500":
          description: Server error

    delete:
      x-internal: ["cloud"]
      tags:
        - Academy
      operationId: deleteAcademyCurriculaById
      summary: Delete an academy curricula by ID
      description: Deletes an existing academy curricula identified by its ID.
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "204":
          description: Curricula deleted
        "400":
          description: Invalid request parameters
        "401":
          $ref: "#/components/responses/401"
        "404":
          description: Curricula not found
        "500":
          description: Server error
    get:
      x-internal: ["cloud"]
      tags:
        - Academy
      operationId: getAcademyCurriculaById
      summary: Get a single academy curricula by ID
      description: Returns a single academy curricula identified by its ID.
      parameters:
        - $ref: "#/components/parameters/id"

      responses:
        "200":
          description: A single curricula
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SingleAcademyCurriculaResponse"
        "400":
          description: Invalid request parameters
        "401":
          $ref: "#/components/responses/401"
        "404":
          description: Curricula not found
        "500":
          description: Server error

  /api/academy/registrations/{contentId}:
    get:
      tags:
        - Academy

      x-internal: ["cloud"]
      summary: Get registration information for academy content
      description: Returns registration data for a specific content item, optionally filtered by status.
      parameters:
        - name: contentId
          in: path
          required: true
          description: The ID of the content to retrieve registration data for
          schema:
            type: string

        - name: status
          in: query
          required: false
          description: Filter registrations by status (e.g., registered, completed)
          schema:
            type: string

      responses:
        "200":
          description: Registration data for the specified content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcademyRegistration"
        "400":
          description: Invalid request parameters
        "401":
          $ref: "#/components/responses/401"
        "404":
          description: Content not found
        "500":
          description: Server error

  /api/academy/registrations/{registrationId}/progress-tracker/update-current-item:
    post:
      tags:
        - Academy
      x-internal: ["cloud"]
      operationId: updateCurrentItemInProgressTracker
      summary: Update the current item in the progress tracker
      parameters:
        - name: registrationId
          in: path
          required: true
          schema:
            type: string
          description: The ID of the registration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCurrentItemRequest"
      responses:
        "200":
          description: Progress tracker updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateCurrentItemProgressResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/academy/registrations/tests:
    get:
      tags:
        - Academy
      x-internal: ["cloud"]
      operationId: getTestByAbsPath
      summary: Get test metadata
      description: Returns metadata for test identified by its absolute path.
      parameters:
        - name: absPath
          in: query
          required: true
          description: The absolute path of the test to retrieve
          schema:
            type: string
      responses:
        "200":
          description: A single test
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quiz"
        "400":
          description: Invalid request parameters
        "401":
          $ref: "#/components/responses/401"
        "404":
          description: Quiz not found
        "500":
          description: Server error

  /api/academy/registrations/test-sessions/start:
    post:
      tags:
        - Academy
      x-internal: ["cloud"]
      operationId: startTestById
      summary: Start a Test by ID
      description: Starts a new test session for the quiz identified by its ID.

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartTestRequest"

      responses:
        "200":
          description: A single test
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quiz"
        "400":
          description: Invalid request parameters
        "401":
          $ref: "#/components/responses/401"
        "404":
          description: Quiz not found
        "500":
          description: Server error

  /api/academy/registrations/{id}/test-sessions:
    get:
      tags:
        - Academy
      x-internal: ["cloud"]
      operationId: getAllTestSessionsForRegistration
      summary: Get all tests for a registration
      description: Returns all tests associated with a specific registration ID for a user.
      parameters:
        - name: id
          in: path
          required: true
          description: The ID of the registration to retrieve tests for
          schema:
            type: string
        - $ref: "../core/api.yml#/components/parameters/page"
        - $ref: "../core/api.yml#/components/parameters/pagesize"
        - name: testAbsPath
          in: query
          required: false
          description: Filter tests by absolute path
          schema:
            type: string

      responses:
        "200":
          description: A list of tests for the specified registration
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TestSubmissions"
        "400":
          description: Invalid request parameters
        "401":
          $ref: "#/components/responses/401"
        "404":
          description: Registration not found
        "500":
          description: Server error

  /api/academy/registrations/test-sessions/submit:
    post:
      tags:
        - Academy
      x-internal: ["cloud"]
      operationId: submitQuiz
      summary: Submit a quiz for evaluation

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuizSubmission"
      responses:
        "200":
          description: Progress tracker updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizEvaluationResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/401"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/academy/admin/summary:
    get:
      tags:
        - Academy
      x-internal: ["cloud"]
      operationId: getAcademyAdminSummary
      summary: Get academy content summary
      description: Returns a summary of all academy content with  metrics.
      responses:
        "200":
          description: A list of content with total count and registration metrics
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Invalid request parameters
        "401":
          $ref: "#/components/responses/401"
        "500":
          description: Server error

  /api/academy/admin/registrations:
    get:
      x-internal: ["cloud"]
      tags:
        - Academy
      operationId: getAcademyAdminRegistrations
      summary: Get academy registrations
      description: Returns a list of academy registrations with user, curricula, and pagination details.
      parameters:
        - name: pagesize
          in: query
          required: false
          description: Number of results per page
          schema:
            type: integer
        - name: page
          in: query
          required: false
          description: Page number
          schema:
            type: integer
        - name: contentType
          in: query
          required: false
          description: Filter by content types
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
        - name: status
          in: query
          required: false
          description: Filter by registration status
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
      responses:
        "200":
          description: List of registrations with pagination info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurriculaRegistrationsResponse"
        "400":
          description: Invalid request parameters
        "401":
          $ref: "#/components/responses/401"
        "500":
          description: Server error

  /api/academy/certificates/{certificateId}:
    get:
      x-internal: ["cloud"]
      tags:
        - Academy
      operationId: getCertificateById
      summary: Get a certificate by ID
      description: Returns a certificate identified by its ID.
      parameters:
        - name: certificateId
          in: path
          required: true
          description: The ID of the certificate to retrieve
          schema:
            type: string

      responses:
        "200":
          description: A single certificate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Certificate"
        "400":
          description: Invalid request parameters
        "401":
          $ref: "#/components/responses/401"
        "404":
          description: Certificate not found
        "500":
          description: Server error

components:
  responses:
    400:
      $ref: "../core/api.yml#/components/responses/400"
    401:
      $ref: "../core/api.yml#/components/responses/401"
    404:
      $ref: "../core/api.yml#/components/responses/404"
    500:
      $ref: "../core/api.yml#/components/responses/500"

  securitySchemes:
    jwt:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    id:
      name: id
      in: path
      required: true
      description: The ID of the curricula
      schema:
        type: string

  schemas:
    AcademyCurriculaOrgId:
      type: string
      description: Organization ID that owns this learning path
      example: layer5
      x-oapi-codegen-extra-tags:
        db: "org_id"
        json: "org_id"

    AcademyCurriculaBadgeId:
      allOf:
        - $ref: "../core/api.yml#/components/schemas/uuid"
      description: ID of the badge to be awarded on completion of this curricula
      x-oapi-codegen-extra-tags:
        db: "badge_id"
        json: "badge_id"

    AcademyCurriculaInviteId:
      allOf:
        - $ref: "../core/api.yml#/components/schemas/uuid"
      description: ID of the invite associated with this Curricula
      x-oapi-codegen-extra-tags:
        db: "invite_id"
        json: "invite_id"

    AcademyCurriculaWorkspaceId:
      allOf:
        - $ref: "../core/api.yml#/components/schemas/uuid"
      description: ID of the workspace to which this Curricula belongs
      x-oapi-codegen-extra-tags:
        db: "workspace_id"
        json: "workspace_id"

    AcademyCurriculaCreatedAt:
      allOf:
        - $ref: "../core/api.yml#/components/schemas/Time"
      description: When the Curricula item was created
      x-oapi-codegen-extra-tags:
        db: "created_at"
        json: "created_at"

    AcademyCurriculaUpdatedAt:
      allOf:
        - $ref: "../core/api.yml#/components/schemas/Time"
      description: When the Curricula was last updated
      x-go-type: "core.Time"
      x-oapi-codegen-extra-tags:
        db: "updated_at"
        json: "updated_at"

    AcademyCurriculaDeletedAt:
      allOf:
        - $ref: "../core/api.yml#/components/schemas/deleted_at"
      x-go-type: "core.NullTime"
      x-oapi-codegen-extra-tags:
        db: "deleted_at"
        json: "deleted_at"

    AcademyCurriculaMetadata:
      type: object
      description: Additional metadata about the Curricula
      additionalProperties: true
      x-go-type: "core.Map"
      x-go-type-skip-optional-pointer: true
      x-oapi-codegen-extra-tags:
        db: "metadata"
        json: "metadata"
      oneOf:
        - $ref: "#/components/schemas/CurriculaMetadata"
          x-go-type: "CurriculaMetadata"

    AcademyCurriculaAccessExpiresAt:
      allOf:
        - $ref: "../core/api.yml#/components/schemas/Time"
      description: Expiry time for curricula access
      x-go-type: "*time.Time"
      x-oapi-codegen-extra-tags:
        json: "access_expires_at"
        db: "access_expires_at"

    RegisterToAcademyContentRequest:
      type: object
      required:
        - contentId
        - user_id
      properties:
        contentId:
          type: string
          description: ID of the academy content to register for
        contentType:
          $ref: "#/components/schemas/ContentType"

    ContentType:
      type: string
      enum:
        - learning-path
        - challenge
        - certification

    Visibility:
      type: string
      enum:
        - public
        - private
    Level:
      type: string
      enum:
        - beginner
        - intermediate
        - advanced

    Status:
      type: string
      enum:
        - ready
        - archived
        - not_ready

    AcademyCurricula:
      type: object
      properties:
        id:
          type: string
          description: Id of the Curricula
          example: 923458-3490394-934893
          x-go-name: ID
          x-oapi-codegen-extra-tags:
            db: "id"
            json: "id"

        type:
          $ref: "#/components/schemas/ContentType"
          x-go-type: "ContentType"
          x-oapi-codegen-extra-tags:
            db: "type"
        orgId:
          $ref: "#/components/schemas/AcademyCurriculaOrgId"
        visibility:
          $ref: "#/components/schemas/Visibility"
          description: Visibility of the Curricula
          x-go-type: "Visibility"
          x-oapi-codegen-extra-tags:
            db: "visibility"
            json: "visibility"
        status:
          $ref: "#/components/schemas/Status"
          example: ready
          description: Status of the Curricula
          x-go-type: "Status"
          x-oapi-codegen-extra-tags:
            db: "status"
            json: "status"

        slug:
          type: string
          description: slug of the Curricula
          example: intro-kubernetes-course

        level:
          $ref: "#/components/schemas/Level"
          description: Level of the Curricula
          x-go-type: "Level"
          x-oapi-codegen-extra-tags:
            db: "level"
            json: "level"

        badge_id:
          type: string
          format: uuid
          description: ID of the badge to be awarded on completion of this curricula
          x-go-type: "core.Uuid"
          x-go-type-import:
            path: "github.com/meshery/schemas/models/core"
            name: core
          x-oapi-codegen-extra-tags:
            db: "badge_id"
            json: "badge_id"

        inviteId:
          $ref: "#/components/schemas/AcademyCurriculaInviteId"

        workspace_id:
          $ref: "#/components/schemas/AcademyCurriculaWorkspaceId"

        createdAt:
          $ref: "#/components/schemas/AcademyCurriculaCreatedAt"

        updatedAt:
          $ref: "#/components/schemas/AcademyCurriculaUpdatedAt"
        deletedAt:
          $ref: "#/components/schemas/AcademyCurriculaDeletedAt"
        metadata:
          $ref: "#/components/schemas/AcademyCurriculaMetadata"

      required:
        - id
        - type
        - orgId
        - visibility
        - status
        - slug
        - createdAt
        - updatedAt
        - deletedAt
        - metadata
        - level

    SingleAcademyCurriculaResponse:
      type: object
      allOf:
        - $ref: "#/components/schemas/AcademyCurricula"
        - type: object
          required:
            - registration_count
          properties:
            registration_count:
              type: number
              x-oapi-codegen-extra-tags:
                db: "registration_count,omitempty"
                json: "registration_count,omitempty"
            invitation:
              $ref: "../invitation/api.yml#/components/schemas/Invitation"
              x-go-type: "invitationv1beta1.Invitation"
              x-go-type-import:
                path: "github.com/meshery/schemas/models/v1beta1/invitation"
                name: invitationv1beta1

    CreateAcademyCurriculaRequest:
      type: object
      properties:
        type:
          $ref: "#/components/schemas/ContentType"
          description: Type of the curricula
          x-go-name: Type
          x-go-type: "ContentType"
          x-oapi-codegen-extra-tags:
            json: "type"

        title:
          type: string
          description: Title of the curricula
          example: "Introduction to Kubernetes"
          x-go-name: Title
          x-oapi-codegen-extra-tags:
            json: "title"

        orgId:
          $ref: "#/components/schemas/AcademyCurriculaOrgId"

        workspace_id:
          $ref: "#/components/schemas/AcademyCurriculaWorkspaceId"

        badge_id:
          type: string
          format: uuid
          description: ID of the badge to be awarded on completion of this curricula
          x-go-type: "core.Uuid"
          x-go-type-import:
            path: "github.com/meshery/schemas/models/core"
            name: core
          x-oapi-codegen-extra-tags:
            db: "badge_id"
            json: "badge_id"

        team_id:
          $ref: "../core/api.yml#/components/schemas/uuid"
          description: ID of the team associated with this curricula
          x-go-name: TeamId
          x-oapi-codegen-extra-tags:
            json: "team_id"
            db: "team_id"

