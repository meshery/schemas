openapi: 3.0.0
info:
  title: Organization
  description: OpenAPI schema for organization management in Meshery Cloud.
  version: v1beta1
  contact:
    name: Meshery Maintainers
    email: maintainers@meshery.io
    url: https://meshery.io
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

paths:
  /api/identity/orgs:
    get:
      security:
        - jwt: []
      summary: Read organizations
      description: Returns organizations for the current user.
      operationId: getOrgs
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pagesize"
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/order"
        - $ref: "#/components/parameters/all"
      responses:
        "200":
          description: Organizations response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationsPage"
        "204":
          description: No content
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"
    post:
      security:
        - jwt: []
      summary: Create an organization
      description: Creates a new organization.
      operationId: createOrg
      requestBody:
        $ref: "#/components/requestBodies/organizationPayload"
      responses:
        "201":
          description: Single-organization page response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationPage"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /api/identity/orgs/by-domain:
    get:
      summary: Get organization by domain
      operationId: getOrgByDomain
      parameters:
        - name: domain
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"

        "404":
          description: Organization not found

        "500":
          description: Internal server error
  /api/identity/orgs/{orgId}:
    get:
      security:
        - jwt: []
      summary: Read an organization
      description: Returns the organization in the single-item page wrapper currently emitted by meshery-cloud.
      operationId: getOrg
      parameters:
        - $ref: "#/components/parameters/orgId"
      responses:
        "200":
          description: Single-organization page response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationPage"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"
    delete:
      security:
        - jwt: []
      summary: Delete an organization
      description: Deletes the organization.
      operationId: deleteOrg
      parameters:
        - $ref: "#/components/parameters/orgId"
      responses:
        "200":
          description: Single-organization page response for the deleted organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationPage"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"
    put:
      security:
        - jwt: []
      summary: Update an organization
      description: Updates the organization.
      operationId: handleUpdateOrg
      parameters:
        - $ref: "#/components/parameters/orgId"
      requestBody:
        $ref: "#/components/requestBodies/organizationPayload"
      responses:
        "200":
          description: Single-organization page response for the updated organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationPage"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"
  /api/identity/orgs/{orgId}/preferences:
    get:
      security:
        - jwt: []
      summary: Get organization preferences
      description: Returns preferences for the specified organization.
      operationId: getOrgPreferences
      parameters:
        - $ref: "#/components/parameters/orgId"
      responses:
        "200":
          description: Organization metadata, including preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgMetadata"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /api/identity/orgs/{orgId}/teams/{teamId}:
    post:
      security:
        - jwt: []
      summary: Add team to organization or soft delete team
      description: Adds a team to an organization. If request body contains action=delete, tombstones a team by setting its deleted_at timestamp. The team's organization mapping remains intact.
      operationId: addTeamToOrg
      parameters:
        - $ref: "#/components/parameters/orgId"
        - $ref: "#/components/parameters/teamId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrgTeamActionPayload"
      responses:
        "200":
          description: Team added to organization or team tombstoned
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/TeamsOrganizationsMappingPage"
                  - $ref: "#/components/schemas/TeamsPage"
        "400":
          description: Bad request
        "401":
          description: Unauthorized
        "404":
          description: Not found
        "500":
          description: Internal server error

  /api/identity/orgs/{orgId}/teams/{teamId}/remove:
    post:
      security:
        - jwt: []
      summary: Remove team from organization
      description: Removes (unassigns) a team from an organization.
      operationId: removeTeamFromOrg
      parameters:
        - $ref: "#/components/parameters/orgId"
        - $ref: "#/components/parameters/teamId"
      responses:
        "200":
          description: Team removed from organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamsOrganizationsMappingPage"
        "400":
          description: Bad request
        "401":
          description: Unauthorized
        "404":
          description: Not found
        "500":
          description: Internal server error

  /api/identity/orgs/{orgId}/users/{userId}:
    post:
      security:
        - jwt: []
      summary: Add user to organization
      operationId: addUserToOrg
      parameters:
        - $ref: "#/components/parameters/orgId"
        - name: userId
          in: path
          required: true
          schema:
            $ref: "../../v1alpha1/core/api.yml#/components/schemas/user_id"
      responses:
        "200":
          description: User added to organization
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          description: Unauthorized
        "500":
          description: Internal server error
    delete:
      security:
        - jwt: []
      summary: Remove user from organization
      operationId: deleteUserFromOrg
      parameters:
        - $ref: "#/components/parameters/orgId"
        - name: userId
          in: path
          required: true
          schema:
            $ref: "../../v1alpha1/core/api.yml#/components/schemas/user_id"
      responses:
        "200":
          description: User removed from organization
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          description: Unauthorized
        "500":
          description: Internal server error

components:
  securitySchemes:
    jwt:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    400:
      $ref: "../../v1alpha1/core/api.yml#/components/responses/400"
    401:
      $ref: "../../v1alpha1/core/api.yml#/components/responses/401"
    404:
      $ref: "../../v1alpha1/core/api.yml#/components/responses/404"
    500:
      $ref: "../../v1alpha1/core/api.yml#/components/responses/500"

  parameters:
    orgId:
      name: orgId
      in: path
      required: true
      schema:
        $ref: "../../v1alpha1/core/api.yml#/components/schemas/organization_id"

    page:
      $ref: "../../v1alpha1/core/api.yml#/components/parameters/page"

    pagesize:
      $ref: "../../v1alpha1/core/api.yml#/components/parameters/pagesize"

    search:
      $ref: "../../v1alpha1/core/api.yml#/components/parameters/search"

    order:
      $ref: "../../v1alpha1/core/api.yml#/components/parameters/order"

    all:
      $ref: "../../v1alpha1/core/api.yml#/components/parameters/all"

    teamId:
      name: teamId
      in: path
      required: true
      schema:
        $ref: "../../v1alpha1/core/api.yml#/components/schemas/team_id"
  requestBodies:
    organizationPayload:
      description: Body for creating or updating an organization
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/OrganizationPayload"

  schemas:
    UUID:
      $ref: "../../v1alpha1/core/api.yml#/components/schemas/uuid"

    NullableTime:
      $ref: "../../v1alpha1/core/api.yml#/components/schemas/SqlNullTime"

    Time:
      $ref: "../../v1alpha1/core/api.yml#/components/schemas/Time"

    Text:
      $ref: "../../v1alpha1/core/api.yml#/components/schemas/Text"

    MapObject:
      $ref: "../../v1alpha1/core/api.yml#/components/schemas/MapObject"

    OrgTeamActionPayload:
      type: object
      description: Optional action payload for POST on /api/identity/orgs/{orgId}/teams/{teamId}.
      properties:
        action:
          type: string
          description: Internal action to perform on the team resource.
          enum:
            - delete

    Location:
      type: object
      x-go-type: "Location"
      properties:
        location:
          type: string

    Logo:
      type: object
      required:
        - desktop_view
        - mobile_view
        - dark_desktop_view
        - dark_mobile_view
      properties:
        desktop_view:
          x-go-type: "Location"
          $ref: "#/components/schemas/Location"
        mobile_view:
          x-go-type: "Location"
          $ref: "#/components/schemas/Location"
        dark_desktop_view:
          x-go-type: "Location"
          $ref: "#/components/schemas/Location"
        dark_mobile_view:
          x-go-type: "Location"
          $ref: "#/components/schemas/Location"

    Theme:
      type: object
      properties:
        id:
          type: string
        logo:
          x-go-type: "Logo"
          $ref: "#/components/schemas/Logo"
        vars:
          type: object
          additionalProperties: true
          x-go-type: "map[string]interface{}"

    DashboardPrefs:
      type: object
      description: Preferences specific to dashboard behavior
      required:
        - layout
      properties:
        layout:
          type: object
          additionalProperties: true
      x-go-type: "DashboardPrefs"

    Preferences:
      type: object
      required:
        - theme
        - dashboard
      properties:
        theme:
          x-go-type: "Theme"
          $ref: "#/components/schemas/Theme"
        dashboard:
          x-go-type: "DashboardPrefs"
          $ref: "#/components/schemas/DashboardPrefs"

    OrgMetadata:
      type: object
      required:
        - preferences
      properties:
        preferences:
          x-go-type: "Preferences"
          $ref: "#/components/schemas/Preferences"

    Organization:
      type: object
      required:
        - name
        - metadata
      properties:
        id:
          $ref: "#/components/schemas/UUID"
          x-oapi-codegen-extra-tags:
            db: "id"
        name:
          type: string
          x-oapi-codegen-extra-tags:
            db: "name"
        country:
          type: string
          x-oapi-codegen-extra-tags:
            db: "country"
        region:
          type: string
          x-oapi-codegen-extra-tags:
            db: "region"
        description:
          type: string
          x-oapi-codegen-extra-tags:
            db: "description"
        owner:
          $ref: "#/components/schemas/UUID"
          x-oapi-codegen-extra-tags:
            db: "owner"
        metadata:
          x-go-type: "OrgMetadata"
          $ref: "#/components/schemas/OrgMetadata"
          x-oapi-codegen-extra-tags:
            db: "metadata"
        created_at:
          $ref: "#/components/schemas/Time"
          x-oapi-codegen-extra-tags:
            db: "created_at"
        updated_at:
          $ref: "#/components/schemas/Time"
          x-oapi-codegen-extra-tags:
            db: "updated_at"
        deleted_at:
          $ref: "#/components/schemas/NullableTime"
          x-oapi-codegen-extra-tags:
            db: "deleted_at"
        domain:
          type: string
          nullable: true
          x-oapi-codegen-extra-tags:
            db: "domain"
        invite_id:
          $ref: "#/components/schemas/UUID"
          nullable: true
          x-oapi-codegen-extra-tags:
            db: "invite_id"

    AvailableOrganization:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/UUID"
          x-go-name: ID
        name:
          $ref: "#/components/schemas/Text"
        description:
          $ref: "#/components/schemas/Text"
        country:
          $ref: "#/components/schemas/Text"
        region:
          $ref: "#/components/schemas/Text"
        owner:
          $ref: "#/components/schemas/Text"
        metadata:
          x-go-type: "OrgMetadata"
          $ref: "#/components/schemas/OrgMetadata"
        created_at:
          $ref: "#/components/schemas/Time"
        updated_at:
          $ref: "#/components/schemas/Time"
        deleted_at:
          $ref: "#/components/schemas/NullableTime"

    OrganizationsPage:
      type: object
      properties:
        page:
          type: integer
        page_size:
          type: integer
        total_count:
          type: integer
        organizations:
          type: array
          items:
            $ref: "#/components/schemas/AvailableOrganization"

    OrganizationPage:
      type: object
      description: Single-organization wrapper used by current meshery-cloud organization handlers.
      properties:
        page:
          type: integer
        page_size:
          type: integer
        total_count:
          type: integer
        organizations:
          type: array
          maxItems: 1
          items:
            $ref: "#/components/schemas/AvailableOrganization"

    OrganizationPayload:
      type: object
      properties:
        name:
          $ref: "#/components/schemas/Text"
        country:
          $ref: "#/components/schemas/Text"
        region:
          $ref: "#/components/schemas/Text"
        description:
          $ref: "#/components/schemas/Text"
        notify_org_update:
          type: boolean
        preferences:
          $ref: "#/components/schemas/Preferences"

    AvailableTeam:
      type: object
      properties:
        ID:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/general_id"
        name:
          $ref: "#/components/schemas/Text"
        description:
          $ref: "#/components/schemas/Text"
        owner:
          $ref: "#/components/schemas/Text"
        metadata:
          $ref: "#/components/schemas/MapObject"
        created_at:
          $ref: "#/components/schemas/Time"
        updated_at:
          $ref: "#/components/schemas/Time"
        deleted_at:
          $ref: "#/components/schemas/NullableTime"

    TeamsPage:
      type: object
      properties:
        page:
          type: integer
        page_size:
          type: integer
        total_count:
          type: integer
        teams:
          type: array
          items:
            $ref: "#/components/schemas/AvailableTeam"

    TeamsOrganizationsMapping:
      type: object
      properties:
        ID:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/general_id"
        org_id:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/organization_id"
        team_id:
          $ref: "../../v1alpha1/core/api.yml#/components/schemas/team_id"
        created_at:
          $ref: "#/components/schemas/Time"
        updated_at:
          $ref: "#/components/schemas/Time"
        deleted_at:
          $ref: "#/components/schemas/NullableTime"

    TeamsOrganizationsMappingPage:
      type: object
      properties:
        page:
          type: integer
        page_size:
          type: integer
        total_count:
          type: integer
        teams_organizations_mapping:
          type: array
          items:
            $ref: "#/components/schemas/TeamsOrganizationsMapping"

    LogoPayload:
      type: object
      properties:
        data:
          type: string
          format: byte
        filename:
          type: string

    ThemePayload:
      type: object
      properties:
        id:
          type: string
        vars:
          type: object
          additionalProperties: true
        logo:
          type: object
          properties:
            desktop_view:
              $ref: "#/components/schemas/LogoPayload"
            mobile_view:
              $ref: "#/components/schemas/LogoPayload"
            dark_desktop_view:
              $ref: "#/components/schemas/LogoPayload"
            dark_mobile_view:
              $ref: "#/components/schemas/LogoPayload"

    PreferencesPayload:
      type: object
      required:
        - theme
        - dashboard
      properties:
        theme:
          $ref: "#/components/schemas/ThemePayload"
        dashboard:
          $ref: "#/components/schemas/DashboardPrefs"

    OrganizationPayload:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        country:
          type: string
        region:
          type: string
        description:
          type: string
        notify_org_update:
          type: boolean
        domain:
          type: string
          nullable: true
        preferences:
          $ref: "#/components/schemas/PreferencesPayload"
        invite_id:
          $ref: "#/components/schemas/UUID"
          nullable: true
