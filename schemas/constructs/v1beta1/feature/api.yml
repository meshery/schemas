openapi: 3.0.0
info:
  title: Feature
  description: >-
    OpenAPI schema for the Features construct - the quantified entitlements
    granted by Meshery Cloud subscription plans.
  version: v1beta1
  contact:
    name: Meshery Maintainers
    email: maintainers@meshery.io
    url: https://meshery.io
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

security:
  - jwt: []

tags:
  - name: Features
    description: Operations related to features and entitlements

paths:
  /api/entitlement/features:
    $ref: "./feature_operations.yml#/collection"
  /api/entitlement/subscriptions/organizations/{orgId}/features:
    $ref: "./feature_operations.yml#/organizationCollection"

components:
  responses:
    400:
      $ref: "../core/api.yml#/components/responses/400"
    401:
      $ref: "../core/api.yml#/components/responses/401"
    404:
      $ref: "../core/api.yml#/components/responses/404"
    500:
      $ref: "../core/api.yml#/components/responses/500"

  parameters:
    orgId:
      name: orgId
      in: path
      description: The ID of the organization
      required: true
      schema:
        $ref: ../core/api.yml#/components/schemas/uuid
    page:
      $ref: ../core/api.yml#/components/parameters/page
    pagesize:
      $ref: ../core/api.yml#/components/parameters/pagesize

  securitySchemes:
    jwt:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Feature:
      $ref: "./feature.yaml"

    FeatureName:
      type: string
      x-enum-casing-exempt: true
      enum:
        - ComponentsInDesign
        - RelationshipsInDesign
        - DesignsInWorkspace
        - WorkspacesInOrganization
        - ImageSizeInDesign
        - SizePerDesign
      description: Enumeration of feature names that can be granted by a plan.

    FeaturesPage:
      type: array
      description: List of features.
      items:
        $ref: "#/components/schemas/Feature"
        x-go-type: Feature
