$id: https://schemas.meshery.io/view.yaml
$schema: http://json-schema.org/draft-07/schema#
title: MesheryView
description: A saved view with filters and metadata that defines a customized perspective of Meshery resources. Learn more at https://docs.meshery.io/concepts/logical/views
additionalProperties: false
type: object
example:
  id: 00000000-0000-0000-0000-000000000000
  name: My Kubernetes View
  visibility: private
  filters: {}
  metadata: {}
  user_id: 00000000-0000-0000-0000-000000000000
  created_at: "0001-01-01T00:00:00Z"
  updated_at: "0001-01-01T00:00:00Z"
  deleted_at: null
required:
  - id
  - name
  - visibility
  - user_id
  - created_at
  - updated_at
properties:
  id:
    $ref: ../core/api.yml#/components/schemas/uuid
    description: Unique identifier for the view.
    x-order: 1
    x-go-name: ID
    x-oapi-codegen-extra-tags:
      db: id
      yaml: id
  name:
    type: string
    description: Display name of the view.
    maxLength: 255
    minLength: 1
    x-order: 2
    x-oapi-codegen-extra-tags:
      db: name
      yaml: name
  visibility:
    type: string
    description: Visibility level of the view.
    maxLength: 255
    x-order: 3
    x-go-type-skip-optional-pointer: true
    x-oapi-codegen-extra-tags:
      db: visibility
      yaml: visibility
  filters:
    type: object
    description: Filter configuration that defines which resources this view displays.
    x-go-type: core.Map
    x-go-type-import:
      path: github.com/meshery/schemas/models/core
      name: core
    x-go-type-skip-optional-pointer: true
    x-order: 4
    x-oapi-codegen-extra-tags:
      db: filters
      yaml: filters
  metadata:
    type: object
    description: Additional metadata associated with the view.
    x-go-type: core.Map
    x-go-type-import:
      path: github.com/meshery/schemas/models/core
      name: core
    x-go-type-skip-optional-pointer: true
    x-order: 5
    x-oapi-codegen-extra-tags:
      db: metadata
      yaml: metadata
  user_id:
    $ref: ../core/api.yml#/components/schemas/uuid
    description: ID of the user who created the view.
    x-go-name: UserID
    x-go-type-skip-optional-pointer: true
    x-order: 6
    x-oapi-codegen-extra-tags:
      db: user_id
      yaml: user_id
  created_at:
    $ref: ../core/api.yml#/components/schemas/Time
    description: Timestamp when the view was created.
    x-oapi-codegen-extra-tags:
      db: created_at
      yaml: created_at
    x-order: 7
  updated_at:
    $ref: ../core/api.yml#/components/schemas/Time
    description: Timestamp when the view was last updated.
    x-oapi-codegen-extra-tags:
      db: updated_at
      yaml: updated_at
    x-order: 8
  deleted_at:
    $ref: ../core/api.yml#/components/schemas/nullTime
    description: Timestamp when the view was soft deleted. Null while the view remains active.
    nullable: true
    x-go-type: core.NullTime
    x-go-import: database/sql
    x-oapi-codegen-extra-tags:
      db: deleted_at
      yaml: deleted_at
    x-order: 9
