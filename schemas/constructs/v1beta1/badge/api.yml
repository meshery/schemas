openapi: 3.0.0
info:
  title: Badge
  description: OpenAPI schema for managing badges.
  version: v1beta1
  contact:
    name: Meshery Maintainers
    email: maintainers@meshery.io
    url: https://meshery.io
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

security:
  - jwt: []

tags:
  - name: Badge

paths:
  /api/organizations/badges/{id}:
    delete:
      x-internal: ["cloud"]
      operationId: deleteBadgeById
      tags:
        - Badge
      summary: Delete a badge by its ID
      parameters:
        - $ref: "../core/api.yml#/components/parameters/id"

      responses:
        "204":
          description: Badge deleted
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

    get:
      x-internal: ["cloud"]
      operationId: getBadgeById
      tags:
        - Badge
      summary: Get a badge by its ID
      parameters:
        - $ref: "../core/api.yml#/components/parameters/id"

      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Badge"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/organizations/badges:
    post:
      x-internal: ["cloud"]
      operationId: createOrUpdateBadge
      tags:
        - Badge
      summary: Create a new badge or update an existing badge
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BadgePayload"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Badge"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /api/identity/badges:
    get:
      x-internal: ["cloud"]
      operationId: getAvailableBadges
      tags:
        - Badge
      summary: Get available badges
      responses:
        "200":
          description: Available badges
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadgesPage"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /api/identity/users/badges:
    put:
      x-internal: ["cloud"]
      operationId: assignBadges
      tags:
        - Badge
      summary: Assign badges to a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BadgeAssignmentPayload"
      responses:
        "200":
          description: Badge assignment result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

components:
  responses:
    400:
      $ref: "../core/api.yml#/components/responses/400"
    401:
      $ref: "../core/api.yml#/components/responses/401"
    404:
      $ref: "../core/api.yml#/components/responses/404"
    500:
      $ref: "../core/api.yml#/components/responses/500"

  securitySchemes:
    jwt:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    BadgePayload:
      type: object
      description: Payload for creating or updating a badge.
      required:
        - label
        - name
        - org_id
        - description
        - image_url
      properties:
        id:
          $ref: "../core/api.yml#/components/schemas/uuid"
          x-go-name: ID
          description: Existing badge ID for updates; omit on create.
          x-oapi-codegen-extra-tags:
            db: "id"
            json: "id,omitempty"

        org_id:
          $ref: "../core/api.yml#/components/schemas/uuid"
          description: The ID of the organization in which this badge is available.
          x-oapi-codegen-extra-tags:
            db: "org_id"
            json: "org_id"

        label:
          type: string
          description: unique identifier for the badge ( auto generated )
          example: Kubernetes-Expert
          x-oapi-codegen-extra-tags:
            db: "label"
            json: "label"
          maxLength: 500

        name:
          type: string
          description: Concise descriptor for the badge or certificate.
          example: Kubernetes Expert
          x-oapi-codegen-extra-tags:
            db: "name"
            json: "name"
          minLength: 1
          maxLength: 255

        description:
          type: string
          description: A description of the milestone achieved, often including criteria for receiving this recognition.
          example: Awarded for mastering Kubernetes concepts and practices.
          x-oapi-codegen-extra-tags:
            db: "description"
            json: "description"
          maxLength: 5000

        image_url:
          type: string
          format: uri
          description: URL to the badge image
          example: https://raw.githubusercontent.com/layer5io/layer5-academy/refs/heads/master/static/11111111-1111-1111-1111-111111111111/images/meshery-logo-light.webp
          x-oapi-codegen-extra-tags:
            db: "image_url"
            json: "image_url"

    Badge:
      type: object
      required:
        - id
        - label
        - name
        - org_id
        - description
        - image_url
        - created_at
        - updated_at
        - deleted_at
      properties:
        id:
          $ref: "../core/api.yml#/components/schemas/uuid"
          x-go-name: ID
          x-oapi-codegen-extra-tags:
            db: "id"
            json: "id"

        org_id:
          $ref: "../core/api.yml#/components/schemas/uuid"
          description: The ID of the organization in which this badge is available .
          x-oapi-codegen-extra-tags:
            db: "org_id"
            json: "org_id"

        label:
          type: string
          description: unique identifier for the badge ( auto generated )
          example: Kubernetes-Expert
          x-oapi-codegen-extra-tags:
            db: "label"
            json: "label"
          maxLength: 500

        name:
          type: string
          description: Concise descriptor for the badge or certificate.
          example: Kubernetes Expert
          x-oapi-codegen-extra-tags:
            db: "name"
            json: "name"
          minLength: 1
          maxLength: 255

        description:
          type: string
          description: A description of the milestone achieved, often including criteria for receiving this recognition.
          example: Awarded for mastering Kubernetes concepts and practices.
          x-oapi-codegen-extra-tags:
            db: "description"
            json: "description"
          maxLength: 5000

        image_url:
          type: string
          format: uri
          description: URL to the badge image
          example: https://raw.githubusercontent.com/layer5io/layer5-academy/refs/heads/master/static/11111111-1111-1111-1111-111111111111/images/meshery-logo-light.webp
          x-oapi-codegen-extra-tags:
            db: "image_url"
            json: "image_url"

        created_at:
          $ref: "../core/api.yml#/components/schemas/created_at"

        updated_at:
          $ref: "../core/api.yml#/components/schemas/updated_at"

        deleted_at:
          type: string
          format: date-time
          x-go-type: "core.NullTime"

          description: Timestamp when the resource was deleted, if applicable

          x-oapi-codegen-extra-tags:
            db: "deleted_at"
            json: "deleted_at"

    BadgesPage:
      type: object
      properties:
        badges:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/Badge"
          description: The badges of the badgespage.

    BadgeAssignmentPayload:
      type: object
      properties:
        badges:
          type: array
          items:
            type: string
          description: The badges of the badgeassignment.
        user_id:
          type: string
          description: ID of the user who owns or created this resource.
          maxLength: 500
          format: uuid
        notify:
          type: boolean
          description: The notify of the badgeassignment.
