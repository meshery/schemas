openapi: 3.0.0
info:
  title: model
  version: 1.0.0
paths:
  /api/meshmodels/register:
    post:
      summary: Register mesh models
      operationId: RegisterMeshmodels
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/ImportRequest"
      responses:
        "200":
          description: Successful registration
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "400":
          description: Invalid request format
        "500":
          description: Internal server error

  /api/meshmodels/registrants:
    get:
      summary: Get meshmodel registrants
      description: Returns a list of all meshmodel registrants
      operationId: GetMeshmodelRegistrants
      tags:
        - model
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pagesize"
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/order"
        - $ref: "#/components/parameters/sort"
      responses:
        "200":
          description: Successful
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RegistrantReference"
        "500":
          $ref: "#/components/responses/500"

  /api/meshmodels/models:
    get:
      summary: Get meshmodel models
      description: Returns a list of all meshmodel models
      operationId: idGetMeshmodelModels
      tags:
        - model
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pagesize"
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/order"
        - $ref: "#/components/parameters/sort"
        - $ref: "#/components/parameters/version"
        - $ref: "#/components/parameters/annotations"
        - name: id
          in: query
          schema:
            type: string
        - name: registrant
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Successful
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ModelDefinition"
        "500":
          $ref: "#/components/responses/500"

  /api/meshmodels/models/{model}:
    get:
      summary: Get meshmodel models by name
      description: Returns a list of meshmodel models by name
      operationId: idGetMeshmodelModelsByName
      tags:
        - model
      parameters:
        - name: model
          in: path
          description: Model Name
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pagesize"
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/order"
        - $ref: "#/components/parameters/sort"
        - $ref: "#/components/parameters/version"
        - $ref: "#/components/parameters/annotations"
      responses:
        "200":
          description: Successful
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ModelDefinition"
        "500":
          $ref: "#/components/responses/500"

  /api/meshmodels/categories:
    get:
      summary: Get meshmodel categories
      description: Returns a list of all meshmodel categories
      operationId: idGetMeshmodelCategories
      tags:
        - model
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pagesize"
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/order"
        - $ref: "#/components/parameters/sort"
      responses:
        "200":
          description: Successful
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryDefinition" # Assuming this schema exists or I should define it
        "500":
          $ref: "#/components/responses/500"

  /api/meshmodels/categories/{category}:
    get:
      summary: Get meshmodel categories by name
      description: Returns a list of meshmodel categories by name
      operationId: idGetMeshmodelCategoriesByName
      tags:
        - model
      parameters:
        - name: category
          in: path
          description: Category Name
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pagesize"
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/order"
        - $ref: "#/components/parameters/sort"
      responses:
        "200":
          description: Successful
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryDefinition"
        "500":
          $ref: "#/components/responses/500"

  /api/meshmodels/categories/{category}/models:
    get:
      summary: Get meshmodel models by category
      description: Returns a list of meshmodel models for a specific category
      operationId: idGetMeshmodelModelsByCategories
      tags:
        - model
      parameters:
        - name: category
          in: path
          description: Category Name
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pagesize"
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/order"
        - $ref: "#/components/parameters/sort"
        - $ref: "#/components/parameters/version"
        - $ref: "#/components/parameters/annotations"
      responses:
        "200":
          description: Successful
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ModelDefinition"
        "500":
          $ref: "#/components/responses/500"

  /api/meshmodels/categories/{category}/models/{model}:
    get:
      summary: Get meshmodel models by category and name
      description: Returns a list of meshmodel models for a specific category and name
      operationId: idGetMeshmodelModelsByCategoriesByModel
      tags:
        - model
      parameters:
        - name: category
          in: path
          description: Category Name
          required: true
          schema:
            type: string
        - name: model
          in: path
          description: Model Name
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pagesize"
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/order"
        - $ref: "#/components/parameters/sort"
        - $ref: "#/components/parameters/version"
        - $ref: "#/components/parameters/annotations"
      responses:
        "200":
          description: Successful
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ModelDefinition"
        "500":
          $ref: "#/components/responses/500"

  /api/meshmodel/generate:
    post:
      summary: Generate meshmodel component
      description: Generates a meshmodel component
      operationId: idPostMeshModelComponentGenerate
      tags:
        - model
      responses:
        "200":
          description: Successful
        "500":
          $ref: "#/components/responses/500"

  /api/meshmodel/update/status:
    post:
      summary: Update meshmodel status
      description: Updates the status of a meshmodel entity
      operationId: idPostMeshModelUpdateEntityStatus
      tags:
        - model
      responses:
        "200":
          description: Successful
        "500":
          $ref: "#/components/responses/500"

  /api/meshmodel/validate:
    post:
      summary: Validate meshmodel
      description: Validates a meshmodel
      operationId: idPostMeshModelValidate
      tags:
        - model
      responses:
        "200":
          description: Successful
        "500":
          $ref: "#/components/responses/500"

  /api/meshmodels/export:
    get:
      summary: Export meshmodel
      description: Exports a meshmodel
      operationId: idExportModel
      tags:
        - model
      responses:
        "200":
          description: Successful
        "500":
          $ref: "#/components/responses/500"
components:
  parameters:
    page:
      name: page
      in: query
      description: Page number
      schema:
        type: integer
    pagesize:
      name: pagesize
      in: query
      description: Page size
      schema:
        type: string
    search:
      name: search
      in: query
      description: Search term
      schema:
        type: string
    order:
      name: order
      in: query
      description: Order field
      schema:
        type: string
    sort:
      name: sort
      in: query
      description: Sort direction (asc/desc)
      schema:
        type: string
    version:
      name: version
      in: query
      description: Version filter
      schema:
        type: string
    annotations:
      name: annotations
      in: query
      description: Filter by annotations (true/false)
      schema:
        type: string
  responses:
    "500":
      description: Internal Server Error

  schemas:
    CategoryDefinition:
      type: object
      properties:
        name:
          type: string
          description: Name of the category
    Model:
      type: object
      description: "Registrant-defined data associated with the model. Properties pertain to the software being managed (e.g. Kubernetes v1.31)."
      required:
        - version
      properties:
        version:
          description: "Version of the model as defined by the registrant."
          allOf:
            - $ref: "../../v1alpha1/core/api.yml#/components/schemas/semverString"
          x-oapi-codegen-extra-tags:
            yaml: "version"
            json: "version"
          x-order: 1

    ModelDefinition:
      $ref: "./model.yaml"

    RegistrantReference:
      "type": "object"
      required:
        - "kind"
      "properties":
        "kind":
          "type": "string"

    ModelReference:
      type: "object"
      "required":
        ["id", "name", "version", "displayName", "model", "registrant"]
      "properties":
        id:
          "$ref": "../../v1alpha1/core/api.yml#/components/schemas/uuid"
        name:
          "$ref": "./model.yaml#/properties/name"
        version:
          "$ref": "./model.yaml#/properties/version"
        displayName:
          "$ref": "./model.yaml#/properties/displayName"
        model:
          "$ref": "./model.yaml#/properties/model"
        registrant:
          "x-go-type": "RegistrantReference"
          "$ref": "#/components/schemas/RegistrantReference"
          x-oapi-codegen-extra-tags:
            yaml: "registrant"
            json: "registrant"

      "description": "Reference to the specific registered model to which the component belongs and from which model version, category, and other properties may be referenced. Learn more at https://docs.meshery.io/concepts/models"

    ImportRequest:
      type: object
      required:
        - importBody
        - uploadType
        - register
      properties:
        importBody:
          $ref: "#/components/schemas/ImportBody"
        uploadType:
          type: string
          title: "Upload method"
          enum: ["file", "urlImport", "csv", "url"]
          enumDescriptions:
            [
              "Upload a model file (.tar, .tar.gz, .tgz) from your local system",
              "Import a model file using a direct URL to the source",
              "Upload separate CSV files for model definitions, components, and their relationships",
            ]
          description: "Choose the method you prefer to upload your model file. Select 'File Import' or 'CSV Import' if you have the file on your local system or 'URL Import' if you have the file hosted online."
        register:
          type: boolean
          nullable: false

    ImportBody:
      oneOf:
        - title: File Import
          type: object
          required: [fileName, modelFile]
          properties:
            fileName:
              type: string
              description: "Name of the file being uploaded."
            modelFile:
              type: string
              format: file
              description: "Supported model file formats are: .tar, .tar.gz, and .tgz. See [Import Models Documentation](https://docs.meshery.io/guides/configuration-management/importing-models#import-models-using-meshery-ui) for details"

        - title: URL Import
          type: object
          required: [url]
          properties:
            url:
              type: string
              format: uri
              description: 'A direct URL to a single model file, for example: https://raw.github.com/your-model-file.tar. Supported model file formats are: .tar, .tar.gz, and .tgz. \n\nFor bulk import of your model use the GitHub connection or CSV files. See [Import Models Documentation](https://docs.meshery.io/guides/configuration-management/importing-models#import-models-using-meshery-ui) for details'

        - title: CSV Import
          type: object
          required: [modelCsv, componentCsv, relationshipCsv]
          properties:
            modelCsv:
              type: string
              format: binary
              description: Upload a CSV file containing model definitions
            componentCsv:
              type: string
              format: binary
              description: Upload a CSV file containing component definitions
            relationshipCsv:
              type: string
              format: binary
              description: Upload a CSV file containing relationship definitions

        - title: Model Create
          type: object
          required: [model, url]
          properties:
            url:
              type: string
              description: "URI to the source code or package of the model."
              format: uri
              oneOf:
                - title: "GitHub"
                  type: string
                  pattern: "^git://github\\.com/[\\w.-]+/[\\w.-]+(/[\\w.-]+/[\\w/-]+)?$"
                  description: "Git protocol URL for GitHub repository or specific resource path"
                  example: "git://github.com/cert-manager/cert-manager/master/deploy/crds"
                  x-metadata:
                    uiType: "url"
                    validationHint: "Enter a git protocol URL (e.g., git://github.com/owner/repo)"
                - title: "Artifact Hub"
                  type: string
                  pattern: "^https:\\/\\/artifacthub\\.io\\/packages\\/(search\\?ts_query_web=[\\w.-]+|[\\w.-]+\\/[\\w.-]+\\/[\\w.-]+)$"
                  description: "Artifact Hub package URL or search query URL with model name parameter"
                  example: "https://artifacthub.io/packages/search?ts_query_web={model-name}"
                  x-metadata:
                    uiType: "url"
                    validationHint: "Enter an Artifact Hub URL (e.g., https://artifacthub.io/packages/search?ts_query_web={meshery-operator})"
