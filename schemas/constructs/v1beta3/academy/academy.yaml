  createdAt:
    $ref: './api.yml#/components/schemas/AcademyCurriculaCreatedAt'
  updatedAt:
    $ref: './api.yml#/components/schemas/AcademyCurriculaUpdatedAt'
  deletedAt:
    $ref: './api.yml#/components/schemas/AcademyCurriculaDeletedAt'
  metadata:
    $ref: './api.yml#/components/schemas/AcademyCurriculaMetadata'
