type: object
additionalProperties: false
description: AcademyCurricula entity schema.
example:
  $ref: "./templates/academy_template.json"
required:
- id
- type
- orgId
- visibility
- status
- slug
- createdAt
- updatedAt
- deletedAt
- metadata
- level
properties:
  id:
    type: string
    description: Id of the Curricula
    example: 923458-3490394-934893
    x-go-name: ID
    x-oapi-codegen-extra-tags:
      db: id
      json: id
    maxLength: 500
    format: uuid
  type:
    $ref: './api.yml#/components/schemas/ContentType'
    x-go-type: ContentType
    x-oapi-codegen-extra-tags:
      db: type
  orgId:
    $ref: './api.yml#/components/schemas/AcademyCurriculaOrgId'
  visibility:
    $ref: './api.yml#/components/schemas/Visibility'
    description: Visibility of the Curricula
    x-go-type: Visibility
    x-oapi-codegen-extra-tags:
      db: visibility
      json: visibility
  status:
    $ref: './api.yml#/components/schemas/Status'
    example: ready
    description: Status of the Curricula
    x-go-type: Status
    x-oapi-codegen-extra-tags:
      db: status
      json: status
  slug:
    type: string
    description: slug of the Curricula
    example: intro-kubernetes-course
    maxLength: 500
  level:
    $ref: './api.yml#/components/schemas/Level'
    description: Level of the Curricula
    x-go-type: Level
    x-oapi-codegen-extra-tags:
      db: level
      json: level
  badgeId:
    type: string
    format: uuid
    description: ID of the badge to be awarded on completion of this curricula
    x-go-type: core.Uuid
