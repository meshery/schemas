openapi: 3.0.0
info:
  title: Subscription
  description: API for managing subscriptions using various payment processors in a SaaS application.
  version: v1beta3
  contact:
    name: Meshery Maintainers
    email: maintainers@meshery.io
    url: https://meshery.io
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
servers:
- url: http://localhost:8080
  description: Local development server
tags:
- name: Subscriptions
  description: Operations related to subscriptions
- name: Plans
  description: Operations related to plans
- name: Payment Processors
  description: Operations related to payment processors
paths:
  /api/entitlement/subscriptions:
    get:
      x-internal:
      - cloud
      tags:
      - Subscriptions
      description: Returns all subscriptions for the organization
      operationId: getSubscriptions
      summary: Read subscriptions
      security:
      - jwt: []
      parameters:
      - $ref: '#/components/parameters/page'
      - $ref: '#/components/parameters/pagesize'
      - $ref: '#/components/parameters/order'
      - name: status
        in: query
        description: Filter subscriptions by status
        required: false
        schema:
          type: array
          items:
            type: string
        style: form
        explode: true
      - name: planId
        in: query
        description: Filter subscriptions by plan UUID. Repeat for multiple values.
        required: false
        schema:
          type: array
          items:
            type: string
        style: form
        explode: true
      responses:
        '200':
          description: Subscriptions response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionPage'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '500':
          $ref: '#/components/responses/500'
  /api/entitlement/subscriptions/{subscriptionId}/cancel:
    post:
      x-internal:
      - cloud
      tags:
      - Subscriptions
      operationId: cancelSubscription
      summary: Cancel an existing subscription. The subscription will remain active
        until the end of the billing period and then it will be canceled.
      security:
      - jwt: []
      parameters:
      - $ref: '#/components/parameters/subscriptionId'
      responses:
        '200':
          description: Subscription cancellation scheduled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionPage'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
  /api/entitlement/subscriptions/create:
    post:
      x-internal:
      - cloud
      tags:
      - Subscriptions
      operationId: createSubscription
      summary: Create a new subscription for an organization
      security:
      - jwt: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSubscriptionRequest'
      responses:
        '201':
          description: A new subscription has been created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateSubscriptionResponse'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '500':
          $ref: '#/components/responses/500'
  /api/entitlement/subscriptions/{subscriptionId}/upgrade:
    post:
      x-internal:
      - cloud
      tags:
      - Subscriptions
      operationId: upgradeSubscription
      summary: Upgrade or downgrade an existing subscription by changing one of the
        plans in the subscription
      security:
      - jwt: []
      parameters:
      - $ref: '#/components/parameters/subscriptionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpgradeSubscriptionRequest'
      responses:
        '200':
          description: Subscription upgraded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
  /api/entitlement/subscriptions/{subscriptionId}/upgrade-preview:
    post:
      x-internal:
      - cloud
      tags:
      - Subscriptions
      operationId: previewSubscriptionUpgrade
      summary: Preview the invoice for upgrading or downgrading an existing subscription
        by changing one of the plans in the subscription
      security:
      - jwt: []
      parameters:
      - $ref: '#/components/parameters/subscriptionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpgradeSubscriptionRequest'
      responses:
        '200':
          description: Preview of the upgraded subscription invoice
          content:
            application/json:
              schema:
                type: object
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
  /api/entitlement/subscriptions/webhooks:
    post:
      x-internal:
      - cloud
      tags:
      - Payment Processors
      operationId: handleSubscriptionWebhook
      summary: Handle webhook events from payment processors
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookEvent'
      responses:
        '200':
          description: Webhook processed
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '500':
          $ref: '#/components/responses/500'
components:
  responses:
    400:
      $ref: ../../v1beta2/core/api.yml#/components/responses/400
    401:
      $ref: ../../v1beta2/core/api.yml#/components/responses/401
    404:
      $ref: ../../v1beta2/core/api.yml#/components/responses/404
    500:
      $ref: ../../v1beta2/core/api.yml#/components/responses/500
  securitySchemes:
    jwt:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    subscriptionId:
      name: subscriptionId
      in: path
      required: true
      description: Subscription ID
      schema:
        type: string
        format: uuid
    page:
      $ref: ../../v1beta2/core/api.yml#/components/parameters/page
    pagesize:
      $ref: ../../v1beta2/core/api.yml#/components/parameters/pagesize
    pagesizeWithAll:
      $ref: ../../v1beta2/core/api.yml#/components/parameters/pagesizeWithAll
    order:
      $ref: ../../v1beta2/core/api.yml#/components/parameters/order
  schemas:
    PaymentProcessor:
      type: string
      description: Payment processor used to charge the subscription.
      enum:
      - stripe
      - paypal
      - braintree
    CreateSubscriptionRequest:
      type: object
      description: Payload for creating a new subscription through a payment processor.
      properties:
        orgId:
          $ref: ../../v1beta2/core/api.yml#/components/schemas/Uuid
          description: ID of the organization subscribing.
        planId:
          type: string
          description: Price ID from the payment processor.
          x-id-format: external
          maxLength: 500
          pattern: '^[A-Za-z0-9_\-]+$'
        couponId:
          type: string
          description: Coupon ID to apply.
          x-id-format: external
          maxLength: 500
          pattern: '^[A-Za-z0-9_\-]+$'
        userCount:
          type: integer
          description: Number of users in the organization.
          minimum: 0
        email:
          type: string
          format: email
          description: Email of the customer.
          maxLength: 500
        paymentProcessor:
          $ref: '#/components/schemas/PaymentProcessor'
          description: Payment processor used to complete the subscription checkout.
    UpgradeSubscriptionRequest:
      type: object
      description: Payload for upgrading or downgrading a subscription by changing
        one of its plans.
      properties:
        oldPlanId:
          $ref: ../../v1beta2/core/api.yml#/components/schemas/Uuid
          description: Plan ID that is being replaced.
        newPlanId:
          $ref: ../../v1beta2/core/api.yml#/components/schemas/Uuid
          description: Plan ID that replaces the old plan.
    CreateSubscriptionResponse:
      type: object
      description: Response body returned after a subscription is created.
      properties:
        subscriptionId:
          type: string
          description: ID of the associated subscription in the payment processor.
          x-id-format: external
          maxLength: 500
          pattern: '^[A-Za-z0-9_\-]+$'
        clientSecret:
          type: string
          description: Client secret returned by the payment processor for the subscription
            checkout flow.
          maxLength: 500
    UpdateUsersRequest:
      type: object
      description: Payload for synchronizing the current user count with the payment
        processor.
      properties:
        paymentProcessor:
          $ref: '#/components/schemas/PaymentProcessor'
          description: Payment processor currently billing the subscription.
    CancelSubscriptionRequest:
      type: object
      description: Payload for cancelling a subscription in an external processor.
      properties:
        subscriptionId:
          type: string
          description: Subscription ID from the payment processor.
          x-id-format: external
          maxLength: 500
          pattern: '^[A-Za-z0-9_\-]+$'
        paymentProcessor:
          $ref: '#/components/schemas/PaymentProcessor'
          description: Payment processor currently billing the subscription.
    WebhookEvent:
      type: object
      description: Payload for webhook events from payment processors.
    SubscriptionPage:
      type: object
      description: Paginated list of subscriptions.
      required:
      - page
      - pageSize
      - totalCount
      - subscriptions
      properties:
        page:
          type: integer
          description: Current page number of the result set.
          minimum: 0
          x-go-type-skip-optional-pointer: true
        pageSize:
          type: integer
          description: Number of items per page.
          minimum: 1
          x-go-type-skip-optional-pointer: true
          x-oapi-codegen-extra-tags:
            json: pageSize
        totalCount:
          type: integer
          description: Total number of items available.
          minimum: 0
          x-go-type-skip-optional-pointer: true
          x-oapi-codegen-extra-tags:
            json: totalCount
        subscriptions:
          type: array
          items:
            $ref: '#/components/schemas/Subscription'
            x-go-type: Subscription
          description: Subscriptions returned on the current page.
    Subscription:
      $ref: ./subscription.yaml
    SubscriptionStatus:
      type: string
      description: Possible statuses of a Stripe subscription.
      enum:
      - incomplete
      - incomplete_expired
      - trialing
      - active
      - past_due
      - canceled
      - unpaid
      x-enumDescriptions:
        incomplete: The subscription has been created, but the initial payment is
          pending. It may transition to 'active' or 'incomplete_expired'.
        incomplete_expired: The subscription was created but never activated due to
          failed initial payment. It is now expired.
        trialing: The subscription is currently in a trial period before the first
          payment is due.
        active: The subscription is active, and billing is functioning normally.
        past_due: The latest payment attempt failed, but the subscription remains
          active. Stripe may retry the charge.
        canceled: The subscription has been canceled and will no longer generate invoices.
        unpaid: The subscription is still technically active but has unpaid invoices
          and is no longer generating new invoices.
