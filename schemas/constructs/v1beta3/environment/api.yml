openapi: 3.0.0
info:
  title: Environment
  description: OpenAPI schema for environment management in Meshery Cloud.
  version: v1beta3
  contact:
    name: Meshery Maintainers
    email: maintainers@meshery.io
    url: https://meshery.io
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
servers:
  - url: http://localhost:9081
    description: Meshery Server development server URL (controlled via PORT environment variable)

security:
  - jwt: []

tags:
  - name: environments
    description: APIs for environments
components:
  responses:
    200:
      $ref: "../../v1alpha1/core/api.yml#/components/responses/200"
    400:
      $ref: "../../v1alpha1/core/api.yml#/components/responses/400"
    401:
      $ref: "../../v1alpha1/core/api.yml#/components/responses/401"
    404:
      $ref: "../../v1alpha1/core/api.yml#/components/responses/404"
    500:
      $ref: "../../v1alpha1/core/api.yml#/components/responses/500"

  parameters:
    environmentId:
      name: environmentId
      in: path
      description: Environment ID
      schema:
        $ref: ../../v1alpha1/core/api.yml#/components/schemas/Id
      required: true
    search:
      $ref: ../../v1alpha1/core/api.yml#/components/parameters/search
    order:
      $ref: ../../v1alpha1/core/api.yml#/components/parameters/order
    page:
      $ref: ../../v1beta2/core/api.yml#/components/parameters/page
    pageSize:
      $ref: ../../v1beta2/core/api.yml#/components/parameters/pageSize
    pagesize:
      name: pagesize
      in: query
      description: Get responses by pagesize. Deprecated alias of pageSize.
      deprecated: true
      schema:
        type: integer
    orgIdQuery:
      name: orgId
      in: query
      description: User's organization ID
      schema:
        type: string
        format: uuid
        maxLength: 36
      required: true

  securitySchemes:
    jwt:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Environment:
      $ref: "./environment.yaml"
    EnvironmentConnectionMapping:
      type: object
      description: Junction record linking an environment to a connection.
      properties:
        id:
          $ref: ../../v1alpha1/core/api.yml#/components/schemas/general_id
          x-go-name: ID
          description: Mapping record ID.
        environmentId:
          $ref: ../../v1alpha1/core/api.yml#/components/schemas/uuid
          x-go-name: EnvironmentID
          x-oapi-codegen-extra-tags:
            db: environment_id
            json: environmentId
          x-go-type-skip-optional-pointer: true
          description: ID of the associated environment.
        connectionId:
          $ref: ../../v1alpha1/core/api.yml#/components/schemas/uuid
          x-go-name: ConnectionID
          x-oapi-codegen-extra-tags:
            db: connection_id
            json: connectionId
          x-go-type-skip-optional-pointer: true
          description: ID of the associated connection.
        createdAt:
          $ref: ../../v1alpha1/core/api.yml#/components/schemas/Time
          description: Timestamp when the mapping was created.
          x-oapi-codegen-extra-tags:
            db: created_at
            json: createdAt
        updatedAt:
          $ref: ../../v1alpha1/core/api.yml#/components/schemas/Time
          description: Timestamp when the mapping was last updated.
          x-oapi-codegen-extra-tags:
            db: updated_at
            json: updatedAt
        deletedAt:
          $ref: ../../v1alpha1/core/api.yml#/components/schemas/nullTime
          description: Timestamp when the mapping was soft-deleted. Null while the mapping remains active.
          x-oapi-codegen-extra-tags:
            db: deleted_at
            json: deletedAt
    EnvironmentPayload:
      type: object
      description: Payload for creating or updating an environment.
      required:
        - name
        - organizationId
      properties:
        name:
          $ref: ../../v1alpha1/core/api.yml#/components/schemas/Text
          description: An environment is a collection of resources. Provide a name that meaningfully represents these resources. You can change the name of the environment even after its creation.
        description:
          $ref: ../../v1alpha1/core/api.yml#/components/schemas/Text
          description: "An environment is a collection of resources, such as connections & credentials. Provide a detailed description to clarify the purpose of this environment and the types of resources it encompasses. You can modify the description at any time. Learn more about environments [here](https://docs.meshery.io/concepts/logical/environments)."
        organizationId:
          type: string
          description: Select an organization in which you want to create this new environment. Keep in mind that the organization cannot be changed after creation.
          x-go-type-skip-optional-pointer: true
          x-go-name: OrgID
          x-oapi-codegen-extra-tags:
            json: organizationId
          maxLength: 500
          format: uuid
    EnvironmentPage:
      type: object
      description: Paginated list of environments.
      properties:
        page:
          $ref: ../../v1alpha1/core/api.yml#/components/schemas/number
          description: Zero-based page index returned in this response.
          minimum: 0
        pageSize:
          $ref: ../../v1alpha1/core/api.yml#/components/schemas/number
          description: Maximum number of items returned on each page.
          minimum: 1
          x-oapi-codegen-extra-tags:
            json: pageSize
        totalCount:
          $ref: ../../v1alpha1/core/api.yml#/components/schemas/number
          description: Total number of items across all pages.
          minimum: 0
          x-oapi-codegen-extra-tags:
            json: totalCount
        environments:
          type: array
          x-go-type-skip-optional-pointer: true
          items:
            x-go-type: Environment
            $ref: "#/components/schemas/Environment"
          description: Environments associated with this resource.

    EnvironmentConnectionsPage:
      type: object
      description: Paginated list of connections associated with an environment.
      properties:
        page:
          type: integer
          description: Current page number of the result set.
          minimum: 0
        pageSize:
          type: integer
          description: Number of items per page.
          minimum: 1
          x-oapi-codegen-extra-tags:
            json: pageSize
        totalCount:
          type: integer
          description: Total number of items available.
          minimum: 0
          x-oapi-codegen-extra-tags:
            json: totalCount
        connections:
          type: array
          items:
            type: object
            additionalProperties: true
          description: The connections of the environmentconnectionspage.

    EnvironmentConnectionMappingPage:
      type: object
      description: >-
        Paginated list of environment-to-connection mapping records, returned
        when a connection is assigned to or unassigned from an environment.
        Distinct from EnvironmentConnectionsPage, which lists the connections
        themselves rather than the junction records.
      required:
        - page
        - pageSize
        - totalCount
        - environmentConnectionMapping
      properties:
        page:
          type: integer
          description: Zero-based page index returned in this response.
          minimum: 0
        pageSize:
          type: integer
          description: Maximum number of items returned on each page.
          minimum: 1
          x-oapi-codegen-extra-tags:
            json: pageSize
        totalCount:
          type: integer
          description: Total number of items across all pages.
          minimum: 0
          x-oapi-codegen-extra-tags:
            json: totalCount
        environmentConnectionMapping:
          type: array
          description: Environment-to-connection mapping records in this page.
          x-oapi-codegen-extra-tags:
            json: environmentConnectionMapping
          items:
            $ref: "#/components/schemas/EnvironmentConnectionMapping"

  requestBodies:
    environmentPayload:
      description: Body for creating environment
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/EnvironmentPayload"

paths:
  /api/environments:
    post:
      x-internal: ["cloud", "meshery"]
      tags:
        - environments
      operationId: createEnvironment
      summary: Create an environment
      description: Creates a new environment
      requestBody:
        $ref: "#/components/requestBodies/environmentPayload"
      responses:
        "201":
          description: Created environment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Environment"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"
    get:
      x-internal: ["cloud", "meshery"]
      tags:
        - environments
      operationId: getEnvironments
      summary: Get all environments
      description: Gets all environments
      parameters:
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/order"
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
        - $ref: "#/components/parameters/pagesize"
        - $ref: "#/components/parameters/orgIdQuery"
      responses:
        "200":
          description: Environments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvironmentPage"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /api/environments/{environmentId}:
    get:
      x-internal: ["cloud", "meshery"]
      tags:
        - environments
      operationId: getEnvironmentById
      summary: Get environment by ID
      parameters:
        - $ref: "#/components/parameters/environmentId"
        - $ref: "#/components/parameters/orgIdQuery"
      responses:
        "200":
          description: Environment page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvironmentPage"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"
    put:
      x-internal: ["cloud", "meshery"]
      tags:
        - environments
      operationId: updateEnvironment
      summary: Update an environment
      parameters:
        - $ref: "#/components/parameters/environmentId"
      requestBody:
        $ref: "#/components/requestBodies/environmentPayload"
      responses:
        "200":
          description: Environment page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvironmentPage"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"
    delete:
      x-internal: ["cloud", "meshery"]
      tags:
        - environments
      operationId: deleteEnvironment
      summary: Delete an environment
      parameters:
        - $ref: "#/components/parameters/environmentId"
      responses:
        "204":
          description: Environment deleted
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/environments/{environmentId}/connections:
    get:
      x-internal: ["cloud", "meshery"]
      tags:
        - environments
      operationId: getEnvironmentConnections
      summary: Get environment connections
      parameters:
        - $ref: "#/components/parameters/environmentId"
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/order"
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
        - $ref: "#/components/parameters/pagesize"
        - name: filter
          in: query
          required: false
          description: JSON-encoded filter string used to scope the connection listing.
          schema:
            type: string
            maxLength: 4096
      responses:
        "200":
          description: Environment connections
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvironmentConnectionsPage"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"
