openapi: 3.0.0
info:
  title: PatternResource
  description: |
    OpenAPI schema for Meshery pattern resources — the
    Kubernetes-addressable identities (name, namespace, type, OAM type)
    of resources provisioned from designs. Persisted by meshery-cloud in
    the `meshery_pattern_resources` table and consumed by the meshery
    server's design engine through the remote provider.

    These endpoints previously lived (schema-less) in the design
    construct's api.yml; they are owned by this construct now so the
    entity, page envelope, and payload are defined alongside the
    operations that serve them, mirroring the filter construct's layout.
  version: v1beta3
  contact:
    name: Meshery Maintainers
    email: maintainers@meshery.io
    url: https://meshery.io
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

security:
  - jwt: []
tags:
  - name: patternResources
    description: Operations related to Meshery pattern resources.

paths:
  /api/content/patterns/resource:
    get:
      x-internal: ["cloud"]
      tags:
        - patternResources
      summary: Get pattern resources
      operationId: getPatternResources
      description: |
        Returns a paginated list of pattern resources owned by the
        authenticated user, optionally filtered by resource identity
        fields and organization or workspace scope.
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
        - $ref: "#/components/parameters/pagesize"
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/order"
        - name: name
          in: query
          required: false
          description: Filter by resource name.
          schema:
            type: string
        - name: namespace
          in: query
          required: false
          description: Filter by Kubernetes namespace.
          schema:
            type: string
        - name: type
          in: query
          required: false
          description: Filter by resource type discriminator.
          schema:
            type: string
        - name: oamType
          in: query
          required: false
          description: Filter by OAM categorization (e.g. workload, trait, scope).
          schema:
            type: string
        - name: orgId
          in: query
          required: false
          description: Scope results to an organization.
          schema:
            type: string
            format: uuid
        - name: workspaceId
          in: query
          required: false
          description: Scope results to a workspace.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Pattern resources page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MesheryPatternResourcePage"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"
    post:
      x-internal: ["cloud"]
      tags:
        - patternResources
      summary: Save pattern resource
      operationId: upsertPatternResource
      description: |
        Creates a new pattern resource when no `id` is supplied, or
        updates the entry matching the provided `id`. Ownership is
        derived from the authenticated session; any client-supplied
        owner is ignored.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MesheryPatternResourcePayload"
      responses:
        "200":
          description: Pattern resource saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MesheryPatternResource"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /api/content/patterns/resource/{patternResourceId}:
    get:
      x-internal: ["cloud"]
      tags:
        - patternResources
      summary: Get pattern resource by ID
      operationId: getPatternResource
      parameters:
        - $ref: "#/components/parameters/patternResourceId"
      responses:
        "200":
          description: Pattern resource response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MesheryPatternResource"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"
    delete:
      x-internal: ["cloud"]
      tags:
        - patternResources
      summary: Delete pattern resource
      operationId: deletePatternResource
      description: |
        Soft-deletes the pattern resource and returns the deleted
        entity. The live meshery-cloud handler responds 200 with the
        deleted resource body (not 204), so the deleted record's
        identity remains available to the caller.
      parameters:
        - $ref: "#/components/parameters/patternResourceId"
      responses:
        "200":
          description: Deleted pattern resource
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MesheryPatternResource"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

components:
  securitySchemes:
    jwt:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    400:
      $ref: "../../v1beta2/core/api.yml#/components/responses/400"
    401:
      $ref: "../../v1beta2/core/api.yml#/components/responses/401"
    404:
      $ref: "../../v1beta2/core/api.yml#/components/responses/404"
    500:
      $ref: "../../v1beta2/core/api.yml#/components/responses/500"

  parameters:
    patternResourceId:
      name: patternResourceId
      in: path
      description: Pattern resource ID
      required: true
      schema:
        $ref: "../../v1beta2/core/api.yml#/components/schemas/Uuid"
    page:
      $ref: "../../v1beta2/core/api.yml#/components/parameters/page"
    pageSize:
      name: pageSize
      in: query
      description: Number of items per page (canonical camelCase form).
      schema:
        type: integer
        minimum: 1
    pagesize:
      name: pagesize
      in: query
      description: |
        Number of items per page. Deprecated alias of pageSize kept for
        the meshery server's remote provider, which still sends the
        lowercase form; canonical `pageSize` wins when both are present.
      deprecated: true
      schema:
        type: integer
        minimum: 1
    search:
      $ref: "../../v1beta2/core/api.yml#/components/parameters/search"
    order:
      $ref: "../../v1beta2/core/api.yml#/components/parameters/order"

  schemas:
    MesheryPatternResource:
      $ref: "./pattern_resource.yaml"

    MesheryPatternResourcePayload:
      type: object
      description: |
        Payload for creating or updating a pattern resource via
        `POST /api/content/patterns/resource`. Contains only
        client-settable fields; the owning `userId` (derived from the
        authenticated session), the `deleted` marker, and the
        server-generated `createdAt` / `updatedAt` timestamps are
        intentionally excluded.
      required:
        - name
        - namespace
        - type
        - oamType
      properties:
        id:
          $ref: "../../v1beta2/core/api.yml#/components/schemas/Uuid"
          description: Existing pattern resource ID for updates; omit on create.
          x-oapi-codegen-extra-tags:
            json: "id,omitempty"
        name:
          type: string
          description: Name of the provisioned resource.
          minLength: 1
          maxLength: 255
        namespace:
          type: string
          description: Kubernetes namespace the resource was provisioned into.
          minLength: 1
          maxLength: 255
        type:
          type: string
          description: Resource type discriminator (e.g. the Kubernetes kind).
          minLength: 1
          maxLength: 255
        oamType:
          type: string
          description: OAM categorization of the resource (e.g. workload, trait, scope).
          minLength: 1
          maxLength: 255
          x-go-name: OAMType

    MesheryPatternResourcePage:
      type: object
      description: Paginated collection of pattern resources.
      properties:
        page:
          type: integer
          description: Current page number of the result set.
          minimum: 0
        pageSize:
          type: integer
          description: Number of items per page.
          minimum: 1
        totalCount:
          type: integer
          description: Total number of items available.
          minimum: 0
        resources:
          type: array
          items:
            $ref: "#/components/schemas/MesheryPatternResource"
            x-go-type: MesheryPatternResource
          description: Pattern resources included on this page of results.
