$id: https://schemas.meshery.io/connection.yaml
$schema: http://json-schema.org/draft-07/schema#
description: Meshery Connections are managed and unmanaged resources that either through discovery or manual entry are tracked by Meshery. Learn more at https://docs.meshery.io/concepts/logical/connections
additionalProperties: false
type: object
required:
  - id
  - schemaVersion
  - name
  - type
  - subType
  - kind
  - status
properties:
  id:
    $ref: ../../v1beta2/core/api.yml#/components/schemas/Uuid
    description: Connection ID
    x-order: 1
    x-go-name: ID
    x-oapi-codegen-extra-tags:
      db: id
  name:
    x-oapi-codegen-extra-tags:
      db: name
    x-order: 2
    type: string
    description: Connection Name
    minLength: 1
    maxLength: 255
  description:
    x-oapi-codegen-extra-tags:
      db: description
      json: description
    x-order: 3
    type: string
    description: Human-readable description of the connection and its purpose.
    maxLength: 1000
  url:
    x-oapi-codegen-extra-tags:
      db: url
      json: url
    x-order: 4
    type: string
    format: uri
    description: URL of the remote resource this connection points to (e.g. the Helm repository URL, the Kubernetes API server endpoint, the Grafana instance URL).
    maxLength: 2048
  credentialId:
    x-go-name: CredentialID
    x-oapi-codegen-extra-tags:
      db: credential_id
      json: credentialId
    x-order: 5
    $ref: ../../v1beta2/core/api.yml#/components/schemas/Uuid
    description: Associated Credential ID
  type:
    x-oapi-codegen-extra-tags:
      db: type
      json: type
      yaml: type
    x-go-name: ConnectionType
    x-order: 6
    type: string
    description: Connection Type (platform, telemetry, collaboration)
    maxLength: 255
  subType:
    x-oapi-codegen-extra-tags:
      db: sub_type
      json: subType
    x-order: 7
    type: string
    description: Connection Subtype (cloud, identity, metrics, chat, git, orchestration)
    maxLength: 255
  kind:
    x-oapi-codegen-extra-tags:
      db: kind
    x-order: 8
    type: string
    description: Connection Kind (meshery, kubernetes, prometheus, grafana, gke, aws, azure, slack, github)
    maxLength: 255
  model:
    $ref: ../../v1beta1/model/api.yml#/components/schemas/ModelDefinition
    x-go-type: "*modelv1beta1.ModelDefinition"
    x-go-type-import:
      path: github.com/meshery/schemas/models/v1beta1/model
      name: modelv1beta1
    x-order: 7
    description: Reference to the specific registered model to which the component belongs and from which model version, category, and other properties may be referenced. Learn more at https://docs.meshery.io/concepts/models
    x-oapi-codegen-extra-tags:
      gorm: foreignKey:ModelID;references:ID
      json: model
      yaml: model
  modelReference:
    $ref: ../../v1beta1/model/api.yml#/components/schemas/ModelReference
    x-go-type: modelv1beta1.ModelReference
    x-go-type-import:
      path: github.com/meshery/schemas/models/v1beta1/model
      name: modelv1beta1
    x-order: 8
    description: Reference to the specific registered model to which the component belongs and from which model version, category, and other properties may be referenced. Learn more at https://docs.meshery.io/concepts/models
    x-oapi-codegen-extra-tags:
      gorm: "-"
  modelId:
    $ref: ../../v1beta2/core/api.yml#/components/schemas/Uuid
    description: Foreign key to the model to which the component belongs. Populated by the ORM from the `model_id` column and suppressed on the JSON wire; consumers use the nested `model` object for wire-level access.
    x-go-name: ModelID
    x-oapi-codegen-extra-tags:
      gorm: column:model_id
      db: model_id
      yaml: "-"
      json: "-"

  metadata:
    x-oapi-codegen-extra-tags:
      db: metadata
    x-order: 9
    x-go-type: core.Map
    x-go-type-import:
      path: github.com/meshery/schemas/models/core
    x-go-type-skip-optional-pointer: true
    type: object
    description: Additional connection metadata

  credentialSchema:
    x-oapi-codegen-extra-tags:
      db: metadata
    x-order: 9
    x-go-type: core.Map
    x-go-type-import:
      path: github.com/meshery/schemas/models/core
    x-go-type-skip-optional-pointer: true
    type: object
    description: Schema for the credential Associated with the connection

  connectionSchema:
    x-oapi-codegen-extra-tags:
      db: metadata
    x-order: 9
    x-go-type: core.Map
    x-go-type-import:
      path: github.com/meshery/schemas/models/core
    x-go-type-skip-optional-pointer: true
    type: object
    description: Schema for the connection
  styles:
    $ref: ../../v1beta2/core/api.yml#/components/schemas/ComponentStyles
    x-oapi-codegen-extra-tags:
      gorm: type:bytes;serializer:json
      yaml: styles
      json: styles
    x-go-type: core.ComponentStyles
    x-go-type-import:
      path: github.com/meshery/schemas/models/core
      name: core
    x-order: 17
    description: Visualization styles for the connection, including svgColor and svgWhite used for UI representation.
  status:
    x-oapi-codegen-extra-tags:
      db: status
    x-order: 10
    description: Connection Status
    type: string
    enum:
      - discovered
      - registered
      - connected
      - ignored
      - maintenance
      - disconnected
      - deleted
      - not found
  transitionMap:
    type: object
    description: Map describing the connection state machine. Each key is a current connection status and its value is the list of states the connection may transition to from that status, along with a description of each transition.
    additionalProperties:
      type: array
      items:
        $ref: ./api.yml#/components/schemas/ConnectionStateTransition
    x-go-type-skip-optional-pointer: true
    x-oapi-codegen-extra-tags:
      gorm: type:bytes;serializer:json
      json: "transitionMap,omitempty"
    x-order: 18
  userId:
    x-go-name: UserID
    x-oapi-codegen-extra-tags:
      db: user_id
      json: userId
    x-order: 11
    $ref: ../../v1beta2/core/api.yml#/components/schemas/Uuid
    description: User ID who owns this connection
  createdAt:
    $ref: ../../v1beta2/core/api.yml#/components/schemas/Time
    description: Timestamp when the connection was created.
    x-oapi-codegen-extra-tags:
      db: created_at
      json: createdAt
    x-order: 12
  updatedAt:
    $ref: ../../v1beta2/core/api.yml#/components/schemas/Time
    description: Timestamp when the connection was last updated.
    x-oapi-codegen-extra-tags:
      db: updated_at
      json: updatedAt
    x-order: 13
  deletedAt:
    $ref: ../../v1beta2/core/api.yml#/components/schemas/NullTime
    description: Timestamp when the connection was soft-deleted, if applicable.
    x-oapi-codegen-extra-tags:
      db: deleted_at
      json: deletedAt
    x-order: 14
  environments:
    type: array
    description: Associated environments for this connection
    items:
      x-go-type: "*environmentv1beta3.Environment"
      x-go-type-import:
        path: github.com/meshery/schemas/models/v1beta3/environment
        name: environmentv1beta3
      $ref: ../../v1beta3/environment/api.yml#/components/schemas/Environment
    x-oapi-codegen-extra-tags:
      db: "-"
      gorm: "-"
    x-go-type-skip-optional-pointer: true
    x-order: 15
  schemaVersion:
    description: Specifies the version of the schema used for the definition.
    $ref: ../../v1beta2/core/api.yml#/components/schemas/VersionString
    x-order: 16
    x-oapi-codegen-extra-tags:
      db: "-"
      gorm: "-"
    default: connections.meshery.io/v1beta3
