openapi: 3.0.0
info:
  title: Connection API
  description: API for managing Meshery connections - managed and unmanaged resources tracked by Meshery.
  version: v1beta3
  contact:
    name: Meshery Maintainers
    email: maintainers@meshery.io
    url: https://meshery.io
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
security:
  - jwt: []

paths:
  /api/integrations/connections:
    get:
      x-internal: ["cloud", "meshery"]
      tags:
        - Connections
      operationId: getConnections
      summary: Get all connections
      description: Returns a paginated list of connections for the authenticated user with filtering, sorting and pagination support
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/order"
        - $ref: "#/components/parameters/orgIdQuery"
        - name: filter
          in: query
          description: Filter connections (general filter string)
          required: false
          schema:
            type: string
            maxLength: 500
        - name: kind
          in: query
          description: Filter by connection kind (e.g., kubernetes, prometheus, grafana)
          required: false
          schema:
            type: array
            items:
              type: string
              maxLength: 255
        - name: status
          in: query
          description: Filter by connection status
          required: false
          schema:
            type: array
            items:
              $ref: "#/components/schemas/ConnectionStatusValue"
        - name: type
          in: query
          description: Filter by connection type
          required: false
          schema:
            type: array
            items:
              type: string
              maxLength: 255
        - name: name
          in: query
          description: Filter by connection name (partial match supported)
          required: false
          schema:
            type: string
            maxLength: 255
      responses:
        "200":
          description: Paginated list of connections with summary information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionPage"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

    post:
      x-internal: ["cloud", "meshery"]
      tags:
        - Connections
      operationId: registerConnection
      summary: Register a new connection
      description: Register a new connection with credentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectionPayload"
      responses:
        "201":
          description: Connection registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Connection"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /api/integrations/connections/{connectionId}:
    get:
      x-internal: ["cloud", "meshery"]
      tags:
        - Connections
      operationId: getConnectionById
      summary: Get connection by ID
      description: Returns a specific connection by its ID
      parameters:
        - $ref: "#/components/parameters/connectionId"
      responses:
        "200":
          description: Connection details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Connection"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

    put:
      x-internal: ["cloud", "meshery"]
      tags:
        - Connections
      operationId: updateConnection
      summary: Update a connection
      description: Update an existing connection
      parameters:
        - $ref: "#/components/parameters/connectionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectionPayload"
      responses:
        "200":
          description: Connection updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Connection"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

    delete:
      x-internal: ["cloud", "meshery"]
      tags:
        - Connections
      operationId: deleteConnection
      summary: Delete a connection
      description: Delete a specific connection
      parameters:
        - $ref: "#/components/parameters/connectionId"
      responses:
        "204":
          description: Connection deleted
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/integrations/connections/{connectionId}/actions:
    post:
      x-internal: ["meshery"]
      tags:
        - Connections
      operationId: performConnectionAction
      summary: Perform an action on a connection
      description: >-
        Perform a side-effecting operation on a connection (as opposed to a
        field update via PUT). The action is selected by the `action`
        discriminator in the request body. Currently supports switching the
        MeshSync deployment mode for a kubernetes connection, which redeploys
        MeshSync (operator vs embedded) for the connection's cluster; the server
        owns the connection metadata merge so callers only send the intent.
      parameters:
        - $ref: "#/components/parameters/connectionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectionActionRequest"
      responses:
        "200":
          description: The updated connection after the action was applied.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Connection"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/integrations/connections/meshery/{mesheryServerId}:
    delete:
      x-internal: ["cloud", "meshery"]
      tags:
        - Connections
      operationId: deleteMesheryConnection
      summary: Delete Meshery instance connection
      description: Delete a Meshery server connection by server ID
      parameters:
        - $ref: "#/components/parameters/mesheryServerId"
      responses:
        "204":
          description: Meshery connection deleted
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/integrations/connections/kubernetes/{connectionId}/context:
    get:
      x-internal: ["cloud", "meshery"]
      tags:
        - Connections
      operationId: getKubernetesContext
      summary: Get Kubernetes context
      description: Get Kubernetes context for a specific connection
      parameters:
        - $ref: "#/components/parameters/connectionId"
      responses:
        "200":
          description: Kubernetes context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/K8sContextPage"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/environments/{environmentId}/connections/{connectionId}:
    post:
      x-internal: ["cloud", "meshery"]
      tags:
        - Connections
      operationId: addConnectionToEnvironment
      summary: Add connection to environment
      description: Associate a connection with an environment
      parameters:
        - $ref: "#/components/parameters/environmentId"
        - $ref: "#/components/parameters/connectionId"
      responses:
        "201":
          description: Connection added to environment
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

    delete:
      x-internal: ["cloud", "meshery"]
      tags:
        - Connections
      operationId: removeConnectionFromEnvironment
      summary: Remove connection from environment
      description: Disassociate a connection from an environment
      parameters:
        - $ref: "#/components/parameters/environmentId"
        - $ref: "#/components/parameters/connectionId"
      responses:
        "204":
          description: Connection removed from environment
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/meshmodels/connections:
    get:
      x-internal: ["cloud", "meshery"]
      tags:
        - ConnectionDefinitions
      operationId: listConnectionDefinitions
      summary: List connection definitions
      description: Returns a paginated list of connection definitions registered in the registry, optionally filtered by model or kind.
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/order"
        - name: model
          in: query
          description: Filter by the name of the model the connection definition belongs to
          required: false
          schema:
            type: string
            maxLength: 255
        - name: kind
          in: query
          description: Filter by connection kind (e.g., kubernetes, prometheus, grafana)
          required: false
          schema:
            type: array
            items:
              type: string
              maxLength: 255
      responses:
        "200":
          description: Paginated list of connection definitions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionDefinitionPage"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

    post:
      x-internal: ["cloud", "meshery"]
      tags:
        - ConnectionDefinitions
      operationId: registerConnectionDefinition
      summary: Register a connection definition
      description: Register a new connection definition into the registry.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectionDefinitionPayload"
      responses:
        "201":
          description: Connection definition registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionDefinition"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /api/meshmodels/connections/{connectionDefinitionId}:
    get:
      x-internal: ["cloud", "meshery"]
      tags:
        - ConnectionDefinitions
      operationId: getConnectionDefinition
      summary: Get connection definition by ID
      description: Returns a specific connection definition by its ID.
      parameters:
        - $ref: "#/components/parameters/connectionDefinitionId"
      responses:
        "200":
          description: Connection definition details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionDefinition"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

    put:
      x-internal: ["cloud", "meshery"]
      tags:
        - ConnectionDefinitions
      operationId: updateConnectionDefinition
      summary: Update a connection definition
      description: Update an existing connection definition.
      parameters:
        - $ref: "#/components/parameters/connectionDefinitionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectionDefinitionPayload"
      responses:
        "200":
          description: Connection definition updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionDefinition"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

    delete:
      x-internal: ["cloud", "meshery"]
      tags:
        - ConnectionDefinitions
      operationId: deleteConnectionDefinition
      summary: Delete a connection definition
      description: Delete a specific connection definition from the registry.
      parameters:
        - $ref: "#/components/parameters/connectionDefinitionId"
      responses:
        "204":
          description: Connection definition deleted
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

components:
  responses:
    400:
      $ref: "../../v1beta2/core/api.yml#/components/responses/400"
    401:
      $ref: "../../v1beta2/core/api.yml#/components/responses/401"
    404:
      $ref: "../../v1beta2/core/api.yml#/components/responses/404"
    500:
      $ref: "../../v1beta2/core/api.yml#/components/responses/500"

  securitySchemes:
    jwt:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    connectionId:
      name: connectionId
      in: path
      required: true
      description: Connection ID
      schema:
        type: string
        format: uuid

    connectionDefinitionId:
      name: connectionDefinitionId
      in: path
      required: true
      description: Connection definition ID
      schema:
        type: string
        format: uuid

    connectionKind:
      name: connectionKind
      in: path
      required: true
      description: Connection kind (meshery, kubernetes, prometheus, grafana, etc.)
      schema:
        type: string
        maxLength: 255

    environmentId:
      name: environmentId
      in: path
      required: true
      description: Environment ID
      schema:
        type: string
        format: uuid

    mesheryServerId:
      name: mesheryServerId
      in: path
      required: true
      description: Meshery server ID
      schema:
        type: string
        format: uuid

    page:
      name: page
      in: query
      description: Page number
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0

    pageSize:
      name: pageSize
      in: query
      description: Number of items per page
      required: false
      schema:
        type: integer
        minimum: 1
        default: 10

    search:
      name: search
      in: query
      description: Search term
      required: false
      schema:
        type: string
        maxLength: 500

    order:
      name: order
      in: query
      description: Sort order
      required: false
      schema:
        type: string
        maxLength: 500

    orgIdQuery:
      name: orgId
      in: query
      description: Organization ID to scope the request.
      required: false
      schema:
        type: string
        format: uuid

  schemas:
    Connection:
      $ref: "./connection.yaml"

    ConnectionDefinition:
      description: A connection definition is an uninitialized connection, authored per-model (in a model's `connections/` folder) and registered into the registry alongside components and relationships. It conforms to the connection schema; the dynamic, kind-specific shape is carried in `metadata`. The `model` association scopes the definition to its owning model.
      # Self-referential x-go-type: oapi-codegen emits `type ConnectionDefinition =
      # ConnectionDefinition`, which the generator's removeSelfReferentialAliases pass
      # comments out, deferring to the hand-written definition in
      # connection_definition_helper.go. ConnectionDefinition MUST be a DISTINCT Go type
      # (not an alias of Connection): the registry-entity methods on it - notably
      # TableName() => "connection_definition_dbs" - would otherwise leak onto the
      # wire/runtime Connection type via Go's type-alias method-set sharing, redirecting
      # every Pop/GORM save of a Connection (the `connections` table) to the
      # registry-only `connection_definition_dbs` table and 500-ing connection writes.
      x-go-type: "ConnectionDefinition"

    ConnectionDefinitionPage:
      description: Represents a page of connection definitions with meta information about the total count
      additionalProperties: false
      type: object
      required:
        - connectionDefinitions
        - totalCount
        - page
        - pageSize
      properties:
        connectionDefinitions:
          type: array
          description: List of connection definitions on this page
          x-go-type: "[]*ConnectionDefinition"
          items:
            $ref: "#/components/schemas/ConnectionDefinition"
          x-order: 1
        totalCount:
          type: integer
          description: Total number of connection definitions on all pages
          x-oapi-codegen-extra-tags:
            json: totalCount
          x-order: 2
          minimum: 0
        page:
          type: integer
          description: Current page number
          x-order: 3
          minimum: 0
        pageSize:
          type: integer
          description: Number of elements per page
          x-oapi-codegen-extra-tags:
            json: pageSize
          x-order: 4
          minimum: 1

    ConnectionDefinitionPayload:
      type: object
      description: Payload for registering (creating) or updating a connection definition. Contains only client-settable fields; server-generated fields such as createdAt, updatedAt, and deletedAt are excluded.
      required:
        - name
        - kind
        - type
        - subType
        - status
      properties:
        id:
          type: string
          format: uuid
          description: Existing connection definition ID for updates; omit on create.
          x-go-name: ID
          x-oapi-codegen-extra-tags:
            json: "id,omitempty"
        schemaVersion:
          $ref: ../../v1beta2/core/api.yml#/components/schemas/VersionString
          description: Specifies the version of the schema the definition conforms to.
          default: connections.meshery.io/v1beta3
          x-oapi-codegen-extra-tags:
            json: "schemaVersion,omitempty"
        name:
          type: string
          description: Connection definition name
          minLength: 1
          maxLength: 255
          x-oapi-codegen-extra-tags:
            json: "name"
        description:
          type: string
          description: Human-readable description of the connection definition and its purpose.
          maxLength: 1000
          x-oapi-codegen-extra-tags:
            json: "description,omitempty"
        url:
          type: string
          format: uri
          description: URL of the remote resource connections of this kind point to.
          maxLength: 2048
          x-oapi-codegen-extra-tags:
            json: "url,omitempty"
        kind:
          type: string
          description: Connection kind (e.g., kubernetes, prometheus, grafana)
          maxLength: 255
          x-oapi-codegen-extra-tags:
            json: "kind"
        type:
          type: string
          description: Connection type (platform, telemetry, collaboration)
          maxLength: 255
          x-oapi-codegen-extra-tags:
            json: "type"
        subType:
          type: string
          description: Connection sub-type (cloud, identity, metrics, chat, git, orchestration)
          maxLength: 255
          x-oapi-codegen-extra-tags:
            json: "subType"
        status:
          $ref: "#/components/schemas/ConnectionStatusValue"
          description: Initial status for connections instantiated from this definition.
          x-go-name: Status
          x-oapi-codegen-extra-tags:
            json: "status"
        modelReference:
          $ref: ../../v1beta1/model/api.yml#/components/schemas/ModelReference
          x-go-type: modelv1beta1.ModelReference
          x-go-type-import:
            path: github.com/meshery/schemas/models/v1beta1/model
            name: modelv1beta1
          description: Reference to the registered model that owns this connection definition.
          x-oapi-codegen-extra-tags:
            json: "modelReference,omitempty"
        metadata:
          type: object
          description: Kind-specific connection metadata
          x-go-type: core.Map
          x-go-type-import:
            path: github.com/meshery/schemas/models/core
          x-go-type-skip-optional-pointer: true
          x-oapi-codegen-extra-tags:
            json: "metadata"
        credentialSchema:
          type: object
          description: Schema for the credential associated with connections of this kind.
          x-go-type: core.Map
          x-go-type-import:
            path: github.com/meshery/schemas/models/core
          x-go-type-skip-optional-pointer: true
          x-oapi-codegen-extra-tags:
            json: "credentialSchema"
        connectionSchema:
          type: object
          description: Schema for connections of this kind.
          x-go-type: core.Map
          x-go-type-import:
            path: github.com/meshery/schemas/models/core
          x-go-type-skip-optional-pointer: true
          x-oapi-codegen-extra-tags:
            json: "connectionSchema"
        styles:
          $ref: ../../v1beta2/core/api.yml#/components/schemas/ComponentStyles
          x-go-type: core.ComponentStyles
          x-go-type-import:
            path: github.com/meshery/schemas/models/core
            name: core
          description: Visualization styles for the connection, including svgColor and svgWhite used for UI representation.
          x-oapi-codegen-extra-tags:
            json: "styles,omitempty"
        transitionMap:
          type: object
          description: Map describing the connection state machine. Each key is a current connection status and its value is the list of states the connection may transition to from that status.
          additionalProperties:
            type: array
            items:
              $ref: "#/components/schemas/ConnectionStateTransition"
          x-go-type-skip-optional-pointer: true
          x-oapi-codegen-extra-tags:
            json: "transitionMap,omitempty"

    ConnectionPage:
      description: Represents a page of connections with meta information about connections count
      additionalProperties: false
      type: object
      required:
        - connections
        - totalCount
        - page
        - pageSize
      properties:
        connections:
          type: array
          description: List of connections on this page
          x-go-type: "[]*Connection"
          items:
            $ref: "./connection.yaml"
          x-order: 1
        totalCount:
          type: integer
          description: Total number of connections on all pages
          x-oapi-codegen-extra-tags:
            json: totalCount
          x-order: 2
          minimum: 0
        page:
          type: integer
          description: Current page number
          x-order: 3
          minimum: 0
        pageSize:
          type: integer
          description: Number of elements per page
          x-oapi-codegen-extra-tags:
            json: pageSize
          x-order: 4
          minimum: 1
        statusSummary:
          type: object
          description: Aggregate count of connections grouped by status
          additionalProperties:
            type: integer
          x-go-type: map[ConnectionStatusValue]int
          x-oapi-codegen-extra-tags:
            json: "statusSummary,omitempty"
          x-order: 5

    ConnectionStatusValue:
      type: string
      description: Connection Status Value
      x-go-name: ConnectionStatusValue
      enum:
        - discovered
        - registered
        - connected
        - ignored
        - maintenance
        - disconnected
        - deleted
        - not found

    ConnectionStateTransition:
      type: object
      additionalProperties: false
      description: A single permissible state transition for a connection, describing the next reachable state and the meaning of that transition.
      required:
        - nextState
      properties:
        nextState:
          $ref: "#/components/schemas/ConnectionStatusValue"
          description: The connection state reachable from the current state.
          x-go-name: NextState
          x-order: 1
        description:
          type: string
          description: Human-readable explanation of when or why this transition occurs.
          maxLength: 1000
          x-oapi-codegen-extra-tags:
            json: "description,omitempty"
          x-order: 2

    ConnectionActionRequest:
      type: object
      description: >-
        A side-effecting operation to perform on a connection via
        POST /api/integrations/connections/{connectionId}/actions. The `action`
        field selects the operation; operation-specific fields carry its
        parameters. Unlike PUT (which updates resource fields), the server owns
        any resulting metadata merge and cluster-side effects.
      additionalProperties: false
      required:
        - action
      properties:
        action:
          type: string
          description: The operation to perform on the connection.
          enum:
            - setMeshsyncMode
          x-oapi-codegen-extra-tags:
            json: "action"
        mode:
          type: string
          description: >-
            Target MeshSync deployment mode. Required when `action` is
            `setMeshsyncMode`; the server redeploys MeshSync (operator vs
            embedded) for the connection's cluster.
          enum:
            - operator
            - embedded
          x-oapi-codegen-extra-tags:
            json: "mode,omitempty"

    ConnectionPayload:
      type: object
      description: Payload for creating or updating a connection
      properties:
        id:
          type: string
          format: uuid
          description: Connection ID
          x-go-name: ConnectionID
          x-oapi-codegen-extra-tags:
            json: "id,omitempty"
        name:
          type: string
          description: Connection name
          x-oapi-codegen-extra-tags:
            json: "name"
          minLength: 1
          maxLength: 255
        kind:
          type: string
          description: Connection kind
          x-oapi-codegen-extra-tags:
            json: "kind"
          maxLength: 255
        type:
          type: string
          description: Connection type
          x-oapi-codegen-extra-tags:
            json: "type"
          maxLength: 255
        subType:
          type: string
          description: Connection sub-type
          x-oapi-codegen-extra-tags:
            json: "subType"
          maxLength: 255
        credentialSecret:
          type: object
          description: Credential secret data
          x-go-type: core.Map
          x-go-type-import:
            path: github.com/meshery/schemas/models/core
          x-go-type-skip-optional-pointer: true
          x-oapi-codegen-extra-tags:
            json: "credentialSecret"
        metadata:
          type: object
          description: Connection metadata
          x-go-type: core.Map
          x-go-type-import:
            path: github.com/meshery/schemas/models/core
          x-go-type-skip-optional-pointer: true
          x-oapi-codegen-extra-tags:
            json: "metadata"
        styles:
          $ref: ../../v1beta2/core/api.yml#/components/schemas/ComponentStyles
          x-go-type: core.ComponentStyles
          x-go-type-import:
