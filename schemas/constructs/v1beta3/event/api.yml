openapi: 3.0.0
info:
  title: Events
  description: OpenAPI schema for Meshery events and system notifications.
  version: v1beta3
  contact:
    name: Meshery Maintainers
    email: maintainers@meshery.io
    url: https://meshery.io
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
tags:
- name: events
  description: APIs for Meshery Cloud events.
paths:
  /events/{eventId}:
    delete:
      x-internal: ["cloud", "meshery"]
      tags:
      - events
      operationId: deleteEvent
      summary: Delete a single event
      parameters:
      - $ref: '#/components/parameters/eventId'
      responses:
        '204':
          description: Event deleted
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
  /events:
    post:
      x-internal: ["cloud", "meshery"]
      tags:
      - events
      operationId: createEvent
      summary: Create a new event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventPayload'
      responses:
        '201':
          description: Event created
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '500':
          $ref: '#/components/responses/500'
  /events/delete:
    post:
      x-internal: ["cloud", "meshery"]
      tags:
      - events
      operationId: bulkDeleteEvents
      summary: Bulk delete events
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkDeleteRequest'
      responses:
        '200':
          description: Events deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkDeleteResponse'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '500':
          $ref: '#/components/responses/500'
  /events/status:
    put:
      x-internal: ["cloud", "meshery"]
      tags:
      - events
      operationId: bulkUpdateEventStatus
      summary: Bulk update event status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkUpdateStatusRequest'
      responses:
        '200':
          description: Events updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkUpdateStatusResponse'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '500':
          $ref: '#/components/responses/500'
  /events/{eventId}/status:
    put:
      x-internal: ["cloud", "meshery"]
      tags:
      - events
      operationId: updateEventStatus
      summary: Update status of a single event
      parameters:
      - $ref: '#/components/parameters/eventId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEventStatusRequest'
      responses:
        '200':
          description: Event status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateEventStatusResponse'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
  /api/workspaces/{workspaceId}/events:
    get:
      x-internal:
      - cloud
      tags:
      - events
      security:
      - jwt: []
      operationId: getEventsOfWorkspace
      summary: Get workspace events
      description: Gets events for a workspace.
      parameters:
      - $ref: '#/components/parameters/workspaceId'
      - $ref: '#/components/parameters/page'
      - $ref: '#/components/parameters/pagesize'
      - $ref: '#/components/parameters/search'
      - $ref: '#/components/parameters/order'
      responses:
        '200':
          description: Workspace events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventsPage'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
        '404':
          description: Workspace not found
        '500':
          description: Server error
  /api/events:
    get:
      x-internal:
      - cloud
      tags:
      - events
      operationId: getEventsAggregate
      summary: Get events aggregate summary
      parameters:
      - $ref: '#/components/parameters/cumulative'
      responses:
        '200':
          description: Events aggregate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventsAggregate'
        '401':
          description: Unauthorized
        '404':
          description: Not found
        '500':
          description: Server error
  /api/events/list:
    get:
      x-internal:
      - cloud
      tags:
      - events
      operationId: getEvents
      summary: Get events list
      parameters:
      - $ref: '#/components/parameters/page'
      - $ref: '#/components/parameters/pagesize'
      - $ref: '#/components/parameters/search'
      - $ref: '#/components/parameters/order'
      - $ref: '#/components/parameters/eventsFilter'
      responses:
        '200':
          description: Events page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventsPage'
        '401':
          description: Unauthorized
        '404':
          description: Not found
        '500':
          description: Server error
  /api/events/summary:
    get:
      x-internal:
      - cloud
      tags:
      - events
      operationId: getEventSummaryByUser
      summary: Get event summary by user
      parameters:
      - $ref: '#/components/parameters/page'
      - $ref: '#/components/parameters/pagesize'
      - $ref: '#/components/parameters/search'
      - $ref: '#/components/parameters/order'
      - $ref: '#/components/parameters/filter'
      responses:
        '200':
          description: Event summary page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventSummaryPage'
        '401':
          description: Unauthorized
        '404':
          description: Not found
        '500':
          description: Server error
  /api/events/types:
    get:
      x-internal:
      - cloud
      tags:
      - events
      operationId: getEventTypes
      summary: Get event types
      parameters:
      - $ref: '#/components/parameters/page'
      - $ref: '#/components/parameters/pagesize'
      responses:
        '200':
          description: Event types
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventType'
        '401':
          description: Unauthorized
        '404':
          description: Not found
        '500':
          description: Server error
components:
  responses:
    400:
      $ref: ../../v1beta2/core/api.yml#/components/responses/400
    401:
      $ref: ../../v1beta2/core/api.yml#/components/responses/401
    404:
      $ref: ../../v1beta2/core/api.yml#/components/responses/404
    500:
      $ref: ../../v1beta2/core/api.yml#/components/responses/500
  parameters:
    eventId:
      name: eventId
      in: path
      description: ID of the event.
      required: true
      schema:
        type: string
        format: uuid
    workspaceId:
      name: workspaceId
      in: path
      description: Workspace ID
      schema:
        $ref: ../../v1beta2/core/api.yml#/components/schemas/WorkspaceId
      required: true
    page:
      $ref: ../../v1beta2/core/api.yml#/components/parameters/page
    pagesize:
      $ref: ../../v1beta2/core/api.yml#/components/parameters/pagesize
    search:
      $ref: ../../v1beta2/core/api.yml#/components/parameters/search
    order:
      $ref: ../../v1beta2/core/api.yml#/components/parameters/order
    cumulative:
      name: cumulative
      in: query
      description: When true, return cumulative aggregate counts across all time.
      required: false
      schema:
        type: boolean
    filter:
      $ref: ../../v1beta2/core/api.yml#/components/parameters/filter
    eventsFilter:
      $ref: ../../v1beta2/core/api.yml#/components/parameters/filter
  securitySchemes:
    jwt:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    EventPayload:
      type: object
      description: Payload for creating a new event.
      additionalProperties: true
      properties:
        owner:
          type: string
          format: uuid
          description: UUID of the user associated with the event.
          x-go-type: uuid.UUID
          x-go-type-import:
            path: github.com/google/uuid
          x-go-name: Owner
          x-oapi-codegen-extra-tags:
            db: owner
            json: "owner,omitempty"
        category:
          type: string
          description: The category of the event.
          maxLength: 500
        action:
          type: string
          description: The action of the event.
          maxLength: 500
        description:
          type: string
          description: Description of the event.
          maxLength: 5000
    UpdateEventStatusRequest:
      type: object
      description: Payload for updating the status of a single event.
      required:
      - status
      properties:
        status:
          type: string
          example: completed
          description: Current status of the event.
          maxLength: 255
    UpdateEventStatusResponse:
      type: object
      description: Response body returned after updating an event's status.
      properties:
        message:
          type: string
          description: Human-readable status message.
          maxLength: 500
        eventId:
          type: string
          format: uuid
          description: UUID of the event whose status was updated.
          x-oapi-codegen-extra-tags:
            json: "eventId,omitempty"
        status:
          type: string
          description: Updated status of the event.
          maxLength: 255
    BulkDeleteRequest:
      type: object
      description: Payload for bulk-deleting events by ID.
      required:
      - ids
      properties:
        ids:
          type: array
          items:
            $ref: ../../v1beta2/core/api.yml#/components/schemas/Uuid
          description: UUIDs of the events to delete.
    BulkDeleteResponse:
      type: object
      description: Response body returned after bulk event deletion.
      properties:
        deleted:
          type: array
          items:
            type: string
            format: uuid
          description: UUIDs of events that were deleted.
    BulkUpdateStatusRequest:
      type: object
      description: Payload for bulk-updating the status of events.
      required:
      - ids
      - status
      properties:
        ids:
          type: array
          items:
            $ref: ../../v1beta2/core/api.yml#/components/schemas/Uuid
          description: UUIDs of the events to update.
        status:
          type: string
          example: failed
          description: New status to apply to the selected events.
          maxLength: 255
    BulkUpdateStatusResponse:
      type: object
      description: Response body returned after bulk event status update.
      properties:
        updated:
          type: array
          items:
            type: string
            format: uuid
          description: UUIDs of events whose status was updated.
    EventResult:
      $ref: ./event.yaml
    EventsPage:
      type: object
      description: Paginated list of events.
      properties:
        page:
          $ref: ../../v1beta2/core/api.yml#/components/schemas/Number
          description: Zero-based page index returned in this response.
        pageSize:
          $ref: ../../v1beta2/core/api.yml#/components/schemas/Number
          description: Maximum number of items returned on each page.
          minimum: 1
          x-oapi-codegen-extra-tags:
            json: "pageSize,omitempty"
        totalCount:
          $ref: ../../v1beta2/core/api.yml#/components/schemas/Number
          description: Total number of items across all pages.
          minimum: 0
          x-oapi-codegen-extra-tags:
            json: "totalCount,omitempty"
        data:
          type: array
          items:
            $ref: '#/components/schemas/EventResult'
          description: The events returned on the current page.
    EventsAggregate:
      type: object
      description: Aggregated event counts across categories.
      properties:
        audit:
          type: integer
          description: Count of audit-category events.
          minimum: 0
      additionalProperties: true
    EventSummary:
      type: object
      description: Per-user event summary entry.
      additionalProperties: true
    EventSummaryPage:
      type: object
      description: Paginated list of per-user event summaries.
      properties:
        page:
          type: integer
          description: Current page number of the result set.
          minimum: 0
        pageSize:
          type: integer
          description: Number of items per page.
          minimum: 1
          x-oapi-codegen-extra-tags:
            json: "pageSize,omitempty"
        totalCount:
          type: integer
          description: Total number of items available.
          minimum: 0
          x-oapi-codegen-extra-tags:
            json: "totalCount,omitempty"
        data:
          type: array
          items:
            $ref: '#/components/schemas/EventSummary'
          description: The event summaries returned on the current page.
    EventType:
      type: object
      description: A category/action pair describing one kind of event.
      properties:
        category:
          type: string
          description: The category of the event type.
          maxLength: 500
        action:
          type: string
          description: The action of the event type.
          maxLength: 500
    ErrorResponse:
      type: object
      description: Generic error envelope returned for non-2xx responses.
      properties:
        error:
          type: string
          description: Human-readable error message.
          maxLength: 500
