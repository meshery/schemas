type: object
additionalProperties: false
description: EventResult entity schema.
example:
  $ref: "./templates/event_template.json"
properties:
  owner:
    type: string
    format: uuid
    description: UUID of the user associated with the event.
    x-go-type: uuid.UUID
    x-go-type-import:
      path: github.com/gofrs/uuid
    x-go-name: Owner
    x-go-type-skip-optional-pointer: true
    x-oapi-codegen-extra-tags:
      db: owner
      json: owner
  systemId:
    type: string
    description: System identifier of the event source.
    maxLength: 255
    x-go-type-skip-optional-pointer: true
    x-oapi-codegen-extra-tags:
      db: system_id
      json: systemId
  category:
    type: string
    description: The category of the event.
    maxLength: 500
  action:
    type: string
    description: The action of the event.
    maxLength: 500
  description:
    type: string
    description: Description of the event.
    maxLength: 5000
  firstName:
    type: string
    description: The first name of the user associated with the event.
    maxLength: 500
  lastName:
    type: string
    description: The last name of the user associated with the event.
    maxLength: 500
  email:
    $ref: ../../v1beta2/core/api.yml#/components/schemas/Email
    description: Email address of the user associated with the event.
  provider:
    $ref: ../../v1beta2/core/api.yml#/components/schemas/Provider
    description: Authentication provider of the user associated with the event.
  createdAt:
    type: string
    format: date-time
    description: Timestamp when the event was recorded.
    x-go-type: time.Time
    x-go-type-skip-optional-pointer: true
    x-oapi-codegen-extra-tags:
      db: created_at
      json: createdAt
required:
- owner
- category
- action
