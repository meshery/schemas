openapi: 3.0.0
info:
  title: Design
  description: OpenAPI schema for managing Meshery designs and infrastructure patterns.
  version: v1beta3
  contact:
    name: Meshery Maintainers
    email: maintainers@meshery.io
    url: https://meshery.io
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

security:
  - jwt: []
tags:
  - name: designs
    description: Operations related to designs and infrastructure patterns
paths:
  /api/content/patterns:
    get:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Get designs
      operationId: getPatterns
      description: Returns a paginated list of infrastructure designs accessible to the user.
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/order"
        - $ref: "#/components/parameters/orgIdQuery"
        - name: visibility
          in: query
          description: Filter by visibility (public, private, published)
          schema:
            type: string
        - name: userId
          in: query
          required: false
          description: UUID of User. Pass userId for fetching public and published designs.
          schema:
            type: string
            format: uuid
        - name: metrics
          in: query
          required: false
          description: Whether to include usage metrics in the response.
          schema:
            type: boolean
        - name: workspaceId
          in: query
          required: false
          description: Filter designs by workspace ID.
          schema:
            type: string
            format: uuid
        - name: populate
          in: query
          required: false
          description: Populate additional nested fields in the response.
          schema:
            type: boolean
        - name: shared
          in: query
          required: false
          description: Include designs shared with the caller.
          schema:
            type: boolean
      responses:
        "200":
          description: Designs response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MesheryPatternPage"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"
    post:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Save design
      operationId: upsertPattern
      description: Creates or updates an infrastructure design.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MesheryPatternRequestBody"
      responses:
        "200":
          description: Design saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MesheryPattern"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /api/content/patterns/delete:
    post:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Bulk delete designs
      operationId: deletePatterns
      description: Deletes multiple designs by ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MesheryPatternDeleteRequestBody"
      responses:
        "200":
          description: Designs deleted
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /api/content/patterns/{designId}:
    get:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Get design by ID
      operationId: getPattern
      parameters:
        - $ref: "#/components/parameters/designId"
        - name: metrics
          in: query
          required: false
          description: Whether to include usage metrics in the response.
          schema:
            type: boolean
      responses:
        "200":
          description: Design response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MesheryPattern"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"
    delete:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Delete design by ID
      operationId: deletePattern
      parameters:
        - $ref: "#/components/parameters/designId"
      responses:
        "204":
          description: Design deleted
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/content/patterns/clone/{designId}:
    post:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Clone design
      operationId: clonePattern
      description: Creates a copy of an existing design.
      parameters:
        - $ref: "#/components/parameters/designId"
      responses:
        "200":
          description: Design cloned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MesheryPattern"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/content/patterns/download/{designId}:
    get:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Download design file
      operationId: getDesignPatternFile
      description: Downloads the raw design file for the specified design.
      parameters:
        - $ref: "#/components/parameters/designId"
      responses:
        "200":
          description: Design file content
          content:
            application/yaml:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/content/patterns/upload/{designId}:
    post:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Upload design source content
      operationId: upsertPatternSourceContent
      description: |
        Replaces the raw source content blob stored alongside a design.
        The server (meshery-cloud's UpsertPatternSourceContent handler)
        reads the entire request body as opaque bytes via io.ReadAll and
        persists them without interpretation, so the content-type is
        whatever the uploader sent — `application/octet-stream` is the
        canonical choice. The previous declaration reused
        MesheryPatternImportRequestBody under multipart/form-data, which
        the handler never parses; it remained wired up solely to share
        a schema ref with /api/pattern/import. See meshery/schemas#771
        for the drift analysis.
      parameters:
        - $ref: "#/components/parameters/designId"
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
              description: Opaque design source bytes (yaml, tarball, etc.)
      responses:
        "200":
          description: Design source content uploaded
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/pattern/import:
    post:
      x-internal: ["cloud", "meshery"]
      tags:
        - designs
      summary: Import Design
      operationId: importDesign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MesheryPatternImportRequestBody"
      responses:
        "200":
          description: Successful Import
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "400":
          description: Invalid request format
        "401":
          $ref: "#/components/responses/401"
        "500":
          description: Internal server error

  /api/catalog/content/{type}:
    get:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Get catalog content
      operationId: getCatalogContent
      security: []
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/order"
        - name: type
          in: query
          required: false
          schema:
            type: string
        - name: technology
          in: query
          required: false
          schema:
            type: string
        - name: metrics
          in: query
          required: false
          schema:
            type: boolean
        - name: class
          in: query
          required: false
          schema:
            type: string
        - name: userId
          in: query
          required: false
          schema:
            type: string
        - name: orgId
          in: query
          required: false
          schema:
            type: string
        - name: workspaceId
          in: query
          required: false
          schema:
            type: string
        - name: teamId
          in: query
          required: false
          schema:
            type: string
        - name: populate
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: Catalog content page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogContentPage"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"
    post:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Publish catalog content
      operationId: publishCatalogContent
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
      requestBody:
        $ref: "#/components/requestBodies/catalogContentPayload"
      responses:
        "200":
          description: Catalog request result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogRequest"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "409":
          description: Conflict
        "500":
          $ref: "#/components/responses/500"
  /api/catalog/content/{type}/unpublish:
    post:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Unpublish catalog content
      operationId: unPublishCatalogContent
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
      requestBody:
        $ref: "#/components/requestBodies/catalogContentPayload"
      responses:
        "200":
          description: Catalog request result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogRequest"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "409":
          description: Conflict
        "500":
          $ref: "#/components/responses/500"

  /api/catalog/content/classes:
    get:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Get catalog content classes
      operationId: getCatalogContentClasses
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
      responses:
        "200":
          description: Catalog content classes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CatalogContentClass"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /api/catalog/requests/approve:
    post:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Approve a catalog request
      operationId: approveCatalogRequest
      requestBody:
        $ref: "#/components/requestBodies/catalogContentPayload"
      responses:
        "200":
          description: Request approved
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "409":
          description: Conflict
        "500":
          $ref: "#/components/responses/500"

  /api/catalog/requests/deny:
    post:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Deny a catalog request
      operationId: denyCatalogRequest
      requestBody:
        $ref: "#/components/requestBodies/catalogContentPayload"
      responses:
        "200":
          description: Request denied
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "409":
          description: Conflict
        "500":
          $ref: "#/components/responses/500"

  /api/resource/{resourceType}/share/{resourceId}:
    post:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Share a resource
      operationId: handleResourceShare
      parameters:
        - name: resourceType
          in: path
          required: true
          schema:
            type: string
        - name: resourceId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        $ref: "#/components/requestBodies/resourceSharePayload"
      responses:
        "200":
          description: Resource access mapping
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResourceAccessMapping"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/resource/{resourceType}/share/{resourceId}/{actorType}:
    get:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Get resource access actors by type
      operationId: getResourceAccessActorsByType
      parameters:
        - name: resourceType
          in: path
          required: true
          schema:
            type: string
        - name: resourceId
          in: path
          required: true
          schema:
            type: string
        - name: actorType
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Resource access actors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResourceAccessActorsResponse"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/content/design/share:
    post:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Share a design, view, or filter by email
      operationId: shareDesign
      description: |
        Shares a design (pattern), view, or filter with a list of email
        addresses. When `share` is true, the content's visibility is flipped to
        public and an invitation email is sent to each recipient. When `share`
        is false, visibility is reverted to private. Only the owner of the
        content may change its sharing mode.
      requestBody:
        $ref: "#/components/requestBodies/contentSharePayload"
      responses:
        "200":
          description: Content shared.
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          description: Caller is not the owner of the content.
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/catalog/requests:
    get:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Get catalog requests
      operationId: getCatalogRequest
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/order"
        - name: filter
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Catalog requests page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogRequestsPage"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"
components:
  securitySchemes:
    jwt:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    400:
      $ref: "../../v1beta2/core/api.yml#/components/responses/400"
    401:
      $ref: "../../v1beta2/core/api.yml#/components/responses/401"
    404:
      $ref: "../../v1beta2/core/api.yml#/components/responses/404"
    500:
      $ref: "../../v1beta2/core/api.yml#/components/responses/500"

  parameters:
    designId:
      name: designId
      in: path
      description: Design (Pattern) ID
      required: true
      schema:
        $ref: "../../v1beta2/core/api.yml#/components/schemas/Uuid"
    page:
      $ref: "../../v1beta2/core/api.yml#/components/parameters/page"
    pageSize:
      name: pageSize
      in: query
      description: Number of items per page (canonical camelCase form).
      schema:
        type: integer
        minimum: 1
    search:
      $ref: "../../v1beta2/core/api.yml#/components/parameters/search"
    order:
      $ref: "../../v1beta2/core/api.yml#/components/parameters/order"
    orgIdQuery:
      name: orgId
      in: query
      description: User's organization ID
      schema:
        type: string
        format: uuid

  schemas:
    DeletePatternModel:
      type: object
      description: Reference to a design for bulk deletion by ID.
      properties:
        id:
          $ref: "../../v1beta2/core/api.yml#/components/schemas/Id"
          description: Design ID targeted for deletion.
        name:
          $ref: "../../v1beta2/core/api.yml#/components/schemas/Text"
          description: Human-readable design name (informational only; server matches on id).

    PatternFile:
      $ref: "./design.yaml"

    MesheryPattern:
      type: object
      description: Server-returned design (pattern) resource as persisted by meshery-cloud.
      properties:
        id:
          $ref: "../../v1beta2/core/api.yml#/components/schemas/Id"
          description: Server-generated design ID.
        name:
          $ref: "../../v1beta2/core/api.yml#/components/schemas/Text"
          description: Human-readable design name.
        catalogData:
          $ref: "../../v1beta2/catalog/api.yml#/components/schemas/CatalogData"
          description: Catalog metadata attached to the design when published.
          x-go-type: catalogv1alpha2.CatalogData
          x-go-type-import:
            path: github.com/meshery/schemas/models/v1alpha2/catalog
            name: catalogv1alpha2
        userId:
          $ref: "../../v1beta2/core/api.yml#/components/schemas/Id"
          description: Owning user ID.
          x-oapi-codegen-extra-tags:
            db: owner
        user:
          $ref: "../../v1beta2/user/api.yml#/components/schemas/User"
          description: >
            Owning user record, joined inline by the catalog list/get
            handlers when shaping responses. Server-projected from the
            users table via the design's userId; not a column on the
            meshery_patterns table itself, so the generated Go field is
            tagged `db:"-"` to keep it out of ORM column scans.
          nullable: true
          x-go-type: "*userV1beta.User"
          x-go-type-import:
            path: github.com/meshery/schemas/models/v1beta2/user
            name: userV1beta
          x-oapi-codegen-extra-tags:
            db: "-"
        location:
          $ref: "../../v1beta2/core/api.yml#/components/schemas/MapObject"
          description: Optional structured location metadata (branch, host, path, ...).
        patternFile:
          type: string
          description: >
            Raw design body as it is persisted in the meshery_patterns
            table's `pattern_file` column. The wire form is the YAML/JSON
            string the server stores verbatim; consumers that need the
            structured form transcode at the boundary by parsing the
            string into a PatternFile (see #/components/schemas/PatternFile)
            and marshalling it back when they write. Keeping the wire
            shape as a string mirrors the column's actual representation
            and avoids forcing every consumer through the structured-vs-
            string union that the previous *PatternFile typing implied.
          maxLength: 16777216
          x-oapi-codegen-extra-tags:
            db: pattern_file
        visibility:
          type: string
          description: >
            Visibility scope of the design — controls whether non-owners
            may read or list it. `private` is owner-only, `public` is
            readable by anyone in the org, and `published` is visible in
            the catalog.
          enum:
            - private
            - public
            - published
          x-enum-casing-exempt: true
          maxLength: 32
          x-oapi-codegen-extra-tags:
            db: visibility
        designType:
          type: string
          description: >
            Discriminator identifying the source format of the design body,
            persisted in the meshery_patterns table's `source_type` column
            (nullable; null for legacy rows imported before the column was
            introduced). For catalog listings the server may also project
            this field from the attached catalog metadata. Use this field
            to branch rendering between native Meshery designs and imported
            Helm charts, Kubernetes manifests, and Docker Compose files.
          x-enum-casing-exempt: true
          nullable: true
          enum:
            - Design
            - Helm Chart
            - Docker Compose
            - Kubernetes Manifest
          maxLength: 64
          x-oapi-codegen-extra-tags:
            db: source_type
        sourceContent:
          type: string
          format: byte
          nullable: true
          description: >
            Raw bytes of the imported source artifact (Helm chart tarball,
            Kubernetes manifest, Docker Compose file, etc.) preserved in
            the meshery_patterns table's `source_content` column for
            non-Meshery-Design imports. Empty / null for native Meshery
            designs. Server-managed: populated by the import and upload
            handlers and scrubbed to null on most read responses, so
            clients should treat this as opaque base64-encoded bytes when
            it does appear on the wire.
          x-oapi-codegen-extra-tags:
            db: source_content
            json: "sourceContent,omitempty"
        viewCount:
          type: integer
          description: >
            Server-aggregated count of views on this design in the catalog.
            Present on list/catalog responses; server-managed and ignored on
            writes.
          minimum: 0
          default: 0
          x-oapi-codegen-extra-tags:
            db: view_count
            json: "viewCount,omitempty"
        downloadCount:
          type: integer
          description: >
            Server-aggregated count of downloads of this design from the
            catalog. Server-managed and ignored on writes.
          minimum: 0
          default: 0
          x-oapi-codegen-extra-tags:
            db: download_count
            json: "downloadCount,omitempty"
        cloneCount:
          type: integer
          description: >
            Server-aggregated count of times this design has been cloned from
            the catalog. Server-managed and ignored on writes.
          minimum: 0
          default: 0
          x-oapi-codegen-extra-tags:
            db: clone_count
            json: "cloneCount,omitempty"
        deploymentCount:
          type: integer
          description: >
            Server-aggregated count of deployments originated from this
            design. Server-managed and ignored on writes.
          minimum: 0
          default: 0
          x-oapi-codegen-extra-tags:
            db: deployment_count
            json: "deploymentCount,omitempty"
        shareCount:
          type: integer
          description: >
            Server-aggregated count of share events for this design.
            Server-managed and ignored on writes.
          minimum: 0
          default: 0
          x-oapi-codegen-extra-tags:
            db: share_count
            json: "shareCount,omitempty"
        createdAt:
          $ref: "../../v1beta2/core/api.yml#/components/schemas/Time"
          description: Timestamp of design creation.
          x-oapi-codegen-extra-tags:
            db: created_at
        updatedAt:
          $ref: "../../v1beta2/core/api.yml#/components/schemas/Time"
          description: Timestamp of last design modification.
          x-oapi-codegen-extra-tags:
            db: updated_at

    MesheryPatternPage:
      type: object
      description: Paginated collection of designs.
      properties:
        page:
          type: integer
          description: Current page number of the result set.
          minimum: 0
        pageSize:
          type: integer
          description: Number of items per page.
          minimum: 1
        totalCount:
          type: integer
          description: Total number of items available.
          minimum: 0
        patterns:
          type: array
          items:
            $ref: "#/components/schemas/MesheryPattern"
            x-go-type: MesheryPattern
          description: Designs included on this page of results.
        resultType:
          type: string
          description: Optional discriminator describing which collection the page represents.
          maxLength: 500

    MesheryPatternDeleteRequestBody:
      type: object
      description: Payload for bulk deleting designs by ID.
      properties:
        patterns:
          type: array
          items:
            $ref: "#/components/schemas/DeletePatternModel"
            x-go-type: DeletePatternModel
          description: Designs targeted for deletion.

    MesheryPatternPayload:
      type: object
      description: >
        Client-settable subset of the design (pattern) entity used as the
        body of the inner `patternData` envelope on
