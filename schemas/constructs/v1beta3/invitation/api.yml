openapi: 3.0.0
info:
  title: Invitation
  description: OpenAPI schema for managing invitations.
  version: v1beta3
  contact:
    name: Meshery Maintainers
    email: maintainers@meshery.io
    url: https://meshery.io
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
tags:
- name: Invitation
  description: Operations related to invitation
security:
- jwt: []
paths:
  /api/organizations/invitations/{invitationId}:
    get:
      x-internal:
      - cloud
      operationId: getInvitation
      tags:
      - Invitation
      summary: Get an invitation by ID
      parameters:
      - $ref: '#/components/parameters/invitationId'
      responses:
        '200':
          description: Invitation fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invitation'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
    delete:
      x-internal:
      - cloud
      operationId: deleteInvitation
      tags:
      - Invitation
      summary: Delete an invitation by ID
      parameters:
      - $ref: '#/components/parameters/invitationId'
      responses:
        '204':
          description: Invitation deleted
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
    put:
      x-internal:
      - cloud
      operationId: updateInvitation
      tags:
      - Invitation
      summary: Update an existing invitation
      parameters:
      - $ref: '#/components/parameters/invitationId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvitationPayload'
        required: true
      responses:
        '200':
          description: Invitation updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invitation'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
  /api/organizations/invitations:
    get:
      x-internal:
      - cloud
      operationId: getInvitations
      tags:
      - Invitation
      summary: Get a paginated list of invitations for the organization
      parameters:
      - $ref: ../../v1beta2/core/api.yml#/components/parameters/page
      - $ref: ../../v1beta2/core/api.yml#/components/parameters/pagesize
      - $ref: ../../v1beta2/core/api.yml#/components/parameters/search
      - $ref: ../../v1beta2/core/api.yml#/components/parameters/order
      - $ref: ../../v1beta2/core/api.yml#/components/parameters/filter
      responses:
        '200':
          description: Invitations page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvitationsPage'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '500':
          $ref: '#/components/responses/500'
    post:
      x-internal:
      - cloud
      operationId: createInvitation
      tags:
      - Invitation
      summary: Create a new invitation for the organization
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvitationPayload'
        required: true
      responses:
        '201':
          description: Invitation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invitation'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '500':
          $ref: '#/components/responses/500'
  /api/organizations/invitations/{invitationId}/accept:
    post:
      x-internal:
      - cloud
      operationId: acceptInvitation
      tags:
      - Invitation
      summary: Accept an invitation by ID
      parameters:
      - $ref: '#/components/parameters/invitationId'
      responses:
        '200':
          description: Invitation accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invitation'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
  /api/identity/orgs/{orgId}/users/invite:
    post:
      x-internal:
      - cloud
      operationId: handleUserInvite
      tags:
      - Invitation
      summary: Invite users to an organization
      parameters:
      - $ref: '#/components/parameters/orgId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Invitation request accepted
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
  /api/identity/users/request:
    post:
      x-internal:
      - cloud
      operationId: signupRequest
      tags:
      - Invitation
      summary: Create a signup request
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '201':
          description: Signup request created
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '500':
          $ref: '#/components/responses/500'
    get:
      x-internal:
      - cloud
      operationId: getSignupRequests
      tags:
      - Invitation
      summary: Get signup requests
      parameters:
      - $ref: ../../v1beta2/core/api.yml#/components/parameters/page
      - $ref: ../../v1beta2/core/api.yml#/components/parameters/pagesize
      - $ref: ../../v1beta2/core/api.yml#/components/parameters/search
      - $ref: ../../v1beta2/core/api.yml#/components/parameters/order
      - $ref: ../../v1beta2/core/api.yml#/components/parameters/filter
      responses:
        '200':
          description: Signup requests page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignupRequestsPage'
        '401':
          $ref: '#/components/responses/401'
        '500':
          $ref: '#/components/responses/500'
  /api/identity/users/request/approve:
    post:
      x-internal:
      - cloud
      operationId: approveSignupRequest
      tags:
      - Invitation
      summary: Approve a signup request
      responses:
        '200':
          description: Signup request approved
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '500':
          $ref: '#/components/responses/500'
  /api/identity/users/request/deny:
    post:
      x-internal:
      - cloud
      operationId: denySignupRequest
      tags:
      - Invitation
      summary: Deny a signup request
      responses:
        '200':
          description: Signup request denied
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '500':
          $ref: '#/components/responses/500'
  /api/identity/users/request/notification:
    get:
      x-internal:
      - cloud
      operationId: getSignupRequestNotification
      tags:
      - Invitation
      summary: Get signup request notification summary
      responses:
        '200':
          description: Signup request notification payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignupRequestNotification'
        '204':
          description: No pending signup request notifications
        '401':
          $ref: '#/components/responses/401'
        '500':
          $ref: '#/components/responses/500'
components:
  parameters:
    orgId:
      name: orgId
      in: path
      required: true
      description: The ID of the organization.
      schema:
        type: string
        format: uuid
    invitationId:
      name: invitationId
      in: path
      required: true
      description: The ID of the invitation.
      schema:
        type: string
        format: uuid
  responses:
    400:
      $ref: ../../v1beta2/core/api.yml#/components/responses/400
    401:
      $ref: ../../v1beta2/core/api.yml#/components/responses/401
    404:
      $ref: ../../v1beta2/core/api.yml#/components/responses/404
    500:
      $ref: ../../v1beta2/core/api.yml#/components/responses/500
  securitySchemes:
    jwt:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Uuid:
      $ref: ../../v1beta2/core/api.yml#/components/schemas/Uuid
    InvitationsPage:
      type: object
      description: Paginated list of invitations for an organization.
      properties:
        page:
          type: integer
          description: Current page number of the result set.
          minimum: 0
          x-go-type-skip-optional-pointer: true
        pageSize:
          type: integer
          description: Number of items per page.
          minimum: 1
          x-go-type-skip-optional-pointer: true
          x-oapi-codegen-extra-tags:
            json: pageSize
        totalCount:
          type: integer
          description: Total number of items available.
          minimum: 0
          x-go-type-skip-optional-pointer: true
          x-oapi-codegen-extra-tags:
            json: totalCount
        data:
          type: array
          items:
            $ref: '#/components/schemas/Invitation'
            x-go-type: Invitation
          description: Invitations returned on the current page.
          x-oapi-codegen-extra-tags:
            json: data
    SignupRequest:
      type: object
      description: A signup request submitted for organization access.
      additionalProperties: true
    SignupData:
      type: object
      additionalProperties: false
      description: >-
        A signup request record as persisted in the signup_data table. Captures
        the requester's identity, the product form the request originated from
        (for example playground, meshmap, docker-extension), the moderation
        status, and the tracking task created for the request. Also embedded in
        signup webhook and notification payloads, where only a subset of fields
        may be populated.
      properties:
        id:
          $ref: ../../v1beta2/core/api.yml#/components/schemas/Uuid
          description: Unique identifier of the signup request.
          x-go-name: ID
          x-oapi-codegen-extra-tags:
            db: id
            json: "id,omitempty"
        firstName:
          type: string
          maxLength: 200
          description: First name of the requester.
          x-oapi-codegen-extra-tags:
            db: first_name
            json: "firstName,omitempty"
        lastName:
          type: string
          maxLength: 300
          description: Last name of the requester.
          x-oapi-codegen-extra-tags:
            db: last_name
            json: "lastName,omitempty"
        email:
          type: string
          format: email
          maxLength: 300
          description: Email address of the requester.
          x-oapi-codegen-extra-tags:
            db: email
            json: "email,omitempty"
        occupation:
          type: string
          maxLength: 300
          description: Occupation stated by the requester.
          x-oapi-codegen-extra-tags:
            db: occupation
            json: "occupation,omitempty"
        organization:
          type: string
          maxLength: 300
          description: Organization stated by the requester.
          x-oapi-codegen-extra-tags:
            db: organization
            json: "organization,omitempty"
        role:
          type: string
          maxLength: 300
          description: Role stated by the requester within their organization.
          x-oapi-codegen-extra-tags:
            db: role
            json: "role,omitempty"
        formType:
          type: string
          maxLength: 300
          description: >-
            Product form the signup request originated from. Known values
            include playground, meshmap, docker-extension, epsma-book, content,
            contact and event; the set is open-ended.
          x-oapi-codegen-extra-tags:
            db: form_type
            json: "formType,omitempty"
        status:
          type: string
          maxLength: 300
          description: Moderation status of the signup request.
          x-oapi-codegen-extra-tags:
            db: status
            json: "status,omitempty"
        taskId:
          type: string
          maxLength: 300
          description: Identifier of the tracking task created for this request in the external task system.
          x-id-format: external
          x-go-name: TaskID
          x-oapi-codegen-extra-tags:
            db: task_id
            json: "taskId,omitempty"
        taskLink:
          type: string
          format: uri
          maxLength: 300
          description: Link to the tracking task created for this request.
          x-oapi-codegen-extra-tags:
            db: task_link
            json: "taskLink,omitempty"
        createdAt:
          $ref: ../../v1beta2/core/api.yml#/components/schemas/Time
          description: Timestamp when the signup request was created.
          x-oapi-codegen-extra-tags:
            db: created_at
            json: "createdAt,omitempty"
        updatedAt:
          $ref: ../../v1beta2/core/api.yml#/components/schemas/Time
          description: Timestamp when the signup request was last updated.
          x-oapi-codegen-extra-tags:
            db: updated_at
            json: "updatedAt,omitempty"
    SignupRequestNotification:
      type: object
      additionalProperties: false
      description: >-
        Notification about the most recent signup request awaiting moderator
        action, served by getSignupRequestNotification.
      required:
        - signupData
        - preProcessed
      properties:
        signupData:
          $ref: '#/components/schemas/SignupData'
          description: The signup request the notification refers to.
          x-oapi-codegen-extra-tags:
            json: signupData
        preProcessed:
          type: boolean
          description: Whether the signup request was automatically processed before moderator review.
          x-oapi-codegen-extra-tags:
            json: preProcessed
    SignupWebhookPayload:
      type: object
      additionalProperties: false
      description: >-
        Outbound webhook body that Cloud POSTs to the configured signup and
        entitlement webhooks (WEBHOOK_SIGNUP_REQUEST, WEBHOOK_KANVAS_ENTITLEMENT)
        when a signup request is processed. Emitted by Cloud; not served by any
        Cloud endpoint.
      required:
        - signupData
        - newUser
      properties:
        signupData:
          $ref: '#/components/schemas/SignupData'
          description: The signup request that triggered the webhook.
          x-oapi-codegen-extra-tags:
            json: signupData
        newUser:
          type: boolean
          description: Whether the requester is a newly created user.
          x-oapi-codegen-extra-tags:
            json: newUser
    SignupRequestsPage:
      type: object
      description: Paginated list of signup requests.
      properties:
        page:
          type: integer
          description: Current page number of the result set.
          minimum: 0
          x-go-type-skip-optional-pointer: true
        pageSize:
          type: integer
          description: Number of items per page.
          minimum: 1
          x-go-type-skip-optional-pointer: true
          x-oapi-codegen-extra-tags:
            json: pageSize
        totalCount:
          type: integer
          description: Total number of items available.
          minimum: 0
          x-go-type-skip-optional-pointer: true
          x-oapi-codegen-extra-tags:
            json: totalCount
        data:
          type: array
          items:
            $ref: '#/components/schemas/SignupRequest'
          description: Signup requests returned on the current page.
    InvitationPayload:
      type: object
      description: Payload for creating or updating an invitation.
      required:
      - name
      - description
      - orgId
      - emails
      - roles
      - teams
      - status
      properties:
        id:
          $ref: ../../v1beta2/core/api.yml#/components/schemas/Uuid
          x-go-name: ID
          description: Existing invitation ID for updates; omit on create.
          x-oapi-codegen-extra-tags:
            json: "id,omitempty"
        owner:
          $ref: ../../v1beta2/core/api.yml#/components/schemas/Uuid
          description: ID of the user who created the invitation.
          x-go-name: Owner
          x-oapi-codegen-extra-tags:
            db: owner
            json: "owner,omitempty"
        isDefault:
          type: boolean
          description: Indicates whether the invitation is a default invitation (open invite).
          x-oapi-codegen-extra-tags:
            db: is_default
            json: "isDefault,omitempty"
        name:
          type: string
          description: Name of the invitation.
          minLength: 1
          maxLength: 255
        description:
          type: string
          description: Description of the invitation.
          maxLength: 5000
        emails:
          type: array
          x-go-type: pq.StringArray
          x-go-type-import:
            path: github.com/lib/pq
          items:
            type: string
            pattern: ^([a-zA-Z0-9._%+-]+@[a-zA-Z0-9.-]+\.[a-z]{2,}|@[a-zA-Z0-9.-]+\.[a-z]{2,})$
            description: Email address or pattern that is permitted to use this invitation.
            x-go-type: string
          description: Email addresses or patterns this invitation is valid for.
        orgId:
          type: string
          format: uuid
          description: ID of the organization to which the user is invited.
          x-go-name: OrgID
          x-oapi-codegen-extra-tags:
            db: org_id
            json: orgId
          maxLength: 500
        expiresAt:
          type: string
          format: date-time
          description: Timestamp when the invitation expires, if applicable.
          x-oapi-codegen-extra-tags:
            db: expires_at
            json: "expiresAt,omitempty"
        quota:
          type: integer
          description: Quota for the invitation; limits the number of users that can accept it.
          minimum: 0
        roles:
          type: array
          x-go-type: pq.StringArray
          x-go-type-import:
            path: github.com/lib/pq
          items:
            type: string
            description: Role identifier granted by this invitation on acceptance.
          description: Roles that the user will have when accepting the invitation.
        teams:
          type: array
          x-go-type: pq.StringArray
          x-go-type-import:
            path: github.com/lib/pq
          items:
            type: string
            description: Team identifier the invited user is added to on acceptance.
          description: Teams that the user will be added to when accepting the invitation.
        status:
          $ref: '#/components/schemas/InvitationStatus'
          description: Activation status of the invitation.
          x-go-type: InvitationStatus
    InvitationStatus:
      type: string
      enum:
      - enabled
      - disabled
      description: Status of the invitation, where enabled means the invitation is
        active and can be used, disabled means the invitation is no longer valid and
        is temporarily inactive. Disabled invitations can be re-enabled later.
    Invitation:
      $ref: ./invitation.yaml
