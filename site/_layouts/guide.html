<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} — Meshery Schemas Guide</title>
  <meta name="description" content="{{ page.description | default: 'Meshery Schemas contributor guide' }}">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { overflow-y: scroll; }

    :root {
      --green:      #00B39F;
      --green-dark: #00826f;
      --dark:       #3C494F;
      --darker:     #293237;
      --text:       #1a202c;
      --muted:      #64748b;
      --border:     #e2e8f0;
      --bg:         #ffffff;
      --bg-subtle:  #f8fafc;
      --radius:     6px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      --mono: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
    }

    body {
      font-family: var(--font);
      color: var(--text);
      background: var(--bg);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    {% include site-header-styles.html %}

    .guide-wrapper {
      flex: 1;
      display: flex;
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
      padding: 0 1rem;
    }

    .guide-sidebar {
      width: 220px;
      flex-shrink: 0;
      padding: 2rem 1.5rem 2rem 0;
      border-right: 1px solid var(--border);
      position: sticky;
      top: 56px;
      align-self: flex-start;
      height: calc(100vh - 56px);
      overflow-y: auto;
    }
    .guide-nav-label {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }
    .guide-nav ul { list-style: none; }
    .guide-nav li { margin-bottom: 0.15rem; }
    .guide-nav a {
      display: block;
      font-size: 0.85rem;
      padding: 0.35rem 0.65rem;
      border-radius: var(--radius);
      color: var(--muted);
      text-decoration: none;
      transition: all 0.12s;
    }
    .guide-nav a:hover { color: var(--text); background: var(--bg-subtle); }
    .guide-nav a.active {
      color: var(--green);
      background: #f0fdf9;
      font-weight: 500;
    }

    .guide-content {
      flex: 1;
      min-width: 0;
      padding: 2.5rem 0 2.5rem 2.5rem;
    }

    .breadcrumb {
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }
    .breadcrumb a { color: var(--muted); text-decoration: none; }
    .breadcrumb a:hover { color: var(--green); }
    .breadcrumb span { margin: 0 0.35rem; }

    .guide-content h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.5rem; line-height: 1.2; }
    .guide-content .page-desc { font-size: 1rem; color: var(--muted); margin-bottom: 2rem; line-height: 1.6; border-bottom: 1px solid var(--border); padding-bottom: 1.5rem; }
    .guide-content h2 { font-size: 1.15rem; font-weight: 700; margin: 2rem 0 0.75rem; padding-top: 1rem; }
    .guide-content h3 { font-size: 0.97rem; font-weight: 700; margin: 1.5rem 0 0.5rem; color: var(--dark); }
    .guide-content p { margin-bottom: 1rem; font-size: 0.93rem; }
    .guide-content ul, .guide-content ol { margin: 0.5rem 0 1rem 1.5rem; font-size: 0.93rem; }
    .guide-content li { margin-bottom: 0.3rem; }
    .guide-content a { color: var(--green); text-decoration: none; }
    .guide-content a:hover { text-decoration: underline; }
    .guide-content strong { font-weight: 600; }
    .guide-content code {
      font-family: var(--mono);
      font-size: 0.83em;
      background: var(--bg-subtle);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0.1em 0.35em;
    }
    .guide-content pre {
      background: #1e2530;
      border-radius: var(--radius);
      padding: 1.1rem 1.25rem;
      overflow-x: auto;
      margin: 1rem 0 1.5rem;
      border: 1px solid #2d3748;
    }
    .guide-content pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 0.82rem;
      color: #e2e8f0;
      line-height: 1.7;
    }
    .guide-content blockquote {
      border-left: 3px solid var(--green);
      background: #f0fdf9;
      padding: 0.75rem 1rem;
      border-radius: 0 var(--radius) var(--radius) 0;
      margin: 1rem 0 1.5rem;
      font-size: 0.9rem;
      color: var(--dark);
    }
    .guide-content table { width: 100%; border-collapse: collapse; font-size: 0.84rem; margin: 1rem 0 1.5rem; }
    .guide-content th {
      background: var(--bg-subtle);
      border: 1px solid var(--border);
      padding: 0.5rem 0.75rem;
      font-weight: 600;
      text-align: left;
      font-size: 0.8rem;
    }
    .guide-content td { border: 1px solid var(--border); padding: 0.5rem 0.75rem; vertical-align: top; }
    .guide-content td code { font-size: 0.8em; }
    .guide-content hr { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }

    .callout {
      border-radius: var(--radius);
      padding: 0.75rem 1rem 0.75rem 1.1rem;
      margin: 1.25rem 0;
      font-size: 0.88rem;
      border-left-width: 3px;
      border-left-style: solid;
    }
    .callout-icon { display: none; }
    .callout.tip  { background: #f0fdf9; border-color: #34d399; color: #065f46; }
    .callout.warn { background: #fffbeb; border-color: #fbbf24; color: #78350f; }
    .callout.info { background: #eff6ff; border-color: #60a5fa; color: #1e40af; }

    .checklist { list-style: none; margin-left: 0; }
    .checklist li { display: flex; gap: 0.5rem; align-items: flex-start; margin-bottom: 0.4rem; font-size: 0.88rem; }
    .checklist li::before { content: "☐"; color: var(--muted); flex-shrink: 0; }

    .file-tree {
      background: var(--bg-subtle);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      font-family: var(--mono);
      font-size: 0.8rem;
      line-height: 1.8;
      margin: 1rem 0 1.5rem;
      color: var(--text);
    }
    .file-tree .dir { color: var(--dark); font-weight: 600; }
    .file-tree .note { color: var(--muted); margin-left: 0.5rem; font-family: var(--font); font-size: 0.78rem; }

    .site-footer {
      background: var(--darker);
      border-top: 1px solid rgba(255,255,255,0.06);
      padding: 1.5rem 2rem;
      text-align: center;
    }
    .site-footer p { font-size: 0.78rem; color: rgba(255,255,255,0.4); }
    .site-footer a { color: rgba(255,255,255,0.55); text-decoration: none; }
    .site-footer a:hover { color: var(--green); }
    .cncf-badge {
      display: inline-flex; align-items: center; gap: 0.4rem;
      margin-bottom: 0.6rem; font-size: 0.72rem; color: rgba(255,255,255,0.35);
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .cncf-badge::before, .cncf-badge::after {
      content: ""; display: block; width: 28px; height: 1px; background: rgba(255,255,255,0.15);
    }

    @media (max-width: 768px) {
      .guide-sidebar { display: none; }
      .guide-content { padding: 1.5rem 0; }
      .site-nav a:not(.gh-link) { display: none; }
    }
  </style>
</head>
<body>

{% include site-header.html %}

<div class="guide-wrapper">
  <aside class="guide-sidebar">
    {% include guide-nav.html %}
  </aside>
  <main class="guide-content">
    {{ content }}
  </main>
</div>

<footer class="site-footer">
  <div class="cncf-badge">CNCF Sandbox Project</div>
  <p>
    <a href="https://github.com/meshery/schemas">meshery/schemas</a>
    &nbsp;·&nbsp;
    <a href="https://slack.meshery.io">Slack</a>
    &nbsp;·&nbsp;
    <a href="https://discuss.meshery.io">Discuss</a>
    &nbsp;·&nbsp;
    <a href="https://cncf.io">CNCF</a>
  </p>
</footer>

</body>
</html>
