---
layout: default
title: Constructs — Meshery Schemas
description: All schema constructs available in Meshery Schemas, organized by API version.
---
<style>
  .constructs-hero {
    background: linear-gradient(135deg, #1a2332 0%, #293237 60%, #00403a 100%);
    padding: 3rem 2rem 2.5rem;
    text-align: center;
    color: #fff;
  }
  .constructs-hero h1 { font-size: 1.9rem; font-weight: 700; margin-bottom: 0.5rem; }
  .constructs-hero p  { font-size: 1rem; color: rgba(255,255,255,0.65); max-width: 560px; margin: 0 auto; }

  .constructs-body {
    max-width: 1100px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 4rem;
  }

  .version-section { margin-bottom: 3rem; }
  .version-heading {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1.25rem;
    padding-bottom: 0.75rem;
    border-bottom: 2px solid #e2e8f0;
  }
  .version-heading h2 { font-size: 1.05rem; font-weight: 700; color: #293237; margin: 0; }
  .latest-pill {
    font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
    background: #00B39F; color: #fff; border-radius: 20px; padding: 0.18em 0.65em;
  }
  .construct-count { font-size: 0.75rem; color: #64748b; margin-left: auto; }

  .constructs-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
    gap: 1rem;
  }

  .construct-card {
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    padding: 1.1rem 1rem 1rem;
    background: #fff;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    position: relative;
  }
  .construct-card:hover {
    border-color: #00B39F;
    box-shadow: 0 4px 16px rgba(0,179,159,0.12);
    transform: translateY(-2px);
  }
  .construct-card-name {
    font-size: 0.92rem;
    font-weight: 600;
    color: #1a202c;
    font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
  }
  .construct-card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
    margin-top: 0.2rem;
  }
  .construct-card-tag {
    font-size: 0.68rem;
    background: #f0fdf9;
    color: #00826f;
    border: 1px solid #a7f3d0;
    border-radius: 3px;
    padding: 0.1em 0.45em;
  }
  .construct-card-gh {
    margin-top: auto;
    padding-top: 0.5rem;
    font-size: 0.72rem;
    color: #64748b;
    display: flex;
    align-items: center;
    gap: 0.3rem;
    text-decoration: none;
  }
  .construct-card-gh:hover { color: #00B39F; }

  .empty-state {
    grid-column: 1/-1;
    text-align: center;
    padding: 2rem;
    color: #64748b;
    font-size: 0.85rem;
  }

  @media (max-width: 600px) {
    .constructs-grid { grid-template-columns: 1fr 1fr; }
    .constructs-hero { padding: 2rem 1rem 1.5rem; }
    .constructs-hero h1 { font-size: 1.4rem; }
  }
</style>

<div class="constructs-hero">
  <h1>Schema Constructs</h1>
  <p>Every versioned construct defined in Meshery Schemas — click any card to browse its source on GitHub.</p>
</div>

<div class="constructs-body" id="constructs-body">
  <p style="color:#64748b;font-size:0.88rem;text-align:center;padding:3rem 0;">Loading constructs…</p>
</div>

<script>
const RAW = [
  {% for c in site.data.constructs_all %}
    { name: "{{ c.name }}", version: "{{ c.version }}" },
  {% endfor %}
];

const TREE = {};
for (const c of RAW) {
  if (!TREE[c.version]) TREE[c.version] = new Set();
  TREE[c.version].add(c.name);
}
const VERSIONS = Object.keys(TREE).sort().reverse();
const LATEST = VERSIONS[0];

const TAGS = {
  connection: ['integration'],
  environment: ['integration'],
  credential: ['integration'],
  key: ['auth'],
  keychain: ['auth'],
  token: ['auth'],
  workspace: ['identity'],
  team: ['identity'],
  organization: ['identity'],
  user: ['identity'],
  role: ['identity'],
  invitation: ['identity'],
  design: ['content'],
  component: ['content'],
  model: ['content'],
  view: ['content'],
  pattern: ['content'],
  plan: ['entitlement'],
  subscription: ['entitlement'],
  feature: ['entitlement'],
};

function tagsFor(name) {
  for (const [k, v] of Object.entries(TAGS)) {
    if (name.toLowerCase().includes(k)) return v;
  }
  return [];
}

function ghUrl(ver, name) {
  return `https://github.com/meshery/schemas/tree/master/schemas/constructs/${ver}/${name}`;
}

function viewUrl(ver, name) {
  return `/constructs/view/?ver=${encodeURIComponent(ver)}&name=${encodeURIComponent(name)}`;
}

function renderCard(ver, name) {
  const tags = tagsFor(name);
  const tagHtml = tags.map(t =>
    `<span class="construct-card-tag">${t}</span>`
  ).join('');
  return `
    <a class="construct-card" href="${viewUrl(ver, name)}">
      <div class="construct-card-name">${name}</div>
      ${tags.length ? `<div class="construct-card-tags">${tagHtml}</div>` : ''}
      <span class="construct-card-gh">
        <svg width="11" height="11" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
          <path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd"/>
        </svg>
        View schema
      </span>
    </a>`;
}

function render() {
  const body = document.getElementById('constructs-body');
  if (!VERSIONS.length) {
    body.innerHTML = '<p style="text-align:center;color:#64748b;padding:3rem 0;">No constructs found.</p>';
    return;
  }

  let html = '';
  for (const ver of VERSIONS) {
    const names = [...TREE[ver]].sort();
    const isLatest = ver === LATEST;
    html += `
      <section class="version-section">
        <div class="version-heading">
          <h2>${ver}</h2>
          ${isLatest ? '<span class="latest-pill">Latest</span>' : ''}
          <span class="construct-count">${names.length} construct${names.length !== 1 ? 's' : ''}</span>
        </div>
        <div class="constructs-grid">
          ${names.length ? names.map(n => renderCard(ver, n)).join('') : '<div class="empty-state">No constructs found for this version.</div>'}
        </div>
      </section>`;
  }
  body.innerHTML = html;
}

render();
</script>
