---

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Schema Validator — Meshery Schemas</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/yaml/yaml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/lint/lint.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/lint/lint.min.css" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ajv/8.12.0/ajv2020.min.js"></script>

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { overflow-y: scroll; }
      :root {
        --green:   #00B39F;
        --darker:  #293237;
        --dark:    #3C494F;
        --text:    #1a202c;
        --muted:   #64748b;
        --border:  #e2e8f0;
        --bg:      #ffffff;
        --bg-sub:  #f8fafc;
        --radius:  6px;
        --font:    -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        --mono:    ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
      }

      body { font-family: var(--font); color: var(--text); background: var(--bg); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

      {% include site-header-styles.html %}


      .toolbar {
        background: var(--bg-sub); border-bottom: 1px solid var(--border);
        padding: 0.6rem 1rem; display: flex; align-items: center; gap: 0.75rem;
        flex-shrink: 0; flex-wrap: wrap;
      }
      .toolbar label { font-size: 0.78rem; font-weight: 600; color: var(--muted); white-space: nowrap; }
      .toolbar select {
        font-size: 0.82rem; font-family: var(--mono); padding: 0.3rem 0.6rem;
        border: 1px solid var(--border); border-radius: var(--radius);
        background: #fff; color: var(--text); cursor: pointer;
      }
      .toolbar select:focus { outline: 2px solid var(--green); outline-offset: 1px; }
      .toolbar-sep { width: 1px; height: 20px; background: var(--border); }
      .btn {
        display: inline-flex; align-items: center; gap: 0.35rem;
        padding: 0.3rem 0.8rem; border-radius: var(--radius); font-size: 0.8rem;
        font-weight: 500; border: 1px solid var(--border); cursor: pointer;
        background: #fff; color: var(--text); transition: all 0.15s; white-space: nowrap;
      }
      .btn:hover { background: var(--bg-sub); }
      .btn.primary { background: var(--green); border-color: var(--green); color: #fff; }
      .btn.primary:hover { background: #00a090; }
      .validate-status {
        margin-left: auto; font-size: 0.78rem; font-weight: 600;
        display: flex; align-items: center; gap: 0.4rem;
      }
      .validate-status .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
      .validate-status.ok .dot  { background: #22c55e; }
      .validate-status.err .dot { background: #ef4444; }
      .validate-status.warn .dot { background: #f59e0b; }

      .workspace { flex: 1; display: flex; overflow: hidden; }

      .editor-pane { flex: 1; display: flex; flex-direction: column; border-right: 1px solid var(--border); min-width: 0; }
      .pane-header {
        padding: 0.4rem 0.9rem; font-size: 0.7rem; font-weight: 700;
        text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted);
        background: var(--bg-sub); border-bottom: 1px solid var(--border);
        display: flex; align-items: center; justify-content: space-between;
      }
      .CodeMirror { flex: 1; height: 100%; font-size: 13px; font-family: var(--mono); line-height: 1.6; }
      .CodeMirror-scroll { height: 100%; }
      .editor-pane { position: relative; }
      .editor-wrap { flex: 1; overflow: hidden; display: flex; flex-direction: column; }


      .results-pane { width: 360px; flex-shrink: 0; display: flex; flex-direction: column; overflow: hidden; }
      .results-body { flex: 1; overflow-y: auto; padding: 0.75rem; }

      .result-empty {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        height: 100%; color: var(--muted); font-size: 0.85rem; text-align: center; gap: 0.5rem; padding: 2rem;
      }
      .result-empty svg { opacity: 0.3; }

      .result-group { margin-bottom: 1rem; }
      .result-group-label {
        font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
        letter-spacing: 0.1em; color: var(--muted); margin-bottom: 0.4rem;
      }

      .result-item {
        display: flex; gap: 0.6rem; align-items: flex-start;
        padding: 0.5rem 0.6rem; border-radius: var(--radius); margin-bottom: 0.3rem;
        font-size: 0.81rem; line-height: 1.4; cursor: pointer; transition: background 0.1s;
        border: 1px solid transparent;
      }
      .result-item:hover { background: var(--bg-sub); }
      .result-item.error   { border-color: #fecaca; background: #fef2f2; }
      .result-item.warning { border-color: #fde68a; background: #fffbeb; }
      .result-item.success { border-color: #bbf7d0; background: #f0fdf4; }
      .result-item.info    { border-color: #bfdbfe; background: #eff6ff; }

      .result-icon { flex-shrink: 0; font-size: 0.9rem; line-height: 1.4; }
      .result-content { flex: 1; min-width: 0; }
      .result-msg { color: var(--text); }
      .result-item.error   .result-msg { color: #991b1b; }
      .result-item.warning .result-msg { color: #78350f; }
      .result-item.success .result-msg { color: #166534; }
      .result-item.info    .result-msg { color: #1e40af; }
      .result-line {
        font-size: 0.7rem; margin-top: 0.15rem; font-family: var(--mono);
        color: var(--muted);
      }
      .result-item.error .result-line { color: #ef4444; }

      .cm-error-line { background: rgba(239,68,68,0.08) !important; }

      @media (max-width: 768px) {
        .workspace { flex-direction: column; }
        .results-pane { width: 100%; height: 280px; border-top: 1px solid var(--border); }
        .editor-pane { border-right: none; }
      }
    </style>
  </head>
  <body>
    {% include site-header.html %}

    <div class="toolbar">
      <label>Version</label>
      <select id="sel-version">
        <option value="v1beta3">v1beta3</option>
        <option value="v1beta2">v1beta2</option>
        <option value="v1beta1" selected>v1beta1</option>
        <option value="v1alpha3">v1alpha3</option>
        <option value="v1alpha2">v1alpha2</option>
        <option value="v1alpha1">v1alpha1</option>
      </select>

      <label>Construct</label>
      <select id="sel-construct"></select>

      <div class="toolbar-sep"></div>

      <button class="btn" id="btn-load-example">Load example</button>
      <button class="btn" id="btn-clear">Clear</button>

      <div class="toolbar-sep"></div>

      <label>Format</label>
      <select id="sel-format">
        <option value="yaml">YAML</option>
        <option value="json">JSON</option>
      </select>

      <button class="btn primary" id="btn-validate">Validate</button>

      <div class="validate-status" id="validate-status">
        <span class="dot"></span>
        <span id="status-text">Ready</span>
      </div>
    </div>

    <div class="workspace">
      <div class="editor-pane">
        <div class="pane-header">
          <span>Input</span>
          <span id="editor-hint" style="font-weight: 400; text-transform: none; letter-spacing: 0"
            >Paste YAML or JSON</span
          >
        </div>
        <div class="editor-wrap">
          <textarea id="editor"></textarea>
        </div>
      </div>

      <div class="results-pane">
        <div class="pane-header">
          <span>Results</span>
          <span id="result-count" style="font-weight: 400; text-transform: none; letter-spacing: 0"></span>
        </div>
        <div class="results-body" id="results-body">
          <div class="result-empty" id="result-empty">
            <svg width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="1.5"
                d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"
              />
            </svg>
            <div>Select a construct and paste content,<br />then click <strong>Validate</strong>.</div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const CONSTRUCTS = {
        v1beta3: [
          "component",
          "connection",
          "design",
          "environment",
          "event",
          "invitation",
          "plan",
          "relationship",
          "subscription",
          "token",
          "workspace",
        ],
        v1beta2: [
          "academy",
          "badge",
          "catalog",
          "component",
          "connection",
          "credential",
          "design",
          "event",
          "invitation",
          "key",
          "keychain",
          "model",
          "organization",
          "plan",
          "relationship",
          "role",
          "schedule",
          "selector",
          "subscription",
          "team",
          "token",
          "user",
          "view",
        ],
        v1beta1: [
          "capability",
          "catalog",
          "category",
          "component",
          "connection",
          "credential",
          "design",
          "environment",
          "evaluation",
          "event",
          "feature",
          "invitation",
          "key",
          "keychain",
          "model",
          "organization",
          "plan",
          "relationship",
          "role",
          "schedule",
          "selector",
          "subcategory",
          "subscription",
          "team",
          "token",
          "user",
          "view",
          "workspace",
        ],
        v1alpha3: ["relationship", "selector"],
        v1alpha2: ["catalog"],
        v1alpha1: ["capability", "catalog_data"],
      };

      const cm = CodeMirror.fromTextArea(document.getElementById("editor"), {
        mode: "yaml",
        lineNumbers: true,
        theme: "default",
        tabSize: 2,
        indentWithTabs: false,
        lineWrapping: true,
        autofocus: true,
      });
      cm.setSize("100%", "100%");

      const editorWrap = document.querySelector(".editor-wrap");
      const ro = new ResizeObserver(() => cm.setSize(editorWrap.clientWidth, editorWrap.clientHeight));
      ro.observe(editorWrap);

      const selVersion = document.getElementById("sel-version");
      const selConstruct = document.getElementById("sel-construct");
      const selFormat = document.getElementById("sel-format");

      function populateConstructs() {
        const ver = selVersion.value;
        const list = CONSTRUCTS[ver] || [];
        selConstruct.innerHTML = list.map((c) => `<option value="${c}">${c}</option>`).join("");
      }
      selVersion.addEventListener("change", populateConstructs);
      populateConstructs();

      selFormat.addEventListener("change", () => {
        cm.setOption("mode", selFormat.value === "json" ? "application/json" : "yaml");
      });

      document.getElementById("btn-load-example").addEventListener("click", async () => {
        const ver = selVersion.value;
        const con = selConstruct.value;
        const fmt = selFormat.value;
        const ext = fmt === "json" ? "json" : "yaml";
        const url = `/schemas/constructs/${ver}/${con}/templates/${con}_template.${ext}`;
        try {
          const res = await fetch(url);
          if (!res.ok) throw new Error();
          const text = await res.text();
          cm.setValue(text);
          setStatus("idle");
        } catch {
          const altExt = fmt === "json" ? "yaml" : "json";
          const altUrl = `/schemas/constructs/${ver}/${con}/templates/${con}_template.${altExt}`;
          try {
            const res2 = await fetch(altUrl);
            if (!res2.ok) throw new Error();
            const text2 = await res2.text();
            cm.setValue(text2);
            if (altExt !== fmt) selFormat.value = altExt;
            cm.setOption("mode", altExt === "json" ? "application/json" : "yaml");
            setStatus("idle");
          } catch {
            showResults([{ type: "warning", icon: "⚠️", msg: `No template found for ${ver}/${con}`, line: null }]);
          }
        }
      });

      document.getElementById("btn-clear").addEventListener("click", () => {
        cm.setValue("");
        clearResults();
        setStatus("idle");
      });

      const schemaCache = {};

      function stripRefs(node) {
        if (node === null || typeof node !== "object") return node;
        if (Array.isArray(node)) return node.map(stripRefs);
        if ("$ref" in node) return {}; // Replace $ref with permissive {}
        const out = {};
        for (const [k, v] of Object.entries(node)) {
          if (k.startsWith("x-")) continue;
          out[k] = stripRefs(v);
        }
        return out;
      }

      async function loadSchema(ver, con) {
        const key = `${ver}/${con}`;
        if (schemaCache[key]) return schemaCache[key];

        const yamlUrl = `/schemas/constructs/${ver}/${con}/${con}.yaml`;
        const res = await fetch(yamlUrl);
        if (!res.ok) throw new Error(`Schema not found: ${yamlUrl}`);
        const raw = jsyaml.load(await res.text());
        const schema = stripRefs(raw);
        delete schema["$id"];
        delete schema["$schema"];
        schemaCache[key] = schema;
        return schema;
      }

      const SNAKE_RE = /^[a-z][a-z0-9]*(_[a-z0-9]+)+$/;
      const PASCAL_RE = /^[A-Z]/;
      const ID_RE = /[Ii][Dd]$/;

      function lintNaming(obj, path, issues) {
        if (!obj || typeof obj !== "object") return;
        if (Array.isArray(obj)) {
          obj.forEach((v, i) => lintNaming(v, `${path}[${i}]`, issues));
          return;
        }
        for (const [k, v] of Object.entries(obj)) {
          const fieldPath = path ? `${path}.${k}` : k;
          if (SNAKE_RE.test(k) && !["created_at", "updated_at", "deleted_at", "page_size", "total_count"].includes(k)) {
            issues.push({
              type: "warning",
              icon: "⚠️",
              msg: `"${k}" — field name is snake_case; use camelCase on the wire`,
              line: null,
              path: fieldPath,
            });
          }
          if (k === "operationId" && typeof v === "string" && PASCAL_RE.test(v)) {
            issues.push({
              type: "warning",
              icon: "⚠️",
              msg: `operationId "${v}" should be lower camelCase (e.g. "${v[0].toLowerCase()}${v.slice(1)}")`,
              line: null,
              path: fieldPath,
            });
          }
          if (ID_RE.test(k) && k.endsWith("ID")) {
            issues.push({
              type: "warning",
              icon: "⚠️",
              msg: `"${k}" — ID suffix should be lowercase "Id", not "ID"`,
              line: null,
              path: fieldPath,
            });
          }
          lintNaming(v, fieldPath, issues);
        }
      }

      function guessLine(yamlText, instancePath) {
        if (!instancePath) return null;
        const key = instancePath.split("/").filter(Boolean).pop();
        if (!key) return null;
        const lines = yamlText.split("\n");
        for (let i = 0; i < lines.length; i++) {
          if (lines[i].match(new RegExp(`^\\s*${key}\\s*:`))) return i + 1;
        }
        return null;
      }

      document.getElementById("btn-validate").addEventListener("click", validate);
      cm.setOption("extraKeys", { "Ctrl-Enter": validate, "Cmd-Enter": validate });

      async function validate() {
        const src = cm.getValue().trim();
        const format = selFormat.value;
        const ver = selVersion.value;
        const con = selConstruct.value;
        const items = [];
        clearHighlights();

        if (!src) {
          showResults([
            { type: "warning", icon: "⚠️", msg: "Nothing to validate — paste some content first.", line: null },
          ]);
          return;
        }

        let parsed;
        try {
          parsed = format === "json" ? JSON.parse(src) : jsyaml.load(src);
          items.push({ type: "success", icon: "✓", msg: `Valid ${format.toUpperCase()} syntax`, line: null });
        } catch (e) {
          const line = e.mark && e.mark.line != null ? e.mark.line + 1 : null;
          items.push({ type: "error", icon: "✕", msg: `${format.toUpperCase()} parse error: ${e.message}`, line });
          if (line) highlightLine(line - 1, "cm-error-line");
          showResults(items);
          setStatus("err", "1 error");
          return;
        }

        try {
          const schema = await loadSchema(ver, con);
          const ajv = new ajv2020({ allErrors: true, strict: false });
          const validate_fn = ajv.compile(schema);
          const valid = validate_fn(parsed);
          if (valid) {
            items.push({ type: "success", icon: "✓", msg: `Valid against ${ver}/${con} schema`, line: null });
          } else {
            for (const err of validate_fn.errors) {
              const fieldName =
                err.instancePath.split("/").filter(Boolean).pop() || err.params?.additionalProperty || "";
              const line = guessLine(src, err.instancePath || "/" + (err.params?.additionalProperty || ""));
              let msg = "";
              if (err.keyword === "required") msg = `Missing required field: "${err.params.missingProperty}"`;
              else if (err.keyword === "additionalProperties")
                msg = `Unknown field: "${err.params.additionalProperty}"`;
              else if (err.keyword === "type")
                msg = `"${fieldName}" — expected ${err.params.type}, got ${typeof (err.instancePath ? parsed : parsed)}`;
              else if (err.keyword === "enum")
                msg = `"${fieldName}" — invalid value. Allowed: ${err.params.allowedValues?.join(", ")}`;
              else msg = `${err.instancePath || "/"} — ${err.message}`;
              items.push({ type: "error", icon: "✕", msg, line });
              if (line) highlightLine(line - 1, "cm-error-line");
            }
          }
        } catch (e) {
          items.push({
            type: "info",
            icon: "ℹ",
            msg: `Schema not available for ${ver}/${con} — syntax only`,
            line: null,
          });
        }

        const namingIssues = [];
        lintNaming(parsed, "", namingIssues);
        items.push(...namingIssues);

        const errors = items.filter((i) => i.type === "error").length;
        const warnings = items.filter((i) => i.type === "warning").length;
        if (errors)
          setStatus(
            "err",
            `${errors} error${errors > 1 ? "s" : ""}${warnings ? `, ${warnings} warning${warnings > 1 ? "s" : ""}` : ""}`,
          );
        else if (warnings) setStatus("warn", `${warnings} warning${warnings > 1 ? "s" : ""}`);
        else setStatus("ok", "All checks passed");

        showResults(items);
      }

      function setStatus(state, text) {
        const el = document.getElementById("validate-status");
        el.className = "validate-status " + (state || "");
        document.getElementById("status-text").textContent = text || "Ready";
      }

      function highlightLine(lineNum, cls) {
        cm.addLineClass(lineNum, "background", cls);
      }

      function clearHighlights() {
        for (let i = 0; i < cm.lineCount(); i++) cm.removeLineClass(i, "background", "cm-error-line");
      }

      function clearResults() {
        document.getElementById("results-body").innerHTML = `
    <div class="result-empty" id="result-empty">
      <svg width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
          d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      <div>Select a construct and paste content,<br>then click <strong>Validate</strong>.</div>
    </div>`;
        document.getElementById("result-count").textContent = "";
        setStatus("idle");
      }

      function showResults(items) {
        const body = document.getElementById("results-body");
        const errors = items.filter((i) => i.type === "error");
        const warnings = items.filter((i) => i.type === "warning");
        const successes = items.filter((i) => i.type === "success");
        const infos = items.filter((i) => i.type === "info");

        let html = "";

        if (errors.length) {
          html += `<div class="result-group"><div class="result-group-label">Errors (${errors.length})</div>`;
          html += errors.map(renderItem).join("");
          html += "</div>";
        }
        if (warnings.length) {
          html += `<div class="result-group"><div class="result-group-label">Warnings (${warnings.length})</div>`;
          html += warnings.map(renderItem).join("");
          html += "</div>";
        }
        if (successes.length || infos.length) {
          html += `<div class="result-group"><div class="result-group-label">Passed</div>`;
          html += [...successes, ...infos].map(renderItem).join("");
          html += "</div>";
        }

        body.innerHTML = html;

        const total = errors.length + warnings.length;
        document.getElementById("result-count").textContent = total ? `${total} issue${total > 1 ? "s" : ""}` : "";

        body.querySelectorAll(".result-item[data-line]").forEach((el) => {
          el.addEventListener("click", () => {
            const line = parseInt(el.dataset.line, 10) - 1;
            cm.setCursor(line, 0);
            cm.scrollIntoView({ line, ch: 0 }, 100);
            cm.focus();
          });
        });
      }

      function renderItem(item) {
        const lineAttr = item.line ? `data-line="${item.line}"` : "";
        const lineHint = item.line ? `<div class="result-line">Line ${item.line}</div>` : "";
        return `
    <div class="result-item ${item.type}" ${lineAttr}>
      <span class="result-icon">${item.icon}</span>
      <div class="result-content">
        <div class="result-msg">${escapeHtml(item.msg)}</div>
        ${lineHint}
      </div>
    </div>`;
      }

      function escapeHtml(s) {
        return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
      }
    </script>
  </body>
</html>
