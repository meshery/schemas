---
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloud API Reference — Meshery Schemas</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #00B39F;
      --purple: #7c3aed;
      --darker: #293237;
      --border: rgba(255,255,255,0.06);
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      --radius: 6px;
    }
    body { margin: 0; font-family: var(--font); display: flex; flex-direction: column; height: 100vh; }

    .site-header {
      background: var(--darker);
      height: 48px;
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
      z-index: 1000;
    }
    .brand { display: flex; align-items: center; gap: 0.5rem; text-decoration: none; }
    .brand img { height: 20px; }
    .brand-sep { color: rgba(255,255,255,0.25); font-size: 1.2rem; font-weight: 200; margin: 0 0.2rem; }
    .brand-label { font-size: 0.85rem; font-weight: 500; color: rgba(255,255,255,0.8); }

    .header-nav { margin-left: auto; display: flex; align-items: center; gap: 0.5rem; }
    .view-btn {
      display: inline-flex; align-items: center; gap: 0.35rem;
      padding: 0.3rem 0.75rem; border-radius: var(--radius);
      font-size: 0.78rem; font-weight: 500; text-decoration: none;
      border: 1px solid rgba(255,255,255,0.12);
      transition: all 0.15s; color: rgba(255,255,255,0.6);
      background: transparent;
    }
    .view-btn:hover { color: rgba(255,255,255,0.9); background: rgba(255,255,255,0.06); }
    .view-btn.active { background: var(--purple); border-color: var(--purple); color: #fff; }
    .view-btn .dot { width: 7px; height: 7px; border-radius: 50%; }
    .view-btn.meshery .dot { background: var(--green); }
    .view-btn.cloud .dot { background: var(--purple); }
    .view-btn.active .dot { background: rgba(255,255,255,0.7); }

    .back-link {
      font-size: 0.78rem; color: rgba(255,255,255,0.4);
      text-decoration: none; margin-right: 0.75rem;
    }
    .back-link:hover { color: rgba(255,255,255,0.7); }

    #redoc-container { flex: 1; overflow: auto; }

    .spec-missing {
      display: none;
      flex: 1;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
      color: #64748b;
      text-align: center;
      padding: 3rem;
    }
    .spec-missing h2 { font-size: 1.2rem; color: #1a202c; }
    .spec-missing code {
      background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 4px;
      padding: 0.15em 0.4em; font-size: 0.85em;
    }
  </style>
</head>
<body>

<header class="site-header">
  <a class="brand" href="/">
    <img src="https://raw.githubusercontent.com/meshery/meshery/master/.github/assets/images/readme/meshery-logo-light-text-side.svg" alt="Meshery">
    <span class="brand-sep">/</span>
    <span class="brand-label">Schemas</span>
  </a>
  <nav class="header-nav">
    <a class="back-link" href="/api/">← API Reference</a>
    <a class="view-btn meshery" href="/api/meshery/">
      <span class="dot"></span> Meshery API
    </a>
    <a class="view-btn cloud active" href="/api/cloud/">
      <span class="dot"></span> Cloud API
    </a>
  </nav>
</header>

<div id="redoc-container"></div>

<div class="spec-missing" id="spec-missing">
  <h2>Spec not found</h2>
  <p>The bundled OpenAPI spec hasn't been generated yet.</p>
  <p>Run <code>make docs-build</code> then restart the server.</p>
  <p><a href="/api/" style="color:#7c3aed">← Back to API Reference</a></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/redoc@2.1.3/bundles/redoc.standalone.js"></script>
<script>
  const specUrl = '/api/specs/cloud.yml';

  fetch(specUrl)
    .then(function(res) {
      if (!res.ok) throw new Error('Spec not found');
      return res.text();
    })
    .then(function() {
      Redoc.init(specUrl, {
        theme: {
          colors: {
            primary: { main: '#7c3aed' },
            http: {
              get:    '#00B39F',
              post:   '#3b82f6',
              put:    '#f59e0b',
              delete: '#ef4444',
              patch:  '#8b5cf6'
            }
          },
          typography: {
            fontSize:   '14px',
            fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif',
            headings:   { fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif' },
            code:       { fontFamily: 'ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace', fontSize: '13px' }
          },
          sidebar: {
            backgroundColor: '#f8fafc',
            textColor:        '#1a202c',
            width:            '260px'
          },
          rightPanel: {
            backgroundColor: '#1e2530'
          }
        },
        hideDownloadButton: false,
        sortPropsAlphabetically: false,
        expandResponses: '200,201'
      }, document.getElementById('redoc-container'));
    })
    .catch(function() {
      document.getElementById('redoc-container').style.display = 'none';
      var el = document.getElementById('spec-missing');
      el.style.display = 'flex';
    });
</script>
</body>
</html>
