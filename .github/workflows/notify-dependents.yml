name: Notify Extension Partners

on:
  workflow_call:
    inputs:
      release_version:
        description: "Release Version (e.g. 0.8.125)"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release Version (e.g. 0.8.125)"
        required: true
        default: "0.8.0"
        type: string

permissions:
  contents: read

jobs:
  resolve-version:
    runs-on: ubuntu-24.04
    outputs:
      release_version: ${{ steps.resolve.outputs.release_version }}
    steps:
      - name: Resolve release version
        id: resolve
        env:
          INPUT_RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          set -eo pipefail

          release_version="${INPUT_RELEASE_VERSION}"
          release_version="${release_version#v}"

          if [ -z "$release_version" ]; then
            echo "release_version input is empty; expected a non-empty value from workflow_call or workflow_dispatch." >&2
            exit 1
          fi

          if ! [[ "$release_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid semver: $release_version" >&2
            exit 1
          fi

          echo "release_version=$release_version" >> "$GITHUB_OUTPUT"
          echo "Resolved release version: $release_version"

  wait-for-module:
    # A release tag is published moments before this fan-out runs, but the Go
    # module proxy (proxy.golang.org) and checksum database (sum.golang.org)
    # index new versions asynchronously. If a downstream `go get
    # github.com/meshery/schemas@vX.Y.Z` races ahead of that indexing, checksum
    # verification fails with a transient 500 from sum.golang.org and the bump
    # jobs go red until a manual re-run. Gate the bump jobs on a single wait so
    # every `go get` below (meshery root module, the nested
    # server/policies/wasm module, and meshkit) sees a fully-indexed version.
    #
    # This waits rather than weakening verification (GONOSUMCHECK / GOFLAGS
    # -insecure / GONOSUMDB) - that would trade a flake for a supply-chain hole.
    runs-on: ubuntu-24.04
    needs: resolve-version
    if: ${{ needs.resolve-version.outputs.release_version != '' }}
    env:
      RELEASE_VERSION: ${{ needs.resolve-version.outputs.release_version }}
      MODULE: github.com/meshery/schemas
    steps:
      - name: Wait for schemas module to be resolvable on proxy and checksum DB
        run: |
          set -uo pipefail

          version="v${RELEASE_VERSION}"
          info_url="https://proxy.golang.org/${MODULE}/@v/${version}.info"
          # A successful sum.golang.org lookup is authoritative: the checksum DB
          # fetches and hashes the full module (zip + go.mod) before answering,
          # so a 200 here means the exact bytes `go get` will verify are logged.
          sumdb_url="https://sum.golang.org/lookup/${MODULE}@${version}"

          max_attempts=30   # 30 attempts x 10s = up to ~5 min of indexing lag
          sleep_seconds=10
          attempt=1
          while [ "$attempt" -le "$max_attempts" ]; do
            # Capture the HTTP status rather than relying on curl's exit code, so
            # the poll log surfaces the exact 404/500 the version is transiently
            # returning while indexing. Without -f, curl exits 0 on an HTTP error
            # and still prints the status; on a connection-level failure it
            # prints 000. Either way the code is non-200 and we keep polling (no
            # `set -e`, so the non-zero exit does not abort the step).
            info_code=$(curl -s -o /dev/null -w '%{http_code}' "$info_url")
            sumdb_code=$(curl -s -o /dev/null -w '%{http_code}' "$sumdb_url")
            if [ "$info_code" = "200" ] && [ "$sumdb_code" = "200" ]; then
              echo "::notice::${MODULE}@${version} is resolvable on proxy.golang.org and sum.golang.org (attempt ${attempt}/${max_attempts})."
              exit 0
            fi
            echo "Attempt ${attempt}/${max_attempts}: proxy .info=${info_code}, sumdb lookup=${sumdb_code}; waiting ${sleep_seconds}s for indexing to catch up..."
            sleep "$sleep_seconds"
            attempt=$((attempt + 1))
          done

          echo "::error::${MODULE}@${version} did not become resolvable on proxy.golang.org and sum.golang.org within ~$((max_attempts * sleep_seconds))s." >&2
          exit 1

  bump-meshery:
    runs-on: ubuntu-24.04
    needs: [resolve-version, wait-for-module]
    if: ${{ needs.resolve-version.outputs.release_version != '' }}
    env:
      RELEASE_VERSION: ${{ needs.resolve-version.outputs.release_version }}
    steps:
      - name: Checkout Meshery
        uses: actions/checkout@v7
        with:
          repository: meshery/meshery
          fetch-depth: 1
          token: ${{ secrets.GH_ACCESS_TOKEN }}
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Bump schemas dependency
        run: |
          set -eo pipefail
          go get "github.com/meshery/schemas@v${{ env.RELEASE_VERSION }}"
          go mod tidy
          # The wasm engine is a separate Go module that pins meshery/schemas
          # independently; bump it too so the repo stays on one schemas version
          # (see server/policies/wasm/go.mod).
          if [ -f server/policies/wasm/go.mod ]; then
            (
              cd server/policies/wasm
              go get "github.com/meshery/schemas@v${{ env.RELEASE_VERSION }}"
              go mod tidy
            )
          fi
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GH_ACCESS_TOKEN }}
          commit-message: "chore: bump github.com/meshery/schemas to v${{ env.RELEASE_VERSION }}"
          committer: meshery-ci <ci@meshery.io>
          author: meshery-ci <ci@meshery.io>
          signoff: true
          branch: bump-schemas-bot
          delete-branch: true
          title: "[Chore]: Bump meshery/schemas to v${{ env.RELEASE_VERSION }}"
          add-paths: |
            go.mod
            go.sum
            server/policies/wasm/go.mod
            server/policies/wasm/go.sum
          body: |
            Bump `github.com/meshery/schemas` to v${{ env.RELEASE_VERSION }}

            _This pull request has been auto-generated by [meshery-ci](https://github.com/meshery-ci)_
          assignees: meshery-ci
          draft: false

  bump-meshkit:
    runs-on: ubuntu-24.04
    needs: [resolve-version, wait-for-module]
    if: ${{ needs.resolve-version.outputs.release_version != '' }}
    env:
      RELEASE_VERSION: ${{ needs.resolve-version.outputs.release_version }}
    steps:
      - name: Checkout Meshkit
        uses: actions/checkout@v7
        with:
          repository: meshery/meshkit
          fetch-depth: 1
          token: ${{ secrets.GH_ACCESS_TOKEN }}
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Bump schemas dependency
        run: |
          go get "github.com/meshery/schemas@v${{ env.RELEASE_VERSION }}"
          go mod tidy
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GH_ACCESS_TOKEN }}
          commit-message: "chore: bump github.com/meshery/schemas to v${{ env.RELEASE_VERSION }}"
          committer: meshery-ci <ci@meshery.io>
          author: meshery-ci <ci@meshery.io>
          signoff: true
          branch: bump-schemas-bot
          delete-branch: true
          title: "[Chore]: Bump meshery/schemas to v${{ env.RELEASE_VERSION }}"
          add-paths: |
            go.mod
            go.sum
          body: |
            Bump `github.com/meshery/schemas` to v${{ env.RELEASE_VERSION }}

            _This pull request has been auto-generated by [meshery-ci](https://github.com/meshery-ci)_
          assignees: meshery-ci
          draft: false
