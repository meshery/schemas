name: PR Site Preview Cleanup

on:
  pull_request_target:
    types: [closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Remove preview directory
        run: |
          git config user.name "meshery-ci"
          git config user.email "ci@meshery.io"
          git rm -rf "pr-${{ github.event.pull_request.number }}" || true
          git diff --cached --quiet || git commit -m "chore: remove preview for PR #${{ github.event.pull_request.number }}"
          git push

      - name: Mark preview comment as removed
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- site-preview -->';
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              per_page: 100,
            });

            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));
            if (!existing) return;

            const body = `${marker}
            ### Site preview

            Preview removed because this pull request was closed.`;

            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
