name: Agent Instructions Sync

# CLAUDE.md is a symlink to AGENTS.md, restored as part of the ecosystem-wide
# agent-instruction alignment (it was a byte-identical copy between #885 and
# that alignment; the symlink makes drift structurally impossible). This guard
# fails the build if CLAUDE.md stops resolving to AGENTS.md, or if the
# instruction file exceeds Claude Code's 40k-character memory-file warning
# threshold.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - '.github/workflows/agent-instructions-sync.yml'
  push:
    branches:
      - master
    paths:
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - '.github/workflows/agent-instructions-sync.yml'

jobs:
  sync-check:
    name: AGENTS.md == CLAUDE.md and under 40k
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: CLAUDE.md must be a symlink resolving to AGENTS.md
        run: |
          if [ ! -L CLAUDE.md ] || [ "$(readlink CLAUDE.md)" != "AGENTS.md" ]; then
            echo "::error::CLAUDE.md must be a symlink pointing at AGENTS.md."
            echo "Re-create with: ln -sf AGENTS.md CLAUDE.md"
            exit 1
          fi
          if ! diff -q AGENTS.md CLAUDE.md; then
            echo "::error::CLAUDE.md does not resolve to AGENTS.md content."
            exit 1
          fi
          echo "CLAUDE.md is a symlink to AGENTS.md."

      - name: File must stay under the 40k-character warning threshold
        run: |
          limit=40000
          chars=$(wc -m < AGENTS.md)
          if [ "$chars" -gt "$limit" ]; then
            echo "::error::AGENTS.md is ${chars} characters (> ${limit}). Move detail into docs/ and link it."
            exit 1
          fi
          echo "AGENTS.md: ${chars} characters (limit ${limit}) - OK"
