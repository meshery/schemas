name: PR Site Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - 'site/**'
      - '_config.yml'
      - 'Gemfile'
      - 'Gemfile.lock'
      - 'schemas/**'
      - 'build/bundle-openapi.js'

permissions:
  contents: write
  pull-requests: write

jobs:
  preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node deps and bundle OpenAPI specs
        run: make docs-build

      - name: Resolve symlinks for Jekyll
        run: |
          rm site/schemas site/models site/ts
          cp -r schemas site/schemas
          cp -r models  site/models
          cp -r typescript site/ts

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Build site
        run: |
          bundle exec jekyll build \
            --baseurl "/pr-${{ github.event.pull_request.number }}" \
            --destination "_site/pr-${{ github.event.pull_request.number }}"

      - name: Deploy preview to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _site/pr-${{ github.event.pull_request.number }}
          destination_dir: pr-${{ github.event.pull_request.number }}
          keep_files: true
          commit_message: 'chore: site preview for PR #${{ github.event.pull_request.number }}'

      - name: Post preview comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: site-preview
          message: |
            ### Site preview

            | | |
            |---|---|
            | **Preview URL** | https://schemas.meshery.io/pr-${{ github.event.pull_request.number }}/ |
            | **Commit** | ${{ github.event.pull_request.head.sha }} |

            Navigation links on the preview point to the live site. The homepage and any page you load directly will reflect this PR's changes.

  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Remove preview directory
        run: |
          git config user.name  "meshery-ci"
          git config user.email "ci@meshery.io"
          git rm -rf "pr-${{ github.event.pull_request.number }}" || true
          git diff --cached --quiet || git commit -m "chore: remove preview for PR #${{ github.event.pull_request.number }}"
          git push
