name: PR Site Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'Makefile'
      - 'site/**'
      - '_config.yml'
      - 'Gemfile'
      - 'Gemfile.lock'
      - 'schemas/**'
      - 'build/bundle-openapi.js'

permissions:
  contents: read

jobs:
  build-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node deps and bundle OpenAPI specs
        run: make docs-build

      - name: Resolve symlinks for Jekyll
        run: |
          rm site/schemas site/models site/ts
          cp -r schemas site/schemas
          cp -r models  site/models
          cp -r typescript site/ts

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Build site
        run: |
          bundle exec jekyll build \
            --baseurl "/pr-${{ github.event.pull_request.number }}" \
            --destination "_site/pr-${{ github.event.pull_request.number }}"

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-preview-pr-${{ github.event.pull_request.number }}
          path: _site/pr-${{ github.event.pull_request.number }}
          retention-days: 7
