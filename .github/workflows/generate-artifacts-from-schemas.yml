name: Generate Artifacts from schemas
on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths-ignore:
      - '.github/**'
      - README.md
      - schemas/base_cloud.yml
      - schemas/base_meshery.yml
jobs:
  build-artifacts:
    # Skip auto-commits made by the release flow (publish-schemas.yml + publish-npm-package.yml)
    # so generate-artifacts does not loop on its own commits or on release-driven schema bumps.
    if: github.event_name == 'workflow_dispatch' || github.event.head_commit.author.email != 'ci@meshery.io'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@master
        with:
          ref: 'master'
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'   # match your local version

      - name: Install build dependencies
        uses: actions/setup-node@v6
      - run: |
          npm i
          go version 
          go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@v2.5.1
          echo "$HOME/go/bin" >> $GITHUB_PATH  # ✅ Add oapi-codegen to PATH


      - name: Run Make build
        shell: bash
        run: |
          make build

      - name: Sanitize generated files
        shell: bash
        run: |
          # Sanitize both TypeScript and Go artifacts
          find ./typescript ./models \( -name "*.ts" -o -name "*.go" \) -type f -exec sed -i "s|$GITHUB_WORKSPACE|.|g" {} +

      - name: Pull changes from remote
        run: git pull origin master

      - name: Verify no path leakage
        shell: bash
        run: |
          # Check only artifact paths and exclude docs/build directories
          if grep -r "/home/runner" ./typescript ./models --exclude-dir=docs --exclude-dir=build; then
            echo "::error::1001-CI-PATH-LEAK-ERR: Absolute paths found in generated files. Path leakage detected!"
            exit 1
          fi

      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: Generate build artifacts from schemas
          commit_options: '--signoff'
          branch: master
          commit_user_name: meshery
          commit_user_email: ci@meshery.io
          commit_author: ${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>
