name: PR Site Preview Deploy

on:
  workflow_run:
    workflows: ["PR Site Preview"]
    types: [completed]

permissions:
  actions: read
  contents: write
  pull-requests: write

jobs:
  deploy:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.pull_requests[0] != null
    runs-on: ubuntu-latest
    steps:
      - name: Download preview artifact
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}
          name: site-preview-pr-${{ github.event.workflow_run.pull_requests[0].number }}
          path: _site/pr-${{ github.event.workflow_run.pull_requests[0].number }}

      - name: Deploy preview to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _site/pr-${{ github.event.workflow_run.pull_requests[0].number }}
          destination_dir: pr-${{ github.event.workflow_run.pull_requests[0].number }}
          keep_files: true
          commit_message: "chore: site preview for PR #${{ github.event.workflow_run.pull_requests[0].number }}"

      - name: Upsert preview comment
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.workflow_run.pull_requests[0];
            const marker = '<!-- site-preview -->';
            const body = `${marker}
            ### Site preview

            | | |
            |---|---|
            | **Preview URL** | https://schemas.meshery.io/pr-${pr.number}/ |
            | **Commit** | ${context.payload.workflow_run.head_sha} |

            Navigation links on the preview point to the live site. The homepage and any page you load directly will reflect this PR's changes.`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              per_page: 100,
            });

            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body,
              });
            }
