name: Publish Schemas

on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write
  actions: read

jobs:
  wait-for-artifacts:
    # Block the release fan-out until any in-flight artifact generation on master
    # has settled, so we publish generated artifacts rather than stale sources.
    runs-on: ubuntu-24.04
    steps:
      - name: Wait for in-flight artifact generation
        uses: actions/github-script@v7
        with:
          script: |
            const workflow = 'generate-artifacts-from-schemas.yml';
            const active = ['queued', 'in_progress', 'waiting', 'requested', 'pending'];
            const sleep = ms => new Promise(r => setTimeout(r, ms));
            for (let i = 0; i < 60; i++) {              // ~30 min ceiling
              const { data } = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: workflow,
                branch: 'master',
              });
              const running = data.workflow_runs.filter(r => active.includes(r.status));
              if (running.length === 0) {
                core.info('Artifacts settled. Proceeding.');
                return;
              }
              core.info(`Waiting on: ${running.map(r => r.html_url).join(', ')}`);
              await sleep(30000);
            }
            core.setFailed('Timed out waiting for artifact generation to finish.');

  update-schema-version:
    needs: wait-for-artifacts
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.MESHERY_CI }}

      - name: Pull changes from remote
        run: git pull --ff-only origin master

      - name: Update schema versions
        env:
          RELEASE_VERSION: ${{ github.event.release.tag_name }}
        run: |
          set -eo pipefail

          python <<'PY'
          import os
          import pathlib
          import re

          release_version = os.environ["RELEASE_VERSION"]
          if not re.fullmatch(r"v?[0-9]+\.[0-9]+\.[0-9]+", release_version):
              raise SystemExit(
                  f"Release tag must match v<major>.<minor>.<patch>; got {release_version!r}"
              )
          for relative_path in ("schemas/base_cloud.yml", "schemas/base_meshery.yml"):
              path = pathlib.Path(relative_path)
              content = path.read_text()
              updated_content, count = re.subn(
                  r"^(\s*version:\s*).*$",
                  rf"\1{release_version}",
                  content,
                  count=1,
                  flags=re.MULTILINE,
              )
              if count != 1:
                  raise SystemExit(
                      f"Expected exactly one version field in {relative_path}, found {count}"
                  )
              path.write_text(updated_content)
          PY

      - name: Commit schema version updates
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: Update published schema versions
          commit_options: '--signoff'
          branch: master
          commit_user_name: meshery
          commit_user_email: ci@meshery.io
          commit_author: ${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>
          file_pattern: |
            schemas/base_cloud.yml
            schemas/base_meshery.yml
          token: ${{ secrets.MESHERY_CI }}

  publish-npm-package:
    needs: update-schema-version
    uses: ./.github/workflows/publish-npm-package.yml
    with:
      release_version: ${{ github.event.release.tag_name }}
    secrets: inherit

  notify-dependents:
    needs: publish-npm-package
    uses: ./.github/workflows/notify-dependents.yml
    with:
      release_version: ${{ github.event.release.tag_name }}
    secrets: inherit

  publish-openapi-docs:
    needs: publish-npm-package
    uses: ./.github/workflows/publish-openapi-docs.yml
    secrets: inherit
