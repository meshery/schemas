# Purpose: This workflow automatically publishes the Meshery Schemas OpenAPI documentation to downstream repositories
# 
# EXTENSION POINT
# This workflow includes notification to any Meshery integrator that wants to be notified.
# If your project integrates with Meshery and you would like a copy of the OpenAPI files 
# pushed to your repository, simple edit this file, adding your repository and details below.
#

name: Publish OpenAPI Docs

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-openapi:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout schemas repository
        uses: actions/checkout@v6
        with:
          ref: 'master'
          token: ${{ secrets.MESHERY_CI }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Validate schemas
        run: make validate-schemas

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: |
          npm i
          go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@v2.5.1
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Build OpenAPI specifications
        run: |
          make bundle-openapi

      - name: Upload OpenAPI build artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi-build
          path: |
            _openapi_build/cloud_openapi.yml
            _openapi_build/meshery_openapi.yml

  publish-openapi-docs:
    needs: build-openapi
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download OpenAPI build artifact
        uses: actions/download-artifact@v4
        with:
          name: openapi-build

      - name: Checkout meshery repository
        uses: actions/checkout@v6
        with:
          repository: meshery/meshery
          path: meshery
          token: ${{ secrets.MESHERY_CI }}
          ref: 'master'

      - name: Copy OpenAPI specification to meshery repo
        run: |
          mkdir -p meshery/docs/data
          cp meshery_openapi.yml meshery/docs/data/openapi.yml
          echo "Copied meshery_openapi.yml to meshery/docs/data/openapi.yml"

      - name: Pull changes from remote
        working-directory: meshery
        run: git pull origin master

      - name: Commit and push to meshery repository
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          repository: meshery
          commit_message: '[Docs] Update REST API Documentation'
          commit_options: '--signoff'
          commit_user_name: meshery
          commit_user_email: ci@meshery.io
          commit_author: ${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>
          file_pattern: docs/data/openapi.yml
          branch: master


  # EXTENSION (see instructions above)
  publish-openapi-docs-to-cloud-docs:
    needs: build-openapi
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download OpenAPI build artifact
        uses: actions/download-artifact@v4
        with:
          name: openapi-build

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          repository: layer5io/docs
          path: cloud-docs
          token: ${{ secrets.MESHERY_CI }}
          ref: 'master'

      - name: Copy OpenAPI specification to repo
        run: |
          mkdir -p cloud-docs/data
          cp cloud_openapi.yml cloud-docs/data/openapi.yml
          echo "Copied cloud_openapi.yml to cloud-docs/data/openapi.yml"

      - name: Pull changes from remote
        working-directory: cloud-docs
        run: git pull origin master

      - name: Commit and push to repository
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          repository: cloud-docs
          commit_message: '[Docs] Update REST API Documentation'
          commit_options: '--signoff'
          commit_user_name: meshery
          commit_user_email: ci@meshery.io
          commit_author: ${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>
          file_pattern: data/openapi.yml
          branch: master
